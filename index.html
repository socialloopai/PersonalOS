.lg-timeline-fill{height:100%;background:var(--accent);border-radius:100px;transition:width .6s var(--ease)}
.lg-timeline-dots{display:flex;align-items:center;gap:0;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
.lg-timeline-dots::-webkit-scrollbar{display:none}
.lg-ms{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;width:84px}
.lg-ms-dot{width:10px;height:10px;border-radius:50%;background:var(--surface-3);border:1px solid var(--border-2);flex-shrink:0}
.lg-ms.done .lg-ms-dot{background:var(--accent);border-color:var(--accent)}
.lg-ms.current .lg-ms-dot{background:var(--text);border-color:var(--text);box-shadow:0 0 0 4px var(--accent-dim)}
.lg-ms-lbl{font-size:9px;font-weight:600;color:var(--text-4);text-align:center;line-height:1.3;width:78px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.lg-ms.done .lg-ms-lbl,.lg-ms.current .lg-ms-lbl{color:var(--text-2)}
.lg-ms-line{flex-shrink:0;width:20px;height:1px;background:var(--border);margin-top:5px;align-self:flex-start}
.lg-ms.done+.lg-ms-line,.lg-ms-line.done{background:var(--accent)}

.lg-checker-link{display:inline-flex;align-items:center;gap:8px;margin-top:24px;padding:10px 20px;background:transparent;color:var(--text-3);border:1px solid var(--border);border-radius:100px;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;transition:all .18s var(--ease)}
.lg-checker-link:hover{background:var(--surface-2);color:var(--text);border-color:var(--border-2)}

@media(max-width:768px){
  .lg-hero{flex-direction:column;align-items:stretch}
  .lg-hero-title{font-size:28px}
  .lg-case{padding:22px 24px}
  .lg-case-head{flex-direction:column;gap:12px}
  .lg-case-status{align-items:flex-start}
}

/* ═══ PHYSIQUE PAGE (Tab 4 — Body + Nutrition merged) ═══ */
.phy-page{max-width:1000px;margin:0 auto}
.bd-hero{margin-bottom:56px;padding-top:8px}
.bd-hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:18px}
.bd-hero-line{font-size:56px;font-weight:800;letter-spacing:-0.04em;line-height:1;color:var(--text);font-variant-numeric:tabular-nums}
.bd-hero-line .unit{font-size:22px;font-weight:600;color:var(--text-3);margin-left:10px;letter-spacing:0}
.bd-hero-sub{display:flex;align-items:center;gap:14px;margin-top:14px;font-size:13px;color:var(--text-3);font-weight:500}
.bd-hero-sub .divider{color:var(--text-4)}
.bd-hero-sub .accent{color:var(--accent);font-weight:700}

.bd-hero-bar{height:4px;background:var(--surface-2);border-radius:100px;overflow:hidden;margin-top:28px;max-width:520px}
.bd-hero-bar-fill{height:100%;background:var(--accent);border-radius:100px;transition:width .6s var(--ease)}
.bd-hero-bar-labels{display:flex;justify-content:space-between;max-width:520px;margin-top:8px;font-size:10px;color:var(--text-4);font-weight:600;letter-spacing:0.04em;text-transform:uppercase}

.bd-section-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;margin-top:48px;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3)}
.bd-section-label .count{color:var(--text-4);font-weight:600}

.bd-next{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:32px 36px;display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start}
.bd-next-title{font-size:24px;font-weight:800;letter-spacing:-0.025em;color:var(--text);line-height:1.2}
.bd-next-sub{font-size:12px;color:var(--text-3);margin-top:6px;font-weight:500}
.bd-next-phase{display:inline-block;margin-top:16px;padding:5px 12px;border-radius:100px;background:var(--accent-dim);color:var(--accent);font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
.bd-next-exercises{list-style:none;padding:0}
.bd-next-exercises li{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);font-size:13px}
.bd-next-exercises li:last-child{border-bottom:none}
.bd-next-exercises .ex-name{color:var(--text);font-weight:500}
.bd-next-exercises .ex-sets{color:var(--text-3);font-weight:600;font-variant-numeric:tabular-nums}

.bd-rotation{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.bd-rot-cell{text-align:center;padding:14px 8px;border-radius:var(--r-sm);background:var(--surface);border:1px solid var(--border);transition:all .18s var(--ease)}
.bd-rot-cell.done{opacity:0.45}
.bd-rot-cell.next{border-color:rgba(232,184,109,0.35);background:var(--accent-dim)}
.bd-rot-name{font-size:11px;font-weight:700;color:var(--text-2);letter-spacing:-0.005em}
.bd-rot-cell.done .bd-rot-name{text-decoration:line-through;color:var(--text-4)}
.bd-rot-cell.next .bd-rot-name{color:var(--accent)}
.bd-rot-sub{font-size:9px;color:var(--text-4);margin-top:4px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase}

.bd-chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:32px}

/* ── Rotation expand ── */
.bd-rot-cell{cursor:pointer}
.bd-rot-cell:hover{border-color:var(--border-2)}
.bd-rot-expand{grid-column:1/-1;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;animation:fadeUp .25s var(--ease)}
.bd-rot-expand-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-0.01em}
.bd-rot-expand-sub{font-size:11px;color:var(--text-3);margin-bottom:16px;font-weight:500}
.bd-rot-expand li{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.bd-rot-expand li:last-child{border-bottom:none}
.bd-rot-expand .ex-name{color:var(--text);font-weight:500}
.bd-rot-expand .ex-sets{color:var(--text-3);font-weight:600;font-variant-numeric:tabular-nums}

/* ── Consistency streaks ── */
.bd-streaks{margin-bottom:48px}
.bd-streak-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.bd-streak-label{font-size:10px;font-weight:700;letter-spacing:0.10em;text-transform:uppercase;color:var(--text-3);width:36px;flex-shrink:0}
.bd-streak-days{display:flex;gap:3px;flex:1}
.bd-streak-day{width:100%;aspect-ratio:1;border-radius:3px;background:var(--surface-2);transition:background .18s}
.bd-streak-day.filled{background:var(--accent)}
.bd-streak-day.today{box-shadow:inset 0 0 0 1.5px var(--accent)}
.bd-streak-count{font-size:11px;font-weight:700;color:var(--text-3);white-space:nowrap;min-width:60px;text-align:right;font-variant-numeric:tabular-nums}
.bd-streak-count .num{color:var(--accent);font-size:13px}
.bd-streak-dates{display:flex;justify-content:space-between;margin-top:4px;padding-left:50px;padding-right:74px;font-size:9px;color:var(--text-4);font-weight:600;letter-spacing:0.04em}

.bd-streak-day{cursor:pointer}
.bd-streak-day.selected{box-shadow:inset 0 0 0 1.5px var(--text-2)}
.bd-streak-day.today.selected{box-shadow:inset 0 0 0 1.5px var(--accent),inset 0 0 0 3px var(--surface)}

.bd-streak-detail{display:flex;align-items:baseline;gap:10px 20px;margin-bottom:16px;padding:0 2px;font-size:12px;line-height:1.5;flex-wrap:wrap}
.bd-streak-detail-date{font-size:10px;font-weight:700;letter-spacing:0.10em;text-transform:uppercase;color:var(--text-3);flex-shrink:0}
.bd-streak-detail-pills{display:inline-flex;gap:18px;flex-wrap:wrap;align-items:baseline}
.bd-streak-detail-pill{display:inline-flex;align-items:baseline;gap:6px;color:var(--text-2);white-space:nowrap}
.bd-streak-detail-pill .lbl{font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-4)}
.bd-streak-detail-pill .val{font-weight:600;color:var(--text);font-variant-numeric:tabular-nums}
.bd-streak-detail-pill .val.empty{color:var(--text-4);font-weight:400}

@media(max-width:768px){
  .bd-streak-day{border-radius:2px}
  .bd-streak-count{min-width:44px;font-size:10px}
  .bd-streak-count .num{font-size:11px}
  .bd-streak-dates{padding-left:50px;padding-right:58px}
}

/* ── RECOVERY sub-section (Oura inside Physique) ── */
.bd-oura-sync{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-3);background:var(--surface-2);border:1px solid var(--border);border-radius:100px;cursor:pointer;transition:all .18s var(--ease)}
.bd-oura-sync:hover:not(:disabled){color:var(--text);background:var(--surface);border-color:var(--border-2)}
.bd-oura-sync:disabled{opacity:0.55;cursor:wait}
.bd-recovery{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border);margin-bottom:14px}
.bd-rec-stat{background:var(--surface);padding:24px 22px;position:relative}
.bd-rec-lbl{font-size:10px;font-weight:700;letter-spacing:0.10em;text-transform:uppercase;color:var(--text-4);margin-bottom:10px}
.bd-rec-val{font-size:32px;font-weight:800;line-height:1;letter-spacing:-0.03em;color:var(--text);font-variant-numeric:tabular-nums}
.bd-rec-val .unit{font-size:14px;color:var(--text-4);font-weight:600;margin-left:6px;letter-spacing:0}
.bd-rec-sub{font-size:11px;color:var(--text-3);margin-top:6px;font-weight:500}
.bd-rec-rec{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;font-size:13px;color:var(--text-2);font-weight:500;line-height:1.5}
.bd-rec-rec .accent{color:var(--accent);font-weight:700}

@media(max-width:768px){
  .bd-recovery{grid-template-columns:repeat(3,1fr)}
  .bd-rec-stat{padding:18px 14px}
  .bd-rec-val{font-size:24px}
  .bd-rec-lbl{font-size:9px;letter-spacing:0.08em}
}

/* ── FUEL sub-section (nutrition inside Physique) ── */
.bd-section-hdr{display:flex;align-items:center;justify-content:space-between;margin-top:48px;margin-bottom:18px;gap:14px;flex-wrap:wrap}
.bd-section-hdr .bd-section-label{margin:0}
.bd-label-row{display:flex;align-items:center;gap:12px;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3)}
.bd-label-row .count{color:var(--text-4);font-weight:600;letter-spacing:0.04em;text-transform:none;font-size:11px}
.bd-day-switch{display:flex;gap:2px;background:var(--surface-2);border:1px solid var(--border);border-radius:100px;padding:3px}
.bd-day{padding:7px 16px;font-size:11px;font-weight:600;color:var(--text-3);background:transparent;border:none;border-radius:100px;cursor:pointer;transition:all .18s var(--ease);letter-spacing:0.02em}
.bd-day:hover{color:var(--text-2)}
.bd-day.active{color:var(--text);background:var(--surface);box-shadow:var(--shadow-sm)}

.bd-fuel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:36px 32px;margin-bottom:14px}
.bd-fuel-rings{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-bottom:32px;padding-bottom:32px;border-bottom:1px solid var(--border)}
.bd-fuel-rings:last-child{border-bottom:none;padding-bottom:0;margin-bottom:0}
.bd-ring{display:flex;flex-direction:column;align-items:center;gap:10px}
.bd-ring-lbl{font-size:10px;font-weight:700;color:var(--text-3);letter-spacing:0.10em;text-transform:uppercase}
.bd-ring-val{font-size:15px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;margin-top:-2px}
.bd-ring-val .tgt{color:var(--text-4);font-weight:500}

.bd-fuel-meals{}
.bd-fuel-meals-label{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-4);margin-bottom:14px}
.bd-meal{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--border)}
.bd-meal:last-child{border-bottom:none}
.bd-meal-name{flex:1;font-size:14px;font-weight:600;color:var(--text);letter-spacing:-0.005em}
.bd-meal-foods{font-size:11px;color:var(--text-4);font-weight:500;margin-top:3px;line-height:1.4}
.bd-meal-nums{display:flex;align-items:baseline;gap:12px;flex-shrink:0;font-variant-numeric:tabular-nums}
.bd-meal-cal{font-size:15px;font-weight:700;color:var(--text)}
.bd-meal-pro{font-size:11px;color:var(--accent);font-weight:700}
.bd-meal-empty{padding:28px 0;text-align:center;color:var(--text-4);font-style:italic;font-size:13px}

@media(max-width:768px){
  .bd-hero-line{font-size:40px}
  .bd-next{grid-template-columns:1fr;gap:24px;padding:24px}
  .bd-rotation{grid-template-columns:repeat(3,1fr)}
  .bd-fuel{padding:26px 20px}
  .bd-fuel-rings{grid-template-columns:repeat(2,1fr);gap:20px}
}

/* ═══ FINANCE PAGE (Tab 3) ═══ */
.fin-page{max-width:1100px;margin:0 auto}
.fn-hero{margin-bottom:56px;padding-top:8px}
.fn-hero-top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.fn-hero-top .fn-hero-eyebrow{margin-bottom:0}
.fn-hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:18px}
.fn-hero-actions{display:flex;gap:8px;align-items:center}
.fn-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;font-size:12px;font-weight:700;border-radius:100px;cursor:pointer;transition:all .18s var(--ease);letter-spacing:0.02em;border:none;font-family:inherit;white-space:nowrap}
.fn-btn.secondary{background:var(--surface-2);color:var(--text-2);border:1px solid var(--border)}
.fn-btn.secondary:hover{background:var(--surface-3);color:var(--text);border-color:var(--border-2)}
.fn-btn.primary{background:var(--accent);color:var(--bg);box-shadow:0 4px 20px rgba(232,184,109,0.22)}
.fn-btn.primary:hover{background:var(--accent-2);box-shadow:0 6px 28px rgba(232,184,109,0.32);transform:translateY(-1px)}
.fn-btn:disabled{opacity:0.6;cursor:default;pointer-events:none}
.fn-hero-line{font-size:56px;font-weight:800;letter-spacing:-0.04em;line-height:1;color:var(--text);font-variant-numeric:tabular-nums}
.fn-hero-line.negative{color:var(--accent)}
.fn-hero-sub{display:flex;align-items:center;gap:14px;margin-top:14px;font-size:13px;color:var(--text-3);font-weight:500}
.fn-hero-sub .divider{color:var(--text-4)}

.fn-hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin-top:32px;border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border)}
.fn-hero-stat{background:var(--surface);padding:26px 28px}
.fn-hero-stat-lbl{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-4);margin-bottom:10px}
.fn-hero-stat-val{font-size:28px;font-weight:800;letter-spacing:-0.03em;line-height:1;color:var(--text);font-variant-numeric:tabular-nums}
.fn-hero-stat-sub{font-size:11px;color:var(--text-3);font-weight:500;margin-top:6px}

.fn-section-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3)}
.fn-section-label .count{color:var(--text-4);font-weight:600;font-variant-numeric:tabular-nums}

.fn-month-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:32px;display:grid;grid-template-columns:1.4fr 1fr;gap:40px}
.fn-burn-chart{display:flex;align-items:flex-end;gap:14px;height:200px;padding:0}
.fn-cat-breakdown{border-left:1px solid var(--border);padding-left:40px}

/* (essentials tracker removed) */

/* ── Liabilities ── */
.fn-liab{margin-bottom:48px}
.fn-liab-hero{display:flex;align-items:baseline;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.fn-liab-total{font-size:28px;font-weight:800;letter-spacing:-0.03em;color:var(--accent);font-variant-numeric:tabular-nums;line-height:1}
.fn-liab-count{font-size:13px;color:var(--text-3);font-weight:500}
.fn-liab-list{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.fn-liab-row{display:flex;align-items:center;gap:16px;padding:18px 24px;border-bottom:1px solid var(--border);transition:background .14s}
.fn-liab-row:last-child{border-bottom:none}
.fn-liab-row:hover{background:var(--surface-2)}
.fn-liab-row.paid{opacity:0.4}
.fn-liab-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border-3);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s var(--ease)}
.fn-liab-check:hover{border-color:var(--accent)}
.fn-liab-row.paid .fn-liab-check{background:var(--accent);border-color:var(--accent)}
.fn-liab-row.paid .fn-liab-check::after{content:'✓';font-size:11px;color:var(--bg);font-weight:800}
.fn-liab-info{flex:1;min-width:0}
.fn-liab-label{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-0.005em}
.fn-liab-row.paid .fn-liab-label{text-decoration:line-through;color:var(--text-4)}
.fn-liab-meta{font-size:11px;color:var(--text-4);font-weight:500;margin-top:2px}
.fn-liab-amt{font-size:16px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;flex-shrink:0}
.fn-liab-row.paid .fn-liab-amt{color:var(--text-4)}
.fn-liab-cat{font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-4);padding:3px 8px;border-radius:100px;background:var(--surface-2);flex-shrink:0}

@media(max-width:768px){
  .fn-liab-row{padding:14px 18px;gap:12px}
  .fn-liab-label{font-size:13px}
  .fn-liab-meta{font-size:10px}
}

/* ── Entity cards ── */
.fn-entity-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:48px}
.fn-entity-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 28px;cursor:pointer;transition:all .22s var(--ease)}
.fn-entity-card:hover{border-color:var(--border-2);background:var(--surface-2)}
.fn-entity-name{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.01em;margin-bottom:6px}
.fn-entity-meta{font-size:11px;color:var(--text-3);font-weight:500;line-height:1.5}
.fn-entity-status{display:inline-block;padding:3px 10px;border-radius:100px;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-top:10px}

<script>
// ===== CONFIG =====
if(!window.PERSONAL_OS_CONFIG){throw new Error('Missing config.js — copy config.example.js to config.js and fill in your Supabase URL + anon key.');}
const SB_URL=window.PERSONAL_OS_CONFIG.SUPABASE_URL;
const SB_KEY=window.PERSONAL_OS_CONFIG.SUPABASE_ANON;
const TARGETS={cal:1800,pro:180,carb:150,fat:50};
const GOAL_WEIGHT=164;
const CUT_END=new Date('2026-04-13');
const CUT_START=new Date('2026-02-16');

function today(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function daysUntil(d){return Math.max(0,Math.ceil((d-new Date())/(864e5)))}
function daysSince(d){return Math.max(0,Math.floor((new Date()-d)/(864e5)))}


// ===== SUPABASE =====
async function sb(table,params='',method='GET',body=null){
  const h={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':(method==='POST'||method==='PATCH')?'return=representation':'count=exact'};
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{method,headers:h,body:body?JSON.stringify(body):null});
  if(!r.ok){console.error(await r.text());return null}
  return r.json();
}

// ===== NAV =====
// ===== THEME TOGGLE =====
function toggleTheme(){
  const html=document.documentElement;
  const current=html.getAttribute('data-theme');
  const next=current==='light'?'dark':'light';
  html.setAttribute('data-theme',next);
  localStorage.setItem('personalos-theme',next);
  document.getElementById('theme-icon').textContent=next==='light'?'🌙':'☀️';
}
(function(){
  const saved=localStorage.getItem('personalos-theme');
  if(saved){
    document.documentElement.setAttribute('data-theme',saved);
    const icon=document.getElementById('theme-icon');
    if(icon) icon.textContent=saved==='light'?'🌙':'☀️';
  }
})();

function navigate(page,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const pg=document.getElementById('pg-'+page);
  if(pg) pg.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  localStorage.setItem('personalos-page',page);
  renderPage(page);
}
function restoreLastPage(){
  const saved=localStorage.getItem('personalos-page');
  if(!saved||saved==='projects') return;
  const el=document.querySelector(`[data-page="${saved}"]`);
  if(el){navigate(saved,el);}
}
function renderPage(page){
  const map={
    'body':renderBody,
    'body-nutrition':renderBody,
    'finance':renderFinance,'tasks':renderTaskBoard,
    'projects':renderProjects,'legal':renderLegal,'taxes':renderTaxes,
    'profile':renderProfile,'reflections':renderReflections,

  };
  if(map[page]) map[page]();
}

// ===== CHART =====
function drawLineChart(canvas,datasets,opts={}){
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  canvas.style.width=rect.width+'px';
  canvas.style.height=rect.height+'px';
  ctx.scale(dpr,dpr);
  const W=rect.width,H=rect.height;

  // Resolve theme-aware colors from CSS variables
  const css=getComputedStyle(document.documentElement);
  const accent=(css.getPropertyValue('--accent')||'#e8b86d').trim();
  const text=(css.getPropertyValue('--text')||'#fafafa').trim();
  const text3=(css.getPropertyValue('--text-3')||'#6b6b6b').trim();
  const text4=(css.getPropertyValue('--text-4')||'#454545').trim();
  const border=(css.getPropertyValue('--border')||'rgba(255,255,255,0.07)').trim();

  const sans="600 11px 'Inter',-apple-system,sans-serif";
  const microSans="700 10px 'Inter',-apple-system,sans-serif";

  // Padding: leave room for Y labels left, X labels below, and value+goal labels in the right margin (outside the plot)
  const pad={t:24,r:80,b:34,l:48};
  const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;

  // Y range
  let min=opts.minY,max=opts.maxY;
  if(min==null||max==null){
    let allVals=[];
    datasets.forEach(ds=>ds.data.forEach(v=>{if(v!=null)allVals.push(v)}));
    if(opts.goalLine!=null)allVals.push(opts.goalLine);
    let dMin=Math.min(...allVals),dMax=Math.max(...allVals);
    if(dMin===dMax){dMin-=1;dMax+=1}
    const range=dMax-dMin;
    if(min==null)min=dMin-range*.15;
    if(max==null)max=dMax+range*.15;
  }
  const ySteps=4;
  const decimals=opts.decimals||0;

  // ── Horizontal grid lines + Y-axis labels ──
  ctx.strokeStyle=border;ctx.lineWidth=1;
  ctx.fillStyle=text4;ctx.font=microSans;ctx.textAlign='right';ctx.textBaseline='middle';
  for(let i=0;i<=ySteps;i++){
    const y=pad.t+(cH/ySteps)*i;
    const val=max-(max-min)/ySteps*i;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillText(val.toFixed(decimals),pad.l-10,y);
  }

  // ── X-axis date labels ──
  const labels=datasets[0]?.labels||[];
  const n=labels.length;
  if(n>0){
    ctx.fillStyle=text4;ctx.font=microSans;ctx.textAlign='center';ctx.textBaseline='top';
    // Show ~5 labels max: first, last, and 3 evenly spaced
    const targetLabels=Math.min(5,n);
    const step=Math.max(1,Math.round((n-1)/(targetLabels-1||1)));
    const shown=new Set();
    for(let i=0;i<n;i+=step) shown.add(i);
    shown.add(0);shown.add(n-1);
    shown.forEach(i=>{
      const x=pad.l+(n>1?(i/(n-1))*cW:cW/2);
      ctx.fillText(labels[i],x,H-pad.b+10);
    });
  }

  // ── Goal line ──
  if(opts.goalLine!=null&&opts.goalLine>=min&&opts.goalLine<=max){
    const gy=pad.t+cH*(1-(opts.goalLine-min)/(max-min));
    ctx.setLineDash([5,5]);
    ctx.strokeStyle=accent+'80';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(W-pad.r,gy);ctx.stroke();
    ctx.setLineDash([]);
    // Label in the right margin, outside the plot area
    ctx.fillStyle=accent;ctx.font=microSans;ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText('GOAL '+(opts.goalLabel||opts.goalLine),W-pad.r+10,gy);
  }

  // ── Main line + fill ──
  datasets.forEach(ds=>{
    const pts=ds.data;const N=pts.length;if(N<1)return;
    const color=ds.color||accent;

    // Area fill (under the line)
    if(ds.fill&&N>1){
      ctx.beginPath();
      let started=false;
      pts.forEach((v,i)=>{
        if(v==null)return;
        const x=pad.l+(N>1?(i/(N-1))*cW:cW/2);
        const y=pad.t+cH*(1-(v-min)/(max-min));
        if(!started){ctx.moveTo(x,y);started=true}else ctx.lineTo(x,y);
      });
      ctx.lineTo(pad.l+cW,pad.t+cH);
      ctx.lineTo(pad.l,pad.t+cH);
      ctx.closePath();
      const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+cH);
      grad.addColorStop(0,color+'26');
      grad.addColorStop(1,color+'00');
      ctx.fillStyle=grad;ctx.fill();
    }

    // Stroke line
    ctx.strokeStyle=color;ctx.lineWidth=ds.width||2.5;
    ctx.lineJoin='round';ctx.lineCap='round';
    ctx.beginPath();let started=false;
    pts.forEach((v,i)=>{
      if(v==null)return;
      const x=pad.l+(N>1?(i/(N-1))*cW:cW/2);
      const y=pad.t+cH*(1-(v-min)/(max-min));
      if(!started){ctx.moveTo(x,y);started=true}else ctx.lineTo(x,y);
    });
    ctx.stroke();

    // Dot on EVERY data point (so each weigh-in is visible)
    const surface=(css.getPropertyValue('--surface')||'#141414').trim();
    pts.forEach((v,i)=>{
      if(v==null)return;
      const x=pad.l+(N>1?(i/(N-1))*cW:cW/2);
      const y=pad.t+cH*(1-(v-min)/(max-min));
      const isLast=(i===N-1);
      ctx.beginPath();
      ctx.arc(x,y,isLast?5:3,0,Math.PI*2);
      ctx.fillStyle=color;ctx.fill();
      ctx.strokeStyle=surface;ctx.lineWidth=isLast?2.5:1.5;
      ctx.stroke();
    });

    // End value label — in the right margin, outside the plot area
    const lastIdx=N-1-[...pts].reverse().findIndex(v=>v!=null);
    if(lastIdx>=0&&pts[lastIdx]!=null){
      const y=pad.t+cH*(1-(pts[lastIdx]-min)/(max-min));
      ctx.fillStyle=text;ctx.font=sans;
      ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText(pts[lastIdx].toFixed(decimals)+' lbs',W-pad.r+10,y);
    }
  });
}

// ouraData holds the merged recovery stream — Apple Health (current) + Oura (historical)
let checkinData=[],nutritionData=[],workoutData=[],ouraData=[],photoData=[],workoutRotationData=[];

// Merge Apple Health + Oura rows by date; Apple wins on conflict (newer source)
function mergeRecoveryData(apple, oura) {
  const byDate = new Map();
  apple.forEach(r => byDate.set(r.date, r));
  oura.forEach(r => { if (!byDate.has(r.date)) byDate.set(r.date, r); });
  return Array.from(byDate.values()).sort((a, b) => b.date.localeCompare(a.date));
}
// Pick most recent non-null RHR across Apple + Oura single-row lookups
function pickLatestRhr(appleRows, ouraRows) {
  const a = (appleRows || [])[0], o = (ouraRows || [])[0];
  if (a && o) return (a.date >= o.date ? a : o).rhr_bpm || 60;
  return (a || o)?.rhr_bpm || 60;
}

function getMacros(date){
  const meals=nutritionData.filter(m=>m.date===date);
  const t={cal:0,pro:0,carb:0,fat:0};
  meals.forEach(m=>{t.cal+=(m.calories||0);t.pro+=(m.protein_g||0);t.carb+=(m.carbs_g||0);t.fat+=(m.fat_g||0)});
  return t;
}

let bdExpandedRotation = -1; // which rotation cell is expanded, -1 = none

function bdRenderStreaks() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const days = 30;

  // Build date strings for last 30 days
  const dates = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    dates.push(d.toISOString().slice(0,10));
  }

  const todayStr = today.toISOString().slice(0,10);

  // Data sources for each habit
  const gymDays = new Set(workoutData.map(w => w.date));
  const fuelDays = new Set(nutritionData.map(n => n.date));
  const sleepDays = new Set(ouraData.map(o => o.date));
  const weightDays = new Set(checkinData.filter(c => c.weight_lbs).map(c => c.date));

  function getStreak(daySet) {
    let streak = 0;
    for (let i = 0; i < days; i++) {
      const d = new Date(today); d.setDate(d.getDate() - i);
      if (daySet.has(d.toISOString().slice(0,10))) streak++;
      else break;
    }
    return streak;
  }

  const gymStreak = getStreak(gymDays);
  const fuelStreak = getStreak(fuelDays);
  const sleepStreak = getStreak(sleepDays);
  const weightStreak = getStreak(weightDays);

  // Build lookup maps for detail on hover/click
  const gymByDate = {};
  workoutData.forEach(w => { gymByDate[w.date] = w.workout_name || w.workout_type || 'Workout'; });
  const fuelByDate = {};
  nutritionData.forEach(n => {
    if (!fuelByDate[n.date]) fuelByDate[n.date] = 0;
    fuelByDate[n.date] += (n.calories || 0);
  });
  const sleepByDate = {};
  ouraData.forEach(o => {
    const hrs = o.total_sleep_duration_hours ? o.total_sleep_duration_hours.toFixed(1) + 'h' : (o.sleep_score ? 'Score ' + o.sleep_score : '✓');
    sleepByDate[o.date] = hrs;
  });

  const weightByDate = {};
  checkinData.forEach(c => { if (c.weight_lbs) weightByDate[c.date] = c.weight_lbs + ' lbs'; });

  const detailMap = { Gym: gymByDate, Nutrition: fuelByDate, Sleep: sleepByDate, Weight: weightByDate };
  window._bdDetailMap = detailMap; // expose for click popup

  function renderRow(label, daySet, streak) {
    const lookup = detailMap[label] || {};
    const squares = dates.map((d, idx) => {
      const filled = daySet.has(d);
      const isToday = d === todayStr;
      let detail = '';
      if (filled) {
        const val = lookup[d];
        if (label === 'Nutrition') detail = val ? Math.round(val) + ' kcal' : '✓';
        else if (label === 'Weight') detail = val || '✓';
        else detail = val || '✓';
      }
      const dayLabel = new Date(d + 'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      const tooltip = filled ? `${dayLabel} — ${detail}` : `${dayLabel} — no data`;
      return `<div class="bd-streak-day${filled ? ' filled' : ''}${isToday ? ' today' : ''}" data-date="${d}" title="${tooltip}" onclick="bdSelectStreakDay('${d}')"></div>`;
    }).join('');
    return `<div class="bd-streak-row" data-streak-row="${label}">
      <div class="bd-streak-label">${label}</div>
      <div class="bd-streak-days">${squares}</div>
      <div class="bd-streak-count"><span class="num">${streak}</span> day${streak !== 1 ? 's' : ''}</div>
    </div>`;
  }

  const firstDate = new Date(today); firstDate.setDate(firstDate.getDate() - (days - 1));
  const firstLabel = firstDate.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const todayLabel = today.toLocaleDateString('en-US',{month:'short',day:'numeric'});

  return `
    <div class="bd-streaks">
      <div class="bd-streak-detail" id="bd-streak-detail">${bdRenderStreakDetail(todayStr)}</div>
      ${renderRow('Gym', gymDays, gymStreak)}
      ${renderRow('Nutrition', fuelDays, fuelStreak)}
      ${renderRow('Sleep', sleepDays, sleepStreak)}
      ${renderRow('Weight', weightDays, weightStreak)}
      <div class="bd-streak-dates"><span>${firstLabel}</span><span>${todayLabel}</span></div>
    </div>
  `;
}

function bdRenderStreakDetail(date) {
  const map = window._bdDetailMap || {};
  const todayStr = new Date().toISOString().slice(0,10);
  const isToday = date === todayStr;
  const dayLabel = isToday
    ? 'Today, ' + new Date(date + 'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})
    : new Date(date + 'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});

  const fmt = (label, val) => {
    if (val == null || val === undefined) return `<span class="bd-streak-detail-pill"><span class="lbl">${label}</span><span class="val empty">—</span></span>`;
    let display = val;
    if (label === 'Nutrition') display = Math.round(val) + ' kcal';
    return `<span class="bd-streak-detail-pill"><span class="lbl">${label}</span><span class="val">${display}</span></span>`;
  };

  return `<span class="bd-streak-detail-date">${dayLabel}</span>
    <div class="bd-streak-detail-pills">
      ${fmt('Gym', map.Gym?.[date])}
      ${fmt('Nutrition', map.Nutrition?.[date])}
      ${fmt('Sleep', map.Sleep?.[date])}
      ${fmt('Weight', map.Weight?.[date])}
    </div>`;
}

function bdSelectStreakDay(date) {
  const detail = document.getElementById('bd-streak-detail');
  if (detail) detail.innerHTML = bdRenderStreakDetail(date);
  document.querySelectorAll('.bd-streak-day.selected').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll(`.bd-streak-day[data-date="${date}"]`).forEach(el => el.classList.add('selected'));
}

async function completeWorkout() {
  const rotation = workoutRotationData;
  if (!rotation.length) return;
  const current = rotation.find(r => r.is_next);
  if (!current) return;

  const btn = document.querySelector('[onclick="completeWorkout()"]');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  const nextPos = (current.position + 1) % rotation.length;
  const nextWorkout = rotation.find(r => r.position === nextPos);

  // Advance the rotation in DB
  await sb('workout_rotation', 'id=eq.' + current.id, 'PATCH', {is_next: false});
  if (nextWorkout) await sb('workout_rotation', 'id=eq.' + nextWorkout.id, 'PATCH', {is_next: true});

  // Log completion to workouts table
  await sb('workouts', '', 'POST', {
    date: today(),
    workout_name: current.workout_label,
    workout_type: current.workout_type,
    notes: 'Completed via PersonalOS'
  });

  // Reload and re-render
  const [w, wr] = await Promise.all([
    sb('workouts', 'order=date.desc&limit=30'),
    sb('workout_rotation', 'order=position.asc'),
  ]);
  workoutData = w || [];
  workoutRotationData = wr || [];
  renderBody();
}

function bdToggleRotation(idx) {
  if (bdExpandedRotation === idx) {
    bdExpandedRotation = -1;
    document.getElementById('bd-rotation-expand').innerHTML = '';
    return;
  }
  bdExpandedRotation = idx;
  const el = document.getElementById('bd-rotation-expand');
  if (!el || !window._bdRotation || !window._EXERCISE_MAP) return;
  const r = window._bdRotation[idx];
  if (!r) return;
  const def = window._EXERCISE_MAP[r.workout_label] || {sub: r.workout_type, exercises: []};
  el.innerHTML = `<div class="bd-rot-expand">

}

function prf_renderLifeCalendar(dob, rhrBpm) {
  const LIFESPAN = 90;
  const WEEKS_PER_YEAR = 52;
  const totalWeeks = LIFESPAN * WEEKS_PER_YEAR;

  const now = new Date();
  const ageMs = now - dob;
  const weeksLived = Math.floor(ageMs / (7 * 24 * 60 * 60 * 1000));
  const yearsLived = Math.floor(ageMs / (365.25 * 24 * 60 * 60 * 1000));
  const weeksLeft = totalWeeks - weeksLived;
  const pctLived = (weeksLived / totalWeeks * 100).toFixed(1);

  // Heartbeat speed from Oura resting heart rate
  const beatDuration = (60 / (rhrBpm || 60)).toFixed(3);

  // Build grid grouped by decades
  let decades = '';
  for (let decade = 0; decade < 9; decade++) {
    let rows = '';
    const decadeYears = decade < 8 ? 10 : 10;
    for (let y = 0; y < decadeYears; y++) {
      const year = decade * 10 + y;
      if (year >= LIFESPAN) break;
      const startWeek = year * WEEKS_PER_YEAR;
      let weeks = '';
      for (let w = 0; w < WEEKS_PER_YEAR; w++) {
        const weekNum = startWeek + w;
        let cls = 'prf-life-week';
        let style = '';
        if (weekNum < weeksLived) {
          cls += ' lived';
          if (y === 0) cls += ' decade-start';
        } else if (weekNum === weeksLived) {
          cls += ' current';
          style = ` style="animation-duration:${beatDuration}s"`;
        }
        weeks += `<div class="${cls}"${style}></div>`;
      }
      const actualYear = dob.getFullYear() + year;
      const showLabel = y === 0 || year === yearsLived;
      const label = showLabel ? actualYear : '';
      rows += `<div class="prf-life-row">
        <div class="prf-life-year">${label}</div>
        <div class="prf-life-weeks">${weeks}</div>
      </div>`;
    }
    decades += `<div class="prf-life-decade">${rows}</div>`;
  }

  return `
    <div class="prf-life">
      <div class="prf-life-header">
        <div class="prf-life-title">Life in weeks</div>
        <div class="prf-life-meta">
          <span class="accent">${weeksLived.toLocaleString()}</span> lived · ${weeksLeft.toLocaleString()} left · ${pctLived}% through${rhrBpm ? ` · ${rhrBpm} bpm` : ''}
        </div>
      </div>
      <div class="prf-life-grid">${decades}</div>
      <div class="prf-life-legend">
        <div style="display:flex;align-items:center;gap:5px"><div class="prf-life-legend-dot" style="background:var(--accent);opacity:.85"></div> Lived</div>
        <div style="display:flex;align-items:center;gap:5px"><div class="prf-life-legend-dot" style="background:var(--text);box-shadow:0 0 0 1.5px var(--accent)"></div> Now</div>
        <div style="display:flex;align-items:center;gap:5px"><div class="prf-life-legend-dot" style="background:var(--surface-2)"></div> Remaining</div>
      </div>
    </div>
  `;
}

async function uploadSignature(input) {
  const file = input.files[0];
  if (!file) return;

  const existing = identityDocs.find(d => d.document_type === 'signature');
  const label = input.closest('label');
  if (label) label.textContent = 'Uploading…';

  if (existing) {
    await fetch(`${SUPABASE_URL}/storage/v1/object/identity-docs/${existing.file_path}`, {
      method: 'DELETE', headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
    });
    await fetch(`${SUPABASE_URL}/rest/v1/identity_documents?id=eq.${existing.id}`, {
      method: 'DELETE', headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
    });
  }

  const ts = Date.now();
  const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const filePath = `${ts}_${safeName}`;

  const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/identity-docs/${filePath}`, {
    method: 'POST',
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`, 'Content-Type': file.type || 'application/octet-stream', 'x-upsert': 'true' },
    body: file,
  });
  if (!uploadRes.ok) { alert('Upload failed: ' + await uploadRes.text()); return; }

  await fetch(`${SUPABASE_URL}/rest/v1/identity_documents`, {
    method: 'POST',
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
    body: JSON.stringify({ document_type: 'signature', label: 'Signature', file_name: file.name, file_path: filePath }),
  });

  profileLoaded = false;
  renderProfile();
}

async function uploadIdentityDoc(input) {
  const file = input.files[0];
  if (!file) return;
  const ts = Date.now();
  const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const filePath = `${ts}_${safeName}`;

  const label = input.closest('label');
  if (label) label.textContent = 'Uploading…';

  const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/identity-docs/${filePath}`, {
    method: 'POST',
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`, 'Content-Type': file.type || 'application/octet-stream', 'x-upsert': 'true' },
    body: file,
  });
  if (!uploadRes.ok) { alert('Upload failed: ' + await uploadRes.text()); return; }

  const docType = file.name.toLowerCase().includes('signature') ? 'signature'
    : file.name.toLowerCase().includes('passport') ? 'passport'
    : file.name.toLowerCase().includes('license') || file.name.toLowerCase().includes('dl') ? 'drivers_license'
    : file.name.toLowerCase().includes('ssn') ? 'ssn_card'
    : file.name.toLowerCase().includes('birth') ? 'birth_certificate'
    : 'other';

  await fetch(`${SUPABASE_URL}/rest/v1/identity_documents`, {
    method: 'POST',
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
    body: JSON.stringify({ document_type: docType, label: file.name.replace(/\.[^.]+$/,''), file_name: file.name, file_path: filePath }),
  });

  profileLoaded = false;
  renderProfile();
}

async function openIdentityDoc(e, filePath) {
  e.preventDefault();
  e.stopPropagation();
  const encodedPath = filePath.split('/').map(encodeURIComponent).join('/');
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/authenticated/identity-docs/${encodedPath}`, {
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
  });
  if (!res.ok) { alert('Could not open file'); return; }
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  // Full-screen overlay (works on iOS unlike window.open with blob URLs)
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;padding:20px;cursor:pointer';
  overlay.onclick = () => { overlay.remove(); URL.revokeObjectURL(url); };
  const img = document.createElement('img');
  img.src = url;
  img.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;border-radius:8px';
  overlay.appendChild(img);
  document.body.appendChild(overlay);
}

async function deleteIdentityDoc(docId, filePath) {
  if (!confirm('Delete this document?')) return;
  await fetch(`${SUPABASE_URL}/storage/v1/object/identity-docs/${filePath}`, {
    method: 'DELETE', headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
  });
  await fetch(`${SUPABASE_URL}/rest/v1/identity_documents?id=eq.${docId}`, {
    method: 'DELETE', headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
  });
  profileLoaded = false;
  renderProfile();
}

async function uploadStatement(accountId, accountName, input) {
  const files = Array.from(input.files);
  if (!files.length) return;

  // Show progress if multiple files
  const label = input.closest('label');
  const origText = label?.childNodes[0]?.textContent || '+ Upload';
  if (files.length > 1 && label) label.childNodes[0].textContent = `Uploading 0/${files.length}…`;

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    if (label && files.length > 1) label.childNodes[0].textContent = `Uploading ${i+1}/${files.length}…`;

    const ts = Date.now() + i;
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const filePath = `${accountId}/${ts}_${safeName}`;

    // Detect statement date — handles YYYYMMDD, YYYY-MM, YYYY_MM
    const dateMatch = file.name.match(/(\d{4})[_-]?(\d{2})[_-]?(\d{2})|(\d{4})[_-](\d{2})/);
    const statementDate = dateMatch
      ? (dateMatch[4] ? `${dateMatch[4]}-${dateMatch[5]}-01` : `${dateMatch[1]}-${dateMatch[2]}-01`)
      : null;

    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/statements/${filePath}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`, 'Content-Type': file.type || 'application/octet-stream', 'x-upsert': 'true' },
      body: file,
    });
    if (!uploadRes.ok) { alert(`Upload failed for ${file.name}: ` + await uploadRes.text()); continue; }

    await fetch(`${SUPABASE_URL}/rest/v1/bank_statements`, {
      method: 'POST',
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
      body: JSON.stringify({ bank_account_id: accountId, file_name: file.name, file_path: filePath, statement_date: statementDate, file_size_bytes: file.size }),
    });
  }

  if (label) label.childNodes[0].textContent = origText;
  finLoaded = false;
  renderFinance();
}

async function openStatement(e, filePath) {

function finOpenAccount(accountId) {
  const a = finAllAccounts.find(x => x.id === accountId);
  if (!a) return;
  const detail = document.getElementById('fin-acct-detail');
  const normal = document.getElementById('fin-normal-view');
  if (!detail || !normal) return;
  normal.style.display = 'none';
  detail.style.display = 'block';

  const bal = parseFloat(a.balance_current) || 0;
  const isCredit = a.type === 'credit';
  const balStr = isCredit && Math.abs(bal) >= 0.005 ? '-' + finFmtAbs(bal) : finFmtAbs(bal);
  const inst = a.plaid_items?.institution_name || '';
  const avail = parseFloat(a.balance_available);
  const limit = isCredit && !isNaN(avail) ? bal + avail : null;
  const subParts = [isCredit ? 'Credit' : 'Checking'];
  if (limit) subParts.push(`${finFmtAbs(avail)} available · ${Math.round(bal / limit * 100)}% used`);
  if (a.payment_due_date) {
    const d = new Date(a.payment_due_date);
    subParts.push(`Due ${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`);
    if (a.minimum_payment_amount) subParts.push(`Min ${finFmtAbs(parseFloat(a.minimum_payment_amount))}`);
  }

  // All transactions for this account
  const acctTx = finAllTx.filter(tx => tx.bank_accounts?.name === a.name);
  const txHtml = acctTx.length === 0
    ? '<div class="fn-detail-empty">No transactions found.</div>'
    : acctTx.map(tx => {
        const name = tx.merchant_name || tx.name || '';
        const amt = parseFloat(tx.amount) || 0;

    : stmts.map(s => {

      <div class="fn-detail-name">${a.custom_name || a.name}</div>

function renderLiabilities() {
  const el = document.getElementById('fin-liabilities');
  if (!el) return;
  if (!liabilitiesData.length) { el.innerHTML = ''; return; }

  const unpaid = liabilitiesData.filter(l => l.status === 'unpaid');
  const paid = liabilitiesData.filter(l => l.status === 'paid');
  const totalOwed = unpaid.reduce((s, l) => s + (parseFloat(l.amount) || 0), 0);

  const rowHtml = (l) => {
    const isPaid = l.status === 'paid';
    const ref = l.reference ? `#${l.reference}` : '';
    const notes = l.notes || '';
    // Extract issue date from notes if present
    const issuedMatch = notes.match(/Issued (\d{2}\/\d{2}\/\d{4})/);
    const issuedStr = issuedMatch ? issuedMatch[1] : '';
    const metaParts = [ref, issuedStr].filter(Boolean).join(' · ');

    return `<div class="fn-liab-row ${isPaid ? 'paid' : ''}">
      <div class="fn-liab-check" onclick="toggleLiability('${l.id}','${isPaid ? 'unpaid' : 'paid'}')" title="${isPaid ? 'Mark unpaid' : 'Mark as paid'}"></div>
      <div class="fn-liab-info">
        <div class="fn-liab-label">${l.label}</div>
        ${metaParts ? `<div class="fn-liab-meta">${metaParts}</div>` : ''}
      </div>
      <div class="fn-liab-cat">${l.category}</div>
      <div class="fn-liab-amt">${finFmtAbs(parseFloat(l.amount))}</div>
    </div>`;
  };

  const rows = [...unpaid, ...paid].map(rowHtml).join('');

  el.innerHTML = `
    <div class="fn-liab">
      <div class="fn-section-label" style="margin-bottom:14px">
        <span>Outstanding</span>
        <span class="count">${unpaid.length} unpaid${paid.length ? ' · ' + paid.length + ' paid' : ''}</span>

const finFmt = n => {
  const v = parseFloat(n) || 0;
  if (Math.abs(v) < 0.005) return '$0';
  return (v < 0 ? '-$' : '$') + Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
};
const finFmtAbs = n => {
  const v = parseFloat(n) || 0;
  if (Math.abs(v) < 0.005) return '$0';
  return '$' + Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
};

function finRenderHero() {
  let cash = 0, debt = 0;
  finAllAccounts.forEach(a => {
    if (a.type === 'depository') cash += parseFloat(a.balance_current) || 0;
    if (a.type === 'credit') debt += parseFloat(a.balance_current) || 0;
  });
  const net = cash - debt;

  // Income — this month's deposits/credits
  const now = new Date();
  const currentMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const HERO_INC_SOURCES = ['wise being','bolinas','venmo'];
  const heroIncSeen = new Set();
  const incomeThisMonth = finAllTxRaw
    .filter(tx => {
      if (!tx.date?.startsWith(currentMonth)) return false;
      const amt = parseFloat(tx.amount);
      if (amt >= 0) return false;
      const name = (tx.merchant_name || tx.name || '').toLowerCase();
      if (!HERO_INC_SOURCES.some(src => name.includes(src))) return false;
      const key = `${tx.date}_${amt.toFixed(2)}`;
      if (heroIncSeen.has(key)) return false;
      heroIncSeen.add(key);
      return true;
    })
    .reduce((s, tx) => s + Math.abs(parseFloat(tx.amount)), 0);

  // Burn rate — real spending only, 3-month average, no CC payments or transfers
  const BURN_EXCLUDE_CATS = ['Bank Transfer','Credit Card Payment','Income/Deposit','ATM/Cash','SocialLoop Revenue','Transfers & Payments'];
  const BURN_EXCLUDE_NAMES = ['american express','amex ach','amex retry','payment thank you','online transfer to','online transfer from','zelle payment to','venmo payment','discover e-payment','bank of america credit card','mobile payment','withdrawal','check #','quickpay with zelle'];
  const burnTx = finAllTx.filter(tx => {
    if (BURN_EXCLUDE_CATS.includes(tx.ai_category)) return false;
    const name = (tx.merchant_name || tx.name || '').toLowerCase();
    return !BURN_EXCLUDE_NAMES.some(ex => name.includes(ex));
  });
  const months = {};
  burnTx.forEach(tx => {
    const m = tx.date?.slice(0,7);
    if (m) months[m] = (months[m]||0) + parseFloat(tx.amount);
  });
  const monthVals = Object.entries(months).sort((a,b)=>a[0]<b[0]?-1:1).slice(-4,-1).map(e=>e[1]); // last 3 COMPLETE months (skip current partial)
  const avgBurn = monthVals.length ? monthVals.reduce((a,b)=>a+b,0)/monthVals.length : 0;
  const runway = avgBurn > 0 && cash > 0 ? (cash/avgBurn).toFixed(1) : null;
  const runwayLabel = runway ? `${runway} months` : cash <= 0 ? 'Overdrawn' : '—';

  // This month's transaction count
  const txThisMonth = finAllTx.filter(tx => tx.date?.startsWith(currentMonth)).length;

  // Real spending this month
  const spendThisMonth = burnTx
    .filter(tx => tx.date?.startsWith(currentMonth))
    .reduce((s, tx) => s + parseFloat(tx.amount), 0);

  const el = document.getElementById('fin-hero');
  if (!el) return;
  el.className = 'fn-hero';
  el.innerHTML = `
    <div class="fn-hero-top">
      <div class="fn-hero-eyebrow">Net Worth</div>
      <div class="fn-hero-actions">
        <button id="fin-sync-btn" class="fn-btn secondary" onclick="plaidSync()">↻ Sync</button>
        <button id="plaid-connect-btn" class="fn-btn primary" onclick="plaidConnect()">+ Connect Bank</button>
      </div>
    </div>
    <div class="fn-hero-line ${net < 0 ? 'negative' : ''}">${finFmt(net)}</div>
    <div class="fn-hero-sub">
      <span>${finAllAccounts.length} accounts · ${txThisMonth} transactions</span>
      ${incomeThisMonth > 0 ? `<span class="divider">·</span><span style="color:var(--accent);font-weight:700">${finFmtAbs(incomeThisMonth)} income</span>` : ''}
      ${spendThisMonth > 0 ? `<span class="divider">·</span><span>${finFmtAbs(spendThisMonth)} spent</span>` : ''}
    </div>
    <div class="fn-hero-stats">
      <div class="fn-hero-stat">
        <div class="fn-hero-stat-lbl">Cash</div>
        <div class="fn-hero-stat-val">${finFmt(cash)}</div>
      </div>
      <div class="fn-hero-stat">
        <div class="fn-hero-stat-lbl">Credit debt</div>
        <div class="fn-hero-stat-val">${finFmt(debt)}</div>
        <div class="fn-hero-stat-sub">${finFmtAbs(avgBurn)}/mo avg burn</div>
      </div>
      <div class="fn-hero-stat">
        <div class="fn-hero-stat-lbl">Runway</div>
        <div class="fn-hero-stat-val">${runwayLabel}</div>
      </div>
    </div>
  `;

  const cntEl = document.getElementById('fin-accts-count');
  if (cntEl) cntEl.textContent = `${finAllAccounts.length} total`;
}

function finRenderAccounts() {
  const grid = document.getElementById('fin-accounts-grid');
  if (!finAllAccounts.length && !finAllPlaidItems.length) { grid.innerHTML='<div class="fin-loading">No accounts connected.</div>'; return; }

  // Muted institution colors — harmonious, not brand-saturated
  const instColor = {
    'American Express':'#4f82b8','Bank of America':'#a04858',
    'Apple Card':'#686878','Chase':'#4878a8','default':'#6d60e8'
  };

  // Find broken connections
  const connectedItemIds = new Set(finAllAccounts.map(a => a.plaid_item_id || a.plaid_items?.id).filter(Boolean));
  const brokenItems = finAllPlaidItems.filter(item =>
    !connectedItemIds.has(item.id) && !item.access_token?.startsWith('manual_')
  );

  // Group accounts by institution
  const groups = {};
  finAllAccounts.forEach(a => {
    const inst = a.plaid_items?.institution_name || 'Other';
    if (!groups[inst]) groups[inst] = [];
    groups[inst].push(a);
  });
  // Sort within each group: depository first, then by balance desc
  Object.values(groups).forEach(g => g.sort((a,b) => {
    if (a.type !== b.type) return a.type==='depository'?-1:1;
    return parseFloat(b.balance_current||0)-parseFloat(a.balance_current||0);
  }));

  // Order institutions: depository-holding ones first, then by total balance
  const instOrder = Object.keys(groups).sort((a,b) => {
    const hasDepA = groups[a].some(x=>x.type==='depository') ? 0 : 1;
    const hasDepB = groups[b].some(x=>x.type==='depository') ? 0 : 1;
    if (hasDepA !== hasDepB) return hasDepA - hasDepB;
    const totalA = groups[a].reduce((s,x)=>s+Math.abs(parseFloat(x.balance_current)||0),0);
    const totalB = groups[b].reduce((s,x)=>s+Math.abs(parseFloat(x.balance_current)||0),0);
    return totalB - totalA;
  });

  function acctCard(a, color) {
    const bal = parseFloat(a.balance_current)||0;
    const avail = parseFloat(a.balance_available);
    const isCredit = a.type==='credit', isOverdrawn = !isCredit && bal<0;
    const balColor = isCredit?'var(--red)':(isOverdrawn?'var(--red)':'var(--green)');
    const limit = isCredit && !isNaN(avail) ? bal+avail : null;
    const util = limit>0 ? Math.min(100,(bal/limit)*100) : null;
    const utilColor = util>80?'var(--red)':util>50?'var(--yellow)':'var(--accent)';
    const subline = isCredit
      ? (limit?`${finFmtAbs(avail)} avail · ${util?.toFixed(0)}% used`:a.subtype||'credit')
      : (isOverdrawn?'OVERDRAWN':`${finFmtAbs(Math.abs(avail||bal))} available`);

    // Payment due badge for credit cards
    let paymentHtml = '';
    if (isCredit && a.payment_due_date) {
      const dueDate = new Date(a.payment_due_date);
      const today = new Date();
      const daysUntil = Math.ceil((dueDate - today) / (1000*60*60*24));
      const isOverdue = daysUntil < 0;
      const isSoon = daysUntil <= 7;
      const dueFmt = dueDate.toLocaleDateString('en-US',{month:'short',day:'numeric'});
      const dueColor = isOverdue?'var(--red)':isSoon?'var(--yellow)':'var(--text-3)';
      const minPmt = a.minimum_payment_amount ? finFmtAbs(parseFloat(a.minimum_payment_amount)) : null;
      paymentHtml = `<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">Min Due</div>
          <div style="font-size:12px;font-weight:700;color:${dueColor}">${minPmt||'—'}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">Due Date</div>
          <div style="font-size:12px;font-weight:600;color:${dueColor}">${isOverdue?'OVERDUE':isSoon?`${dueFmt} (${daysUntil}d)`:dueFmt}</div>
        </div>
      </div>`;
    }

    // Balance display — credit cards show "-$1,234" but "$0" when paid off
    const balStr = isCredit && Math.abs(bal) >= 0.005
      ? '-' + finFmtAbs(bal)
      : finFmtAbs(bal);

    // Recent transactions for this account (by account name match)
    const acctTx = finAllTx
      .filter(tx => tx.bank_accounts?.name === a.name)
      .slice(0, 4);
    const recentTxHtml = acctTx.length === 0
      ? `<div style="font-size:11px;color:var(--text-4);padding:8px 0;font-style:italic;">No recent activity</div>`
      : acctTx.map(tx => {
          const name = tx.merchant_name || tx.name || '';
          const amt = parseFloat(tx.amount) || 0;
          const d = tx.date ? new Date(tx.date + 'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
          return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
            <span style="flex:1;font-size:11px;color:var(--text-2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${name}</span>
            <span style="font-size:10px;color:var(--text-4);font-weight:500;flex-shrink:0;">${d}</span>
            <span style="font-size:11px;color:var(--text);font-weight:700;flex-shrink:0;font-variant-numeric:tabular-nums;">-${finFmtAbs(amt)}</span>
          </div>`;
        }).join('');

    return `<div class="fin-acct-card" onclick="finOpenAccount('${a.id}')" style="cursor:pointer">
      <div class="fin-acct-stripe" style="background:${color}"></div>
      <div class="fin-acct-body">
        <div class="fin-acct-name" title="${a.custom_name||a.name}">${a.custom_name||a.name}</div>
        <div class="fin-acct-bal" style="color:${balColor}">${balStr}</div>
        <div class="fin-acct-sub">${subline}</div>
        ${isOverdrawn?'<div class="fin-alert-badge">⚠ OVERDRAWN</div>':''}
        ${util!==null?`<div class="fin-acct-util"><div class="fin-acct-util-fill" style="width:${util}%;background:${utilColor}"></div></div>`:''}
        ${paymentHtml}
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);">
          <div style="font-size:10px;font-weight:700;letter-spacing:.10em;color:var(--text-3);text-transform:uppercase;margin-bottom:6px;">Recent</div>
          ${recentTxHtml}
        </div>
      </div>
    </div>`;
  }

  const groupHtml = instOrder.map(inst => {
    const color = instColor[inst] || instColor.default;
    const accts = groups[inst];
    const totalDebt = accts.filter(a=>a.type==='credit').reduce((s,a)=>s+parseFloat(a.balance_current||0),0);
    const totalCash = accts.filter(a=>a.type==='depository').reduce((s,a)=>s+parseFloat(a.balance_current||0),0);
    const summaryStr = totalCash > 0
      ? `${finFmt(totalCash)} cash${totalDebt>0?' · -'+finFmtAbs(totalDebt)+' debt':''}`
      : `-${finFmtAbs(totalDebt)} debt`;
    // Show "Enable payment data" button if institution has credit cards but no payment data yet
    const hasCredit = accts.some(a => a.type === 'credit');
    const missingPayment = accts.filter(a => a.type === 'credit').every(a => !a.payment_due_date);
    const instItemId = accts[0]?.plaid_item_id;
    const payDataBtn = (hasCredit && missingPayment && instItemId)
      ? `<button onclick="plaidReconnect('${instItemId}')" title="Reconnect to enable payment due dates &amp; minimum payments" style="font-size:10px;font-weight:700;color:var(--text-2);background:var(--surface-3);border:1px solid var(--border-2);border-radius:100px;padding:6px 12px;cursor:pointer;letter-spacing:.04em;white-space:nowrap;transition:all .18s;text-transform:uppercase;" onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background='var(--surface-3)'">Enable payment data</button>`
      : '';
    return `<div class="fin-inst-group">
      <div class="fin-inst-header">
        <div class="fin-inst-dot" style="background:${color}"></div>
        <div class="fin-inst-label">${inst}</div>
        ${payDataBtn}
        <div class="fin-inst-total">${summaryStr}</div>
      </div>
      <div class="fin-inst-cards">${accts.map(a=>acctCard(a,color)).join('')}</div>
    </div>`;
  }).join('');

  // Broken connections as a group
  const brokenHtml = brokenItems.length ? `<div class="fin-inst-group">
    <div class="fin-inst-header">
      <div class="fin-inst-dot" style="background:var(--red)"></div>
      <div class="fin-inst-label" style="color:var(--red)">Disconnected</div>
    </div>
    <div class="fin-inst-cards">${brokenItems.map(item => {
      const color = instColor[item.institution_name]||instColor.default;
      return `<div class="fin-acct-card" style="border-color:var(--red);opacity:0.8">
        <div class="fin-acct-stripe" style="background:${color}"></div>
        <div class="fin-acct-body">
          <div class="fin-acct-name" style="color:var(--red)">${item.institution_name}</div>
          <div class="fin-acct-sub" style="margin-bottom:10px">Re-authentication required</div>
          <button onclick="plaidReconnect('${item.id}')" style="width:100%;padding:6px 0;background:var(--red);color:white;border:none;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;opacity:.9" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.9'">Reconnect</button>
        </div>
      </div>`;
    }).join('')}</div>
  </div>` : '';

  grid.innerHTML = groupHtml + brokenHtml;
}

function finRenderSpendingChart() {
  const chartEl = document.getElementById('fin-burn-chart');
  const catEl = document.getElementById('fin-cat-breakdown');
  const EXCLUDE_CATS = ['Bank Transfer','Credit Card Payment','Income/Deposit','ATM/Cash','SocialLoop Revenue','Transfers & Payments'];
  const EXCLUDE_NAMES = ['american express','amex ach','amex retry','payment thank you','online transfer to','online transfer from','zelle payment to','venmo payment','discover e-payment','bank of america credit card','mobile payment','withdrawal','check #','quickpay with zelle'];

  // Show everything EXCEPT known transfers/payments
  const realTx = finAllTx.filter(tx => {
    if (EXCLUDE_CATS.includes(tx.ai_category)) return false;
    const name = (tx.merchant_name || tx.name || '').toLowerCase();
    return !EXCLUDE_NAMES.some(ex => name.includes(ex));
  });

  // Monthly spend + income bars
  const spendByMonth = {};
  const incomeByMonth = {};
  realTx.forEach(tx => {
    const m = tx.date?.slice(0,7);
    if (!m) return;
    const amt = parseFloat(tx.amount);
    if (amt > 0) spendByMonth[m] = (spendByMonth[m]||0) + amt;
  });
  // Income — whitelist known income sources only
  const INCOME_SOURCES = ['wise being','bolinas','venmo'];
  const seenIncome = new Set();
  finAllTxRaw.forEach(tx => {
    const m = tx.date?.slice(0,7);
    if (!m) return;
    const amt = parseFloat(tx.amount);
    if (amt >= 0) return;
    const name = (tx.merchant_name || tx.name || '').toLowerCase();
    if (!INCOME_SOURCES.some(src => name.includes(src))) return;
    // Dedup by date + amount (same deposit shows across multiple linked accounts)
    const key = `${tx.date}_${amt.toFixed(2)}`;
    if (seenIncome.has(key)) return;
    seenIncome.add(key);
    incomeByMonth[m] = (incomeByMonth[m]||0) + Math.abs(amt);
  });
  const allMonths = [...new Set([...Object.keys(spendByMonth), ...Object.keys(incomeByMonth)])].sort().slice(-6);
  const entries = allMonths.map(m => [m, spendByMonth[m]||0, incomeByMonth[m]||0]);
  const maxVal = Math.max(...entries.map(e=>Math.max(e[1],e[2])),1);
  const MONTH = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const trend = entries.length>=2 ? entries[entries.length-1][1]-entries[entries.length-2][1] : 0;
  const tEl = document.getElementById('fin-burn-trend');
  if (tEl) tEl.textContent = trend>0 ? `↑ ${finFmtAbs(trend)} vs prev` : `↓ ${finFmtAbs(Math.abs(trend))} vs prev`;

  if (chartEl) chartEl.innerHTML = entries.map(([m,spend,income])=>{
    const spendPct=(spend/maxVal)*100;
    const incomePct=(income/maxVal)*100;
    const lbl=MONTH[parseInt(m.slice(5,7))-1]+"'"+m.slice(2,4);
    return `<div class="fin-bar-wrap" onclick="finFilterByCat('all',null,'${m}')" style="cursor:pointer" title="View ${lbl} transactions">
      <div class="fin-bar-pair">
        <div class="fin-bar-col">
          <div class="fin-bar-val">${finFmtAbs(spend)}</div>
          <div class="fin-bar" style="height:${spendPct}%;background:var(--text-3)"></div>
        </div>
        <div class="fin-bar-col">
          <div class="fin-bar-val income">${finFmtAbs(income)}</div>
          <div class="fin-bar" style="height:${incomePct}%;background:var(--accent)"></div>
        </div>
      </div>
      <div class="fin-bar-month">${lbl}</div>
    </div>`;
  }).join('');

  // Category breakdown — current month only, real spending
  const now = new Date();
  const currentMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const thisMonthTx = realTx.filter(tx => tx.date?.startsWith(currentMonth));
  const catTotals = {};
  thisMonthTx.forEach(tx => {
    const cat = tx.ai_category || 'Other';
    catTotals[cat] = (catTotals[cat]||0) + parseFloat(tx.amount);
  });
  const totalSpend = Object.values(catTotals).reduce((a,b)=>a+b,0);
  const topCats = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxCat = topCats[0]?.[1]||1;

  if (catEl) catEl.innerHTML = topCats.map(([cat,total])=>{
    const pct = (total/totalSpend*100).toFixed(1);
    const barPct = (total/maxCat*100).toFixed(1);
    return `<div class="fin-cat-row" onclick="finFilterByCat('${cat.replace(/'/g,"\\'")}',null,'${currentMonth}')">
      <span style="flex:1;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${cat}</span>
      <div style="flex:1;height:3px;background:var(--surface-3);border-radius:2px;overflow:hidden;margin:0 12px">
        <div style="height:100%;width:${barPct}%;background:var(--accent);border-radius:2px"></div>
      </div>
      <span style="font-size:11px;color:var(--text-4);min-width:36px;text-align:right;font-variant-numeric:tabular-nums">${pct}%</span>
      <span style="font-size:13px;font-weight:700;color:var(--text);min-width:80px;text-align:right;font-variant-numeric:tabular-nums">${finFmtAbs(total)}</span>
    </div>`;
  }).join('');
}

function finRenderCategoryPills() {
  const el = document.getElementById('fin-cat-pills');
  if (!el) return;
  const cats = [...new Set(finAllTx.map(tx=>tx.ai_category||'Other'))].sort();
  const allPill = `<button class="fin-cat-pill active" onclick="finFilterByCat('all',this)">All (${finAllTx.length})</button>`;
  const pills = cats.map(cat => {
    const cnt = finAllTx.filter(tx=>(tx.ai_category||'Other')===cat).length;
    const emoji = CAT_EMOJI[cat]||'💳';
    return `<button class="fin-cat-pill" onclick="finFilterByCat('${cat.replace(/'/g,"\\'")}',this)">${emoji} ${cat} <span style="opacity:.6">${cnt}</span></button>`;
  }).join('');
  el.innerHTML = allPill + pills;
}

function finClearFilters() {
  finActiveCat = 'all';
  finActiveMonth = '';
  document.querySelectorAll('.fin-cat-pill').forEach(p=>p.classList.remove('active'));
  const allPill = document.querySelector('.fin-cat-pill');
  if (allPill) allPill.classList.add('active');
  finFilterTx();
}

function finFilterByCat(cat, btn, month) {
  finActiveCat = cat;
  finActiveMonth = month || '';
  document.querySelectorAll('.fin-cat-pill').forEach(p=>p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else {
    const allPills = document.querySelectorAll('.fin-cat-pill');
    allPills.forEach(p=>{ if(p.textContent.trim().startsWith('All') && cat==='all') p.classList.add('active'); });
  }
  finFilterTx();
  // Scroll to transactions
  const txList = document.getElementById('fin-tx-list');
  if (txList) txList.scrollIntoView({behavior:'smooth', block:'start'});
}

function finFilterTx() {
  const search = (document.getElementById('fin-search')?.value||'').toLowerCase();
  const acct   = document.getElementById('fin-acct-filter')?.value||'';
  const el     = document.getElementById('fin-tx-list');
  if (!el) return;

  const filtered = finAllTx.filter(tx => {
    const name = (tx.merchant_name||tx.name||'').toLowerCase();
    const acctName = tx.bank_accounts?.name||'';
    const cat = tx.ai_category||'Other';
    if (search && !name.includes(search)) return false;
    if (acct && acctName!==acct) return false;
    if (finActiveCat!=='all' && cat!==finActiveCat) return false;
    if (finActiveMonth && tx.date && !tx.date.startsWith(finActiveMonth)) return false;
    return true;
  });

  // Show active filter indicator
  const labelEl = document.getElementById('fin-tx-section-label');
  if (labelEl) {
    if (finActiveMonth || finActiveCat !== 'all') {
      const parts = [];
      if (finActiveCat !== 'all') parts.push(finActiveCat);
      if (finActiveMonth) {
        const d = new Date(finActiveMonth + '-01T12:00:00');
        parts.push(d.toLocaleDateString('en-US',{month:'long', year:'numeric'}));
      }
      labelEl.innerHTML = `${parts.join(' · ')} <span style="font-size:11px;color:var(--accent);cursor:pointer;font-weight:600;margin-left:8px" onclick="finClearFilters()">Clear</span>`;
    } else {
      labelEl.textContent = 'Recent activity';
    }
  }

  // Populate account filter on first run
  const sel = document.getElementById('fin-acct-filter');
  if (sel && sel.options.length <= 1) {
    const names = [...new Set(finAllTx.map(tx=>tx.bank_accounts?.name).filter(Boolean))];
    sel.innerHTML = '<option value="">All accounts</option>' + names.map(n=>`<option value="${n}">${n}</option>`).join('');
  }

  if (!filtered.length) { el.innerHTML='<div class="fin-loading">No transactions match.</div>'; return; }

  // Group by date
  const byDate = {};
  filtered.forEach(tx => { (byDate[tx.date]=[...byDate[tx.date]||[],tx]); });
  const sortedDates = Object.keys(byDate).sort((a,b)=>b.localeCompare(a));

  el.innerHTML = sortedDates.map(date => {
    const dayTotal = byDate[date].reduce((s,tx)=>s+parseFloat(tx.amount),0);
    const label = new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    const rows = byDate[date].map(tx => {
      const amt = parseFloat(tx.amount);
      const cat = tx.ai_category||'Other';
      const emoji = CAT_EMOJI[cat]||'💳';
      const color = CAT_COLOR[cat]||'#71717a';
      const acctName = tx.bank_accounts?.name||'';
      const isOpen = tx.id === finOpenTxId;
      return `<div class="fin-tx-row${isOpen?' fin-tx-open':''}" onclick="finToggleTx('${tx.id}',this)" id="ftx-${tx.id}">
        <div class="fin-tx-icon" style="background:${color}22;color:${color}">${emoji}</div>
        <div class="fin-tx-info">
          <div class="fin-tx-name">${tx.merchant_name||tx.name}</div>

async function plaidSync() {
  const btn = document.getElementById('fin-sync-btn');
  if (btn) { btn.textContent = '↻ Syncing…'; btn.disabled = true; }
  try {
    const res = await fetch(FN('plaid-sync'), { method: 'POST', headers: { Authorization: `Bearer ${SUPABASE_ANON}`, apikey: SUPABASE_ANON } });
    const data = await res.json();
    if (data.success || data.transactions !== undefined) {
      // Show per-institution results
      if (data.details) {
        const lines = data.details.map(d => {
          if (d.error || d.txError) return `⚠️ ${d.institution}: ${d.error || d.txError}`;
          return `✅ ${d.institution}: ${d.accounts} accounts, ${d.transactions} txns`;
        });
        const errorItems = data.details.filter(d => d.error || d.txError);
        if (errorItems.length) {
          const msg = lines.join('\n') + '\n\n' + errorItems.map(d=>`${d.institution} error: ${d.error||d.txError}`).join('\n');
          console.warn('Sync details:', msg);
          // Show in UI non-intrusively
          const sub = document.getElementById('fin-hero-sub');
          if (sub) sub.textContent = `⚠️ ${errorItems.map(d=>d.institution).join(', ')}: connection issue — try reconnecting`;
        }
      }
      finLoaded = false;
      await renderFinance();
    } else { alert('Sync error: '+(data.error||JSON.stringify(data))); }
  } catch(e) { alert('Sync failed: '+e.message); }
  finally { if (btn) { btn.textContent='↻ Sync'; btn.disabled=false; } }
}

async function plaidConnect(receivedRedirectUri) {
  const btn = document.getElementById('plaid-connect-btn');
  if (btn) { btn.textContent='Connecting…'; btn.disabled=true; }
  try {
    const res = await fetch(FN('plaid-create-link-token'), { method: 'POST', headers: { Authorization: `Bearer ${SUPABASE_ANON}` } });
    const { link_token, error } = await res.json();
    if (error) throw new Error(error.message||JSON.stringify(error));
    const config = {
      token: link_token,
      onSuccess: async (public_token, metadata) => {
        if (btn) btn.textContent='Saving…';
        await fetch(FN('plaid-exchange-token'), {
          method:'POST', headers:{'Content-Type':'application/json',Authorization:`Bearer ${SUPABASE_ANON}`},
          body: JSON.stringify({public_token, institution_id:metadata.institution.institution_id, institution_name:metadata.institution.name})
        });
        finLoaded=false; await plaidSync();
        if (btn) { btn.textContent='+ Connect Bank'; btn.disabled=false; }
        history.replaceState({},'',window.location.pathname);
      },
      onExit: (err,metadata) => {
        if (btn) { btn.textContent='+ Connect Bank'; btn.disabled=false; }
        if (err) alert('Plaid error:\n'+JSON.stringify(err,null,2)+'\n\nMetadata:\n'+JSON.stringify(metadata,null,2));
      }
    };
    if (receivedRedirectUri) config.receivedRedirectUri = receivedRedirectUri;
    const handler = Plaid.create(config);
    handler.open();
  } catch(e) {
    alert('Error: '+e.message);
    if (btn) { btn.textContent='+ Connect Bank'; btn.disabled=false; }
  }
}

async function plaidReconnect(plaidItemId) {
  // Find the access token for this item
  const item = finAllPlaidItems.find(i => i.id === plaidItemId);
  if (!item) { alert('Item not found'); return; }

  // Manual items (e.g. Apple Card manual entry) need a fresh connection, not update mode
  const isManual = item.access_token?.startsWith('manual_');

  try {
    const body = isManual ? {} : { access_token: item.access_token };
    const res = await fetch(FN('plaid-create-link-token'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${SUPABASE_ANON}` },
      body: JSON.stringify(body)
    });
    const { link_token, error } = await res.json();
    if (error) throw new Error(error.message || JSON.stringify(error));

    const config = {
      token: link_token,
      onSuccess: async (public_token, metadata) => {
        if (isManual) {
          // Exchange token to create a real Plaid item
          await fetch(FN('plaid-exchange-token'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${SUPABASE_ANON}` },
            body: JSON.stringify({ public_token, institution_id: metadata.institution.institution_id, institution_name: metadata.institution.name })
          });
          // Delete the old manual plaid item (cascades to bank_accounts + transactions)
          await fetch(`${SUPABASE_URL}/rest/v1/plaid_items?id=eq.${plaidItemId}`, {
            method: 'DELETE',
            headers: { Authorization: `Bearer ${SUPABASE_ANON}`, apikey: SUPABASE_ANON }
          });
        }
        // Re-sync finance data
        finLoaded = false;
        await plaidSync();
      },
      onExit: (err) => {
        if (err) console.error('Plaid reconnect exit:', err);
      }
    };
    const handler = Plaid.create(config);
    handler.open();
  } catch(e) {
    alert('Reconnect error: ' + e.message);
  }
}

async function uploadTaxDoc(input, year) {
  const files = Array.from(input.files);
  if (!files.length) return;
  const label = input.closest('label');
  const orig = label?.childNodes[0]?.textContent;
  if (label) label.childNodes[0].textContent = `⏳ ${files.length > 1 ? `0/${files.length}` : '...'}`;

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    if (label && files.length > 1) label.childNodes[0].textContent = `⏳ ${i+1}/${files.length}`;
    const ts = Date.now() + i;
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const filePath = `${year}/${ts}_${safeName}`;

    // Detect doc type from filename
    let docType = 'Other';
    const fn = file.name.toUpperCase();
    if (fn.includes('1099-K') || fn.includes('1099K')) docType = '1099-K';
    else if (fn.includes('1099-NEC') || fn.includes('1099NEC')) docType = '1099-NEC';
    else if (fn.includes('1099-INT')) docType = '1099-INT';
    else if (fn.includes('W-2') || fn.includes('W2')) docType = 'W-2';
    else if (fn.includes('SCHEDULE') || fn.includes('SCHC')) docType = 'Schedule C';
    else if (fn.includes('EXPENSE') || fn.includes('RECEIPT')) docType = 'Receipt/Expense';

    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/tax-docs/${filePath}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`, 'Content-Type': file.type || 'application/octet-stream', 'x-upsert': 'true' },
      body: file,
    });
    if (!uploadRes.ok) { alert(`Upload failed: ${file.name}`); continue; }

    await fetch(`${SUPABASE_URL}/rest/v1/tax_documents`, {
      method: 'POST',
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({ tax_year: year, file_name: file.name, file_path: filePath, document_type: docType, file_size_bytes: file.size }),
    });
  }

  if (label) label.childNodes[0].textContent = orig;
  renderTaxes();
}

async function openTaxDoc(e, filePath) {
  e.preventDefault();
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/authenticated/tax-docs/${filePath}`, {
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
  });
  if (!res.ok) { alert('Could not open file'); return; }
  window.open(URL.createObjectURL(await res.blob()), '_blank');
}

async function deleteTaxDoc(docId, filePath, year) {
  if (!confirm('Delete this document?')) return;
  await fetch(`${SUPABASE_URL}/storage/v1/object/tax-docs/${filePath}`, {
    method: 'DELETE', headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }

  await fetch(`${SUPABASE_URL}/rest/v1/tax_documents?id=eq.${docId}`, {
    method: 'DELETE', headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
  });
  renderTaxes();
}
