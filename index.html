<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PersonalOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ═══════════════════════════════════════════
   PersonalOS — Quiet Luxury design system
   ═══════════════════════════════════════════ */

:root{
  /* ═══ MONOCHROME + ONE SIGNATURE ═══
     The entire OS uses exactly three tones: black, white, amber.
     "Semantic" colors (green/red/etc.) are aliased to text or accent
     so existing inline styles cascade into the mono system. */

  /* Canvas — true near-black, one elevation */
  --bg:#0a0a0a;
  --surface:#141414;
  --surface-2:#1c1c1c;
  --surface-3:#262626;
  --surface-4:#303030;

  /* Hairlines */
  --border:rgba(255,255,255,0.07);
  --border-2:rgba(255,255,255,0.12);
  --border-3:rgba(255,255,255,0.18);

  /* Ink — pure grayscale ramp */
  --text:#fafafa;
  --text-1:#fafafa;
  --text-2:#a3a3a3;
  --text-3:#6b6b6b;
  --text-4:#454545;

  /* THE signature — warm amber */
  --accent:#e8b86d;
  --accent-2:#f0c78a;
  --accent-dim:rgba(232,184,109,0.11);
  --accent-glow:rgba(232,184,109,0.26);

  /* Semantic aliases — EVERYTHING collapses to mono or accent.
     Positive / confirmed → accent (the brand carries "good")
     Neutral / info → text-2 gray
     Destructive / warning → accent (sparingly) */
  --green:var(--text);          /* done reads as full-strength text */
  --green-dim:rgba(255,255,255,0.06);
  --red:var(--text-2);          /* destructive = quiet gray, not alarm */
  --red-dim:rgba(255,255,255,0.05);
  --yellow:var(--accent);       /* warnings → signature */
  --yellow-dim:var(--accent-dim);
  --blue:var(--text-2);
  --blue-dim:rgba(255,255,255,0.05);
  --pink:var(--text-2);
  --pink-dim:rgba(255,255,255,0.05);
  --orange:var(--accent);       /* warmth → signature */
  --orange-dim:var(--accent-dim);
  --purple:var(--accent);       /* purple → signature (kills old indigo memory) */
  --purple-dim:var(--accent-dim);

  /* Type */
  --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --serif:'Iowan Old Style','Charter','Hoefler Text','New York','Palatino','Georgia',serif;

  /* Radii */
  --r-xs:6px;
  --r-sm:10px;
  --r:14px;
  --r-lg:18px;
  --r-xl:22px;
  --r-2xl:28px;

  /* Shadows */
  --shadow-sm:0 1px 2px rgba(0,0,0,.4);
  --shadow:0 8px 32px rgba(0,0,0,.40),0 1px 2px rgba(0,0,0,.5);
  --shadow-lg:0 32px 80px rgba(0,0,0,.60),0 2px 6px rgba(0,0,0,.5);
  --glow:0 0 48px rgba(232,184,109,0.12);

  /* Motion */
  --ease:cubic-bezier(0.16,1,0.3,1);
}

/* LIGHT MODE — warm paper, pure mono + amber */
[data-theme="light"]{
  --bg:#fafaf7;
  --surface:#ffffff;
  --surface-2:#f4f2ed;
  --surface-3:#eae7df;
  --surface-4:#ddd9cd;
  --border:rgba(20,20,20,0.07);
  --border-2:rgba(20,20,20,0.12);
  --border-3:rgba(20,20,20,0.20);
  --text:#0a0a0a;
  --text-1:#0a0a0a;
  --text-2:#525252;
  --text-3:#737373;
  --text-4:#a3a3a3;
  --accent:#a06c1a;
  --accent-2:#b07e22;
  --accent-dim:rgba(160,108,26,0.10);
  --accent-glow:rgba(160,108,26,0.18);
  --green:var(--text);
  --green-dim:rgba(20,20,20,0.05);
  --red:var(--text-2);
  --red-dim:rgba(20,20,20,0.05);
  --yellow:var(--accent);
  --yellow-dim:var(--accent-dim);
  --blue:var(--text-2);
  --blue-dim:rgba(20,20,20,0.05);
  --pink:var(--text-2);
  --pink-dim:rgba(20,20,20,0.05);
  --orange:var(--accent);
  --orange-dim:var(--accent-dim);
  --purple:var(--accent);
  --purple-dim:var(--accent-dim);
  --shadow-sm:0 1px 2px rgba(20,20,20,.06);
  --shadow:0 8px 32px rgba(20,20,20,.08),0 1px 3px rgba(20,20,20,.05);
  --shadow-lg:0 32px 80px rgba(20,20,20,.12),0 2px 6px rgba(20,20,20,.06);
}
[data-theme="light"] .glow,[data-theme="light"] .glow-2{opacity:.5}
[data-theme="light"] .topnav{background:rgba(250,248,243,0.82)}


html{font-family:var(--sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;scroll-behavior:smooth;font-feature-settings:'cv11','ss01','ss03'}
body{min-height:100dvh;overflow-x:hidden;background:var(--bg);font-variant-numeric:tabular-nums;letter-spacing:-0.003em}

/* AMBIENT GLOW */
.glow{position:fixed;top:-500px;left:50%;transform:translateX(-50%);width:1400px;height:900px;background:radial-gradient(ellipse,rgba(232,184,109,0.055) 0%,transparent 55%);pointer-events:none;z-index:0}
.glow-2{position:fixed;bottom:-400px;right:-200px;width:800px;height:600px;background:radial-gradient(ellipse,rgba(232,184,109,0.03) 0%,transparent 60%);pointer-events:none;z-index:0;display:block}

/* TOP NAV */
.topnav{position:sticky;top:0;z-index:200;background:rgba(10,10,12,0.72);backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);border-bottom:1px solid var(--border);padding:0 32px}
.topnav-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:4px;height:64px;overflow-x:auto;scrollbar-width:none}
.topnav-inner::-webkit-scrollbar{display:none}
.topnav-logo{font-size:15px;font-weight:700;letter-spacing:-0.025em;margin-right:28px;flex-shrink:0;color:var(--text)}
.topnav-logo span{color:var(--accent);font-weight:500}
.nav-item{display:flex;align-items:center;gap:7px;padding:8px 14px;font-size:13px;font-weight:500;color:var(--text-3);cursor:pointer;border-radius:10px;transition:all .18s var(--ease);text-decoration:none;white-space:nowrap;border:none;flex-shrink:0;letter-spacing:-0.005em;background:transparent}
.nav-item:hover{color:var(--text);background:var(--surface-2)}
.nav-item.active{color:var(--accent);background:var(--accent-dim);box-shadow:inset 0 0 0 1px rgba(232,184,109,0.18)}
.nav-item .nav-icon{font-size:14px}

/* MAIN */
.main{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:48px 32px 140px}

@media(max-width:768px){
  .main{padding:28px 18px 96px}
  .topnav{padding:0 16px}
  .topnav-inner{height:56px}
  .topnav-logo{margin-right:14px;font-size:14px}
}

.page{display:none;animation:fadeUp .45s var(--ease) forwards}
.page.active{display:block}

.page-title{font-size:11px;font-weight:600;color:var(--text-3);display:flex;align-items:center;gap:12px;margin-bottom:36px;letter-spacing:0.10em;text-transform:uppercase}
.page-title::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent-glow),0 0 4px var(--accent)}
.page-title .icon{display:none}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid .full{grid-column:1/-1}
@media(max-width:768px){.grid{grid-template-columns:1fr}.grid .full{grid-column:1}}

/* ═══ PROJECTS — home ═══ */
.pj-hero{margin-bottom:56px;padding-top:8px}
.pj-hero-greeting{font-size:13px;color:var(--text-3);font-weight:500;letter-spacing:-0.005em;margin-bottom:4px}
.pj-hero-greeting strong{color:var(--text-2);font-weight:600}
.pj-hero-date{font-size:13px;color:var(--text-4);font-weight:500;margin-bottom:32px}
.pj-hero-line{font-size:40px;font-weight:800;line-height:1.15;letter-spacing:-0.03em;color:var(--text);max-width:820px}
.pj-hero-line .accent{color:var(--accent)}
.pj-hero-line .muted{color:var(--text-3);font-weight:500}
.pj-hero-sub{display:flex;align-items:center;gap:14px;margin-top:20px;font-size:13px;color:var(--text-3);font-weight:500}
.pj-hero-sub .divider{color:var(--text-4)}
.pj-hero-sub .trend-up{color:var(--accent);font-weight:700}
.pj-hero-sub .trend-flat{color:var(--text-3)}

.pj-today{margin-bottom:56px}
.pj-section-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3)}
.pj-section-label .count{color:var(--text-4)}
.pj-today-list{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.pj-today-task{display:flex;align-items:center;gap:18px;padding:22px 28px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .18s var(--ease)}
.pj-today-task:last-child{border-bottom:none}
.pj-today-task:hover{background:var(--surface-2)}
.pj-today-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border-3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s var(--ease)}
.pj-today-task:hover .pj-today-check{border-color:var(--accent)}
.pj-today-name{flex:1;font-size:16px;font-weight:600;color:var(--text);letter-spacing:-0.01em;line-height:1.35}
.pj-today-proj{font-size:11px;font-weight:600;color:var(--text-3);letter-spacing:0.05em;text-transform:uppercase;white-space:nowrap}
.pj-today-impact{width:32px;text-align:right;font-size:11px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.pj-today-empty{padding:44px 28px;text-align:center;color:var(--text-4);font-size:14px;font-style:italic}

.pj-grid-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3)}
.pj-grid-header #pj-grid-meta{color:var(--text-4);font-weight:600}

#pj-archive-link{margin-top:28px;display:flex;justify-content:center}
.pj-archive-btn{padding:10px 22px;border-radius:100px;background:transparent;border:1px solid var(--border);color:var(--text-3);font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all .18s var(--ease)}
.pj-archive-btn:hover{background:var(--surface-2);color:var(--text-2);border-color:var(--border-2)}


/* ═══ TASKS PAGE (Tab 2) ═══ */
.tk-page{max-width:860px;margin:0 auto}
.tk-hero{margin-bottom:56px;padding-top:8px}
.tk-hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:18px}
.tk-hero-line{font-size:36px;font-weight:800;letter-spacing:-0.03em;line-height:1.15;color:var(--text);max-width:720px}
.tk-hero-line .accent{color:var(--accent)}
.tk-hero-line .muted{color:var(--text-3);font-weight:500}
.tk-hero-sub{display:flex;align-items:center;gap:14px;margin-top:20px;font-size:13px;color:var(--text-3);font-weight:500}
.tk-hero-sub .divider{color:var(--text-4)}
.tk-hero-sub .trend-up{color:var(--accent);font-weight:700}

.tk-section{margin-bottom:44px}
.tk-section:last-child{margin-bottom:0}
.tk-section-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3)}
.tk-section-label .count{color:var(--text-4);font-weight:600}
.tk-section-label.overdue{color:var(--accent)}
.tk-section.collapsible .tk-section-label{cursor:pointer;user-select:none;transition:color .18s}
.tk-section.collapsible .tk-section-label:hover{color:var(--text-2)}

.tk-list{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.tk-row{display:flex;align-items:center;gap:18px;padding:22px 28px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .18s var(--ease)}
.tk-row:last-child{border-bottom:none}
.tk-row:hover{background:var(--surface-2)}
.tk-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border-3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s var(--ease);background:transparent}
.tk-row:hover .tk-check{border-color:var(--accent)}
.tk-row.in-progress .tk-check{border-color:var(--accent)}
.tk-row.in-progress .tk-check::after{content:'';width:8px;height:8px;background:var(--accent);border-radius:50%}
.tk-row.done .tk-check{background:var(--accent);border-color:var(--accent)}
.tk-row.done .tk-check::after{content:'✓';font-size:11px;color:var(--bg);font-weight:800}
.tk-name{flex:1;font-size:15px;font-weight:500;color:var(--text);letter-spacing:-0.005em;line-height:1.4;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tk-row.done .tk-name{color:var(--text-4);text-decoration:line-through}
.tk-row.in-progress .tk-name{color:var(--text);font-weight:600}
.tk-proj{font-size:10px;font-weight:700;color:var(--text-3);letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.tk-meta{display:flex;align-items:center;gap:14px;flex-shrink:0}
.tk-impact{font-size:11px;font-weight:700;color:var(--text-4);font-variant-numeric:tabular-nums;width:24px;text-align:right}
.tk-impact.high{color:var(--accent)}
.tk-due{font-size:11px;color:var(--text-4);font-weight:600;white-space:nowrap;min-width:52px;text-align:right;font-variant-numeric:tabular-nums}
.tk-due.overdue{color:var(--accent);font-weight:800}
.tk-due.today{color:var(--text);font-weight:700}
.tk-empty{padding:48px 28px;text-align:center;color:var(--text-4);font-size:14px;font-style:italic}
.tk-section-body.collapsed{display:none}

@media(max-width:768px){
  .tk-hero-line{font-size:26px}
  .tk-row{padding:16px 18px;gap:12px}
  .tk-name{font-size:14px}
  .tk-proj{max-width:90px;font-size:9px}
  .tk-meta{gap:10px}
}

.pj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.pj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px 30px;cursor:pointer;transition:all .22s var(--ease);display:flex;flex-direction:column;min-height:220px;position:relative}
.pj-card:hover{border-color:var(--border-2);background:var(--surface-2)}
.pj-card-name{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.02em;line-height:1.25;margin-bottom:12px}
.pj-card-becoming{font-size:13px;color:var(--text-3);font-style:italic;line-height:1.6;letter-spacing:-0.005em;flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:22px}
.pj-card-foot{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-top:auto}
.pj-card-become{display:flex;align-items:baseline;gap:8px}
.pj-card-become-lbl{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-4)}
.pj-card-become-val{font-size:26px;font-weight:800;letter-spacing:-0.03em;color:var(--text);line-height:1;font-variant-numeric:tabular-nums}
.pj-card-trend{font-size:12px;font-weight:700;color:var(--accent)}
.pj-card-trend.flat{color:var(--text-4)}
.pj-card-bar{height:2px;background:var(--surface-3);border-radius:2px;overflow:hidden;margin-top:14px}
.pj-card-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .6s var(--ease)}
.pj-card-tasks-hint{font-size:11px;color:var(--text-4);margin-top:10px;font-weight:500;font-variant-numeric:tabular-nums}
.pj-map{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin:14px 0}
/* Archive-view fallbacks */
.pj-card-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pj-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex-shrink:0}
.pj-name{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.01em}

@media(max-width:1024px){.pj-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .pj-grid{grid-template-columns:1fr;gap:10px}
  .pj-hero-line{font-size:28px}
  .pj-today-task{padding:18px 20px;gap:14px}
  .pj-today-name{font-size:14px}
}

/* ═══ PROJECT DETAIL ═══ */
.pd-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow)}
.pd-hero-bar{display:none}
.pd-hero-body{padding:48px 48px 40px}
.pd-hero-title{display:flex;align-items:center;gap:18px;margin-bottom:24px}
.pd-hero-name{font-size:42px;font-weight:800;letter-spacing:-0.035em;line-height:1.05;color:var(--text)}
.pd-hero-badges{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}
.pd-hero-badge{padding:7px 16px;border-radius:100px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;background:var(--surface-2);color:var(--text-2);border:1px solid var(--border)}
.pd-becoming{font-size:17px;color:var(--text-2);font-style:italic;line-height:1.7;border-top:1px solid var(--border);padding-top:28px;margin-top:4px;letter-spacing:-0.005em;max-width:720px}
.pd-becoming strong{color:var(--text-4);font-style:normal;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.10em;display:block;margin-bottom:12px}
.pd-scores-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border)}
.pd-score{background:var(--surface);padding:36px 24px;text-align:center}
.pd-score-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:16px;color:var(--text-4)}
.pd-score-val{font-size:56px;font-weight:800;line-height:1;letter-spacing:-0.04em;color:var(--text)}
.pd-score-sub{font-size:11px;color:var(--text-3);margin-top:12px;font-weight:500}
.pd-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.pd-section-hdr{padding:28px 36px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
.pd-section-title{font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:0.10em;text-transform:uppercase}
.pd-task-tabs{display:flex;gap:4px;flex-wrap:wrap;background:var(--surface-2);padding:4px;border-radius:12px}
.pd-tab{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;color:var(--text-3);cursor:pointer;border:none;background:none;transition:all .18s var(--ease)}
.pd-tab:hover{color:var(--text-2)}
.pd-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm)}
.pd-task-row{display:flex;align-items:center;gap:18px;padding:20px 32px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .18s var(--ease)}
.pd-task-row:last-child{border-bottom:none}
.pd-task-row:hover{background:var(--surface-2)}
.pd-task-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.pd-task-name{flex:1;font-size:15px;font-weight:500;line-height:1.4;letter-spacing:-0.005em;min-width:0}
.pd-task-name.done{color:var(--text-4);text-decoration:line-through}
.pd-task-meta{display:flex;align-items:center;gap:10px;flex-shrink:0}
/* Impact badge — monochrome + amber. Higher impact = amber (signature). */
.pd-impact{font-size:10px;font-weight:700;padding:5px 12px;border-radius:100px;letter-spacing:0.06em;text-transform:uppercase;background:var(--surface-2);color:var(--text-3);border:1px solid var(--border)}
.pd-impact.peak{background:var(--accent-dim);color:var(--accent);border-color:rgba(232,184,109,0.22)}
.pd-impact.high{background:var(--surface-3);color:var(--text-2);border-color:var(--border-2)}
.pd-due{font-size:10px;font-weight:700;padding:5px 12px;border-radius:100px;letter-spacing:0.04em;background:var(--surface-2);color:var(--text-3);border:1px solid var(--border);font-variant-numeric:tabular-nums;white-space:nowrap}
.pd-due.overdue{background:var(--accent-dim);color:var(--accent);border-color:rgba(232,184,109,0.22)}
.pd-due.today{background:var(--surface-3);color:var(--text);border-color:var(--border-2)}
.pd-due.empty{color:var(--text-4);background:transparent;border-color:transparent;padding-left:0;padding-right:0}
.pj-today-due{font-size:11px;font-weight:600;color:var(--text-3);font-variant-numeric:tabular-nums;white-space:nowrap;min-width:56px;text-align:right}
.pj-today-due.overdue{color:var(--accent);font-weight:800}
.pj-today-due.today{color:var(--text);font-weight:700}
.pj-today-due.empty{color:var(--text-4)}
.pd-priority{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-4);letter-spacing:0.08em}
.pd-notes{padding:28px 32px;font-size:15px;color:var(--text-2);line-height:1.8;white-space:pre-wrap}
.pd-empty{padding:72px 32px;text-align:center;color:var(--text-4);font-size:14px}
.pd-back{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;font-size:13px;font-weight:600;color:var(--text-2);background:var(--surface);border:1px solid var(--border);border-radius:100px;cursor:pointer;margin-bottom:28px;transition:all .18s var(--ease)}
.pd-back:hover{color:var(--text);border-color:var(--border-2);background:var(--surface-2);transform:translateX(-2px)}

/* ═══ CARDS ═══ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:32px;margin-bottom:14px;position:relative;overflow:hidden;transition:border-color .25s var(--ease)}
.card:hover{border-color:var(--border-2)}
.card-glow{border-color:rgba(232,184,109,0.18);box-shadow:var(--shadow),var(--glow)}
.card-glow::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(232,184,109,0.55),transparent)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.card-title{font-size:10px;font-weight:700;letter-spacing:0.10em;color:var(--text-3);text-transform:uppercase}
.card-badge{font-size:10px;padding:4px 11px;border-radius:100px;font-weight:700;letter-spacing:0.04em}
.card-value{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.01em}

/* ═══ STATS ═══ */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.stat-box{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:22px 16px;text-align:center}
.stat-val{font-size:28px;font-weight:800;letter-spacing:-0.035em;line-height:1.1;color:var(--text)}
.stat-label{font-size:10px;font-weight:600;color:var(--text-3);margin-top:6px;letter-spacing:0.06em;text-transform:uppercase}

/* ═══ MACRO RINGS ═══ */
.rings-row{display:flex;justify-content:space-around;padding:12px 0}
.ring-item{display:flex;flex-direction:column;align-items:center;gap:6px}
.ring-svg{width:88px;height:88px}
.ring-bg{fill:none;stroke:rgba(255,255,255,0.05);stroke-width:4}
.ring-fg{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .7s var(--ease)}
.ring-text{font-size:14px;font-weight:800;fill:var(--text);text-anchor:middle;dominant-baseline:central;letter-spacing:-0.02em}
.ring-label{font-size:10px;color:var(--text-4);font-weight:600;letter-spacing:0.04em;text-transform:uppercase}

/* ═══ CHART ═══ */
.chart-wrap{position:relative;width:100%;height:280px;margin:12px 0}
.chart-wrap canvas{width:100%!important;height:100%!important;display:block}

/* ═══ LOG ITEMS ═══ */
.log-item{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)}
.log-item:last-child{border-bottom:none}
.log-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--surface-2)}
.log-main{flex:1;min-width:0}
.log-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.005em}
.log-sub{font-size:11px;color:var(--text-3);font-weight:500;margin-top:2px}
.log-right{text-align:right;flex-shrink:0}
.log-val{font-size:15px;font-weight:700;letter-spacing:-0.01em}
.log-unit{font-size:11px;color:var(--text-4);font-weight:500}

/* ═══ BUSINESS METRICS ═══ */
.biz-metric{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.biz-metric:last-child{border-bottom:none}
.biz-metric .bm-label{font-size:13px;color:var(--text-2);font-weight:500}
.biz-metric .bm-val{font-size:16px;font-weight:700;letter-spacing:-0.01em}

/* ═══ RUNWAY BAR ═══ */
.runway-bar{height:6px;background:var(--surface-3);border-radius:100px;margin-top:10px;overflow:hidden}
.runway-fill{height:100%;border-radius:100px;transition:width .6s var(--ease)}


/* ═══ WORKOUT PLAN ═══ */
.plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
@media(min-width:600px){.plan-grid{grid-template-columns:repeat(7,1fr)}}
.plan-day{text-align:center;padding:16px 8px;border-radius:var(--r);background:var(--surface-2);border:1px solid var(--border);transition:all .18s var(--ease)}
.plan-day.completed{border-color:rgba(110,231,183,0.3);background:var(--green-dim)}
.plan-day.today{border-color:rgba(232,184,109,0.35);background:var(--accent-dim);box-shadow:0 0 20px rgba(232,184,109,0.1)}
.plan-day.future{opacity:.5}
.plan-day-num{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-4);margin-bottom:6px;letter-spacing:0.06em}
.plan-day-name{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-0.005em}
.plan-day-sub{font-size:10px;color:var(--text-4);margin-top:3px;font-weight:500}
.plan-day-date{font-size:9px;color:var(--text-4);margin-top:6px;font-weight:600}
.plan-day .check{color:var(--green);font-size:14px}
.exercise-list{list-style:none;padding:0;margin:0}
.exercise-list li{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;display:flex;justify-content:space-between;align-items:center}
.exercise-list li:last-child{border-bottom:none}
.exercise-list .ex-name{font-weight:600;color:var(--text)}
.exercise-list .ex-sets{color:var(--text-3);font-size:12px;font-weight:600}
.accordion-btn{width:100%;text-align:left;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-family:var(--sans);transition:all .18s var(--ease)}
.accordion-btn:hover{background:var(--surface-3);border-color:var(--border-2)}
.accordion-content{display:none;padding:0 4px 10px;margin-bottom:6px}
.accordion-content.open{display:block}
.prog-table{width:100%;border-collapse:collapse;font-size:12px}
.prog-table th,.prog-table td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
.prog-table th{color:var(--text-4);font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:0.08em}
.prog-table .current{background:var(--accent-dim);font-weight:700}


/* ═══ HABIT GRID ═══ */
.habit-grid{display:flex;flex-wrap:wrap;gap:3px}
.habit-cell{width:13px;height:13px;border-radius:3px;background:var(--surface-3)}
.habit-cell.l1{background:rgba(232,184,109,.22)}
.habit-cell.l2{background:rgba(232,184,109,.45)}
.habit-cell.l3{background:rgba(232,184,109,.70)}
.habit-cell.l4{background:var(--accent)}

.empty{text-align:center;padding:44px 20px;color:var(--text-4);font-size:13px;font-weight:500}
.loading{display:flex;align-items:center;justify-content:center;padding:24px;gap:6px}
.loading-dot{width:6px;height:6px;border-radius:50%;background:var(--text-3);animation:bounce .6s infinite alternate}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{opacity:.3;transform:translateY(-6px)}}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ═══ TREND CHART ═══ */
.trend-svg{width:100%;height:80px}
.trend-line{fill:none;stroke:var(--accent);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.trend-area{fill:var(--accent-dim)}
.trend-dot{fill:var(--accent)}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══ MOM'S ENGLISH PAGE (Tab 8) ═══ */
.mm-hero{margin-bottom:48px;padding-top:8px}
.mm-hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px}
.mm-hero-title{font-size:36px;font-weight:800;letter-spacing:-0.03em;line-height:1.1;color:var(--text)}
.mm-hero-sub{display:flex;align-items:center;gap:14px;margin-top:14px;font-size:13px;color:var(--text-3);font-weight:500;flex-wrap:wrap}
.mm-hero-sub .divider{color:var(--text-4)}
.mm-hero-sub .accent{color:var(--accent);font-weight:700}

.mm-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border);margin-bottom:48px}
.mm-stat{background:var(--surface);padding:28px 24px;text-align:center}
.mm-stat-val{font-size:34px;font-weight:800;letter-spacing:-0.03em;line-height:1;color:var(--text);font-variant-numeric:tabular-nums}
.mm-stat-val .tgt{font-size:16px;color:var(--text-4);font-weight:600}
.mm-stat-lbl{font-size:10px;color:var(--text-3);margin-top:10px;text-transform:uppercase;letter-spacing:0.10em;font-weight:700}

.mm-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
.mm-section-label{font-size:10px;font-weight:700;letter-spacing:0.10em;color:var(--text-3);margin-bottom:12px;text-transform:uppercase}
.mm-email-frame{border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-lg)}

@media(max-width:768px){
  .mm-hero-title{font-size:28px}
  .mm-stats{grid-template-columns:repeat(2,1fr)}
  .mm-grid{grid-template-columns:1fr}
}

/* ═══ PROFILE PAGE ═══ */
.prf-page{max-width:860px;margin:0 auto}
.prf-hero{margin-bottom:56px;padding-top:8px}
.prf-hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px}
.prf-hero-name{font-size:42px;font-weight:800;letter-spacing:-0.035em;line-height:1.1;color:var(--text);margin-bottom:8px}
.prf-hero-sub{font-size:13px;color:var(--text-3);font-weight:500;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.prf-hero-sub .divider{color:var(--text-4)}

.prf-info{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1px;background:var(--border);border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border);margin-bottom:48px}
.prf-info-cell{background:var(--surface);padding:22px 24px}
.prf-info-lbl{font-size:10px;font-weight:700;letter-spacing:0.10em;text-transform:uppercase;color:var(--text-4);margin-bottom:8px}
.prf-info-val{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.005em;word-break:break-all}
.prf-info-val.masked{color:var(--text-3);letter-spacing:0.1em}

.prf-section-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3)}
.prf-section-label .count{color:var(--text-4);font-weight:600}

.prf-id-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:48px}
.prf-id-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 28px;transition:border-color .22s var(--ease)}
.prf-id-card:hover{border-color:var(--border-2)}
.prf-id-thumb{width:100%;height:200px;border-radius:var(--r-sm);object-fit:contain;margin-bottom:16px;background-color:var(--surface-2);display:block}
.prf-id-type{font-size:10px;font-weight:700;letter-spacing:0.10em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
.prf-id-label{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.01em;margin-bottom:6px}
.prf-id-number{font-size:13px;color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums;margin-bottom:8px}
.prf-id-meta{font-size:11px;color:var(--text-4);font-weight:500;line-height:1.6}
.prf-id-expiry{display:inline-block;margin-top:10px;padding:4px 10px;border-radius:100px;font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}
.prf-id-expiry.valid{background:var(--accent-dim);color:var(--accent)}
.prf-id-expiry.expired{background:var(--surface-3);color:var(--text-3)}
.prf-id-file{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.prf-id-file a{font-size:10px;font-weight:700;color:var(--accent);text-decoration:none;letter-spacing:0.04em;text-transform:uppercase}
.prf-id-file span{font-size:11px;color:var(--text-3);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prf-id-file .del{font-size:14px;color:var(--text-4);cursor:pointer;transition:color .18s}
.prf-id-file .del:hover{color:var(--text)}

.prf-add-id{background:var(--surface);border:2px dashed var(--border-2);border-radius:var(--r-lg);padding:36px 28px;text-align:center;cursor:pointer;transition:all .18s var(--ease);color:var(--text-3);font-size:13px;font-weight:600}
.prf-add-id:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

.prf-sig{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:24px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 28px;margin-bottom:48px;transition:border-color .22s var(--ease)}
.prf-sig:hover{border-color:var(--border-2)}
.prf-sig-preview{background:#fff;border-radius:var(--r-sm);height:120px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.prf-sig-preview img{max-width:100%;max-height:100%;object-fit:contain}
.prf-sig-empty{background:var(--surface-2);border:2px dashed var(--border-2);border-radius:var(--r-sm);height:120px;display:flex;align-items:center;justify-content:center;color:var(--text-4);font-size:12px;font-weight:500;font-style:italic}
.prf-sig-info{display:flex;flex-direction:column;gap:8px;min-width:180px}
.prf-sig-label{font-size:10px;font-weight:700;letter-spacing:0.10em;text-transform:uppercase;color:var(--text-3)}
.prf-sig-name{font-size:13px;color:var(--text);font-weight:600;word-break:break-all}
.prf-sig-meta{font-size:11px;color:var(--text-4);font-weight:500}
.prf-sig-actions{display:flex;gap:8px;margin-top:4px}
.prf-sig-btn{display:inline-block;padding:7px 14px;border-radius:100px;background:var(--surface-2);color:var(--text-2);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:all .15s var(--ease)}
.prf-sig-btn:hover{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.prf-sig-btn.danger:hover{background:rgba(239,68,68,.1);color:#ef4444;border-color:#ef4444}

@media(max-width:768px){
  .prf-hero-name{font-size:32px}
  .prf-info{grid-template-columns:repeat(2,1fr)}
  .prf-id-grid{grid-template-columns:1fr}
  .prf-sig{grid-template-columns:1fr}
  .prf-sig-info{min-width:0}
}

/* ── Life calendar ── */
.prf-life{margin-top:56px}
.prf-life-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.prf-life-title{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3)}
.prf-life-meta{font-size:13px;color:var(--text-3);font-weight:500}
.prf-life-meta .accent{color:var(--accent);font-weight:700}
.prf-life-grid{display:flex;flex-direction:column;max-width:100%}
.prf-life-decade{display:flex;flex-direction:column;gap:2px;margin-bottom:8px}
.prf-life-decade:last-child{margin-bottom:0}
.prf-life-row{display:flex;align-items:center;gap:0}
.prf-life-year{font-size:9px;font-weight:700;color:var(--text-4);width:36px;flex-shrink:0;text-align:right;padding-right:8px;font-variant-numeric:tabular-nums}
.prf-life-weeks{display:grid;grid-template-columns:repeat(52,1fr);gap:2px;flex:1;min-width:0}
.prf-life-week{aspect-ratio:1;border-radius:2px;background:var(--surface-2);transition:background .15s}
.prf-life-week.lived{background:var(--accent);opacity:.85}
.prf-life-week.lived.decade-start{opacity:1}
.prf-life-week.current{background:var(--accent);box-shadow:0 0 0 1.5px var(--accent);animation:life-pulse 1s ease-in-out infinite}
@keyframes life-pulse{0%,18%,100%{transform:scale(1);box-shadow:0 0 0 1.5px var(--accent)}8%{transform:scale(1.6);box-shadow:0 0 8px 3px var(--accent)}16%{transform:scale(1.4);box-shadow:0 0 5px 2px var(--accent)}}
.prf-life-legend{display:flex;gap:18px;margin-top:18px;font-size:10px;color:var(--text-4);font-weight:500;align-items:center;justify-content:center}
.prf-life-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

@media(max-width:768px){
  .prf-life-year{font-size:8px;width:28px;padding-right:5px}
  .prf-life-weeks{gap:1.5px}
  .prf-life-decade{gap:1.5px;margin-bottom:6px}
}

/* ═══ REFLECTIONS (v3 — zoom-lens growth journal) ═══ */
.rf-page{max-width:1320px;margin:0 auto}
.rf-layout{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:48px;align-items:start}
.rf-main{min-width:0;max-width:920px}
.rf-side{position:sticky;top:24px;align-self:start}
.rf-side .prf-life{margin-top:0}
.rf-side .prf-life-year{width:30px;font-size:8px;padding-right:6px}
.rf-side .prf-life-weeks{gap:1.5px}
.rf-side .prf-life-decade{gap:1.5px;margin-bottom:6px}

/* ── Top navigation: scope chips + breadcrumb + date arrows ── */
.rf-nav{display:flex;flex-direction:column;gap:16px;margin-bottom:32px;padding-top:8px}
.rf-nav-top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.rf-scope-chips{display:inline-flex;gap:2px;background:var(--surface-2);border:1px solid var(--border);border-radius:100px;padding:3px}
.rf-chip{padding:8px 18px;font-size:12px;font-weight:600;color:var(--text-3);background:transparent;border:none;border-radius:100px;cursor:pointer;transition:all .18s var(--ease);letter-spacing:-0.005em;font-family:var(--sans)}
.rf-chip:hover{color:var(--text-2)}
.rf-chip.active{color:var(--text);background:var(--surface);box-shadow:var(--shadow-sm)}
.rf-date-nav{display:inline-flex;align-items:center;gap:6px}
.rf-nav-btn{width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);border-radius:50%;color:var(--text-2);cursor:pointer;font-size:14px;transition:all .18s var(--ease);font-family:var(--sans)}
.rf-nav-btn:hover:not(:disabled){border-color:var(--border-2);color:var(--text);background:var(--surface-2)}
.rf-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.rf-today-btn{padding:0 16px;height:36px;display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border);border-radius:100px;color:var(--text-3);font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all .18s var(--ease);font-family:var(--sans)}
.rf-today-btn:hover{border-color:var(--accent);color:var(--accent)}
.rf-breadcrumb{display:flex;align-items:center;gap:2px;flex-wrap:wrap;font-size:12px;color:var(--text-3);font-weight:500;letter-spacing:-0.005em}
.rf-crumb{padding:4px 10px;border-radius:8px;cursor:pointer;transition:all .18s;color:var(--text-3);background:none;border:none;font-size:12px;font-weight:500;font-family:var(--sans)}
.rf-crumb:hover{background:var(--surface);color:var(--text)}
.rf-crumb.active{color:var(--text);font-weight:700}
.rf-crumb-sep{color:var(--text-4);font-weight:400;padding:0 2px}

/* ── Threshold banner — appears when a period just completed ── */
.rf-threshold{background:linear-gradient(180deg,rgba(232,184,109,0.12),rgba(232,184,109,0.04));border:1px solid rgba(232,184,109,0.3);border-radius:var(--r-lg);padding:16px 22px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.rf-threshold-text{font-size:13px;color:var(--text);font-weight:500;letter-spacing:-0.005em;line-height:1.5}
.rf-threshold-text strong{color:var(--accent);font-weight:700}
.rf-threshold-go{padding:8px 18px;border-radius:100px;background:var(--accent);color:var(--bg);border:none;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:all .18s var(--ease);font-family:var(--sans)}
.rf-threshold-go:hover{transform:translateY(-1px);box-shadow:0 6px 24px var(--accent-glow)}

/* ── Hero panel — container ── */
.rf-hero-panel{margin-bottom:44px}

/* ── Day scope ── */
.rf-day-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:26px;flex-wrap:wrap;padding-bottom:20px;border-bottom:1px solid var(--border)}
.rf-day-date{font-size:40px;font-weight:800;letter-spacing:-0.035em;line-height:1.05;color:var(--text)}
.rf-day-date .muted{color:var(--text-3);font-weight:500;font-size:32px}
.rf-day-meta{font-size:11px;color:var(--text-4);letter-spacing:0.08em;text-transform:uppercase;font-weight:700;font-variant-numeric:tabular-nums}
.rf-day-meta .sep{color:var(--text-4);margin:0 8px}

/* Sacred compose — the hero of daily reflection. Serif. Breathable. */
.rf-compose-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:40px 44px;transition:border-color .3s var(--ease)}
.rf-compose-hero:focus-within{border-color:var(--border-2)}
.rf-compose-hero textarea{width:100%;min-height:300px;background:transparent;border:none;padding:0;font-family:var(--serif);font-size:20px;line-height:1.75;letter-spacing:-0.003em;color:var(--text);resize:vertical;outline:none;box-sizing:border-box;font-feature-settings:'liga' 1,'calt' 1;font-weight:400}
.rf-compose-hero textarea::placeholder{color:var(--text-4);font-style:italic}
.rf-compose-hero-footer{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);gap:14px;flex-wrap:wrap}
.rf-compose-meta{font-size:11px;color:var(--text-4);font-variant-numeric:tabular-nums;letter-spacing:0.04em;font-family:var(--sans)}
.rf-save-btn{padding:11px 28px;border-radius:100px;border:none;background:var(--accent);color:var(--bg);font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:all .18s var(--ease);font-family:var(--sans)}
.rf-save-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 28px var(--accent-glow)}
.rf-save-btn:disabled{opacity:.5;cursor:wait;transform:none;box-shadow:none}
.rf-ghost-btn{padding:9px 18px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text-3);font-size:11px;font-weight:600;cursor:pointer;transition:all .18s var(--ease);font-family:var(--sans);letter-spacing:0.04em;text-transform:uppercase}
.rf-ghost-btn:hover{border-color:var(--border-2);color:var(--text-2)}

/* Day entries timeline */
.rf-entries{display:flex;flex-direction:column;gap:14px;margin-bottom:20px}
.rf-entry-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px 32px;transition:border-color .22s var(--ease)}
.rf-entry-card:hover{border-color:var(--border-2)}
.rf-entry-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;font-size:10px;color:var(--text-4);letter-spacing:0.1em;text-transform:uppercase;font-weight:700;font-family:var(--sans)}
.rf-entry-time{color:var(--text-3)}
.rf-entry-count{font-variant-numeric:tabular-nums}
.rf-entry-body{font-family:var(--serif);font-size:17px;line-height:1.8;color:var(--text);white-space:pre-wrap;letter-spacing:-0.003em;font-feature-settings:'liga' 1,'calt' 1;font-weight:400}
.rf-entry-actions{display:flex;gap:16px;margin-top:20px;padding-top:18px;border-top:1px solid var(--border)}
.rf-entry-action{font-size:10px;color:var(--text-4);cursor:pointer;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:none;border:none;padding:0;transition:color .18s;font-family:var(--sans)}
.rf-entry-action:hover{color:var(--accent)}
.rf-entry-action.delete:hover{color:var(--text)}

/* Add another entry (when a day already has one) */
.rf-add-more{background:transparent;border:1px dashed var(--border-2);border-radius:var(--r-lg);padding:18px 24px;text-align:center;cursor:pointer;font-size:11px;color:var(--text-3);font-weight:700;letter-spacing:0.1em;text-transform:uppercase;transition:all .18s var(--ease);font-family:var(--sans);width:100%}
.rf-add-more:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

/* Empty past day — invitation to narrate retrospectively */
.rf-empty-day{background:var(--surface);border:1px dashed var(--border-2);border-radius:var(--r-xl);padding:72px 40px;text-align:center}
.rf-empty-day-title{font-family:var(--serif);font-size:24px;font-weight:400;color:var(--text);letter-spacing:-0.015em;margin-bottom:10px;font-style:italic}
.rf-empty-day-sub{font-size:13px;color:var(--text-3);margin-bottom:26px;line-height:1.6;max-width:380px;margin-left:auto;margin-right:auto}
.rf-narrate-btn{padding:12px 26px;border-radius:100px;background:transparent;border:1px solid var(--border-2);color:var(--text-2);font-size:11px;font-weight:700;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;transition:all .18s var(--ease);font-family:var(--sans)}
.rf-narrate-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── Week scope ── */
.rf-week-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:26px;flex-wrap:wrap;padding-bottom:20px;border-bottom:1px solid var(--border)}
.rf-week-title{font-size:32px;font-weight:800;letter-spacing:-0.03em;line-height:1.1;color:var(--text)}
.rf-week-range{font-size:13px;color:var(--text-3);margin-top:8px;font-weight:500}
.rf-week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:32px}
.rf-week-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 12px;cursor:pointer;transition:all .22s var(--ease);display:flex;flex-direction:column;align-items:center;gap:8px;min-height:118px}
.rf-week-cell:hover{border-color:var(--accent);background:var(--surface-2)}
.rf-week-cell.today{border-color:var(--accent)}
.rf-week-cell.skipped{opacity:.5}
.rf-week-cell.future{opacity:.25;pointer-events:none}
.rf-week-dow{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-4);font-family:var(--sans)}
.rf-week-dom{font-size:20px;font-weight:700;color:var(--text-2);line-height:1;font-variant-numeric:tabular-nums}
.rf-week-cell.today .rf-week-dom{color:var(--accent)}
.rf-week-become{font-size:22px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:-0.02em;margin-top:auto}
.rf-week-become.skipped{color:var(--text-4);font-size:14px;font-weight:500}
.rf-week-written{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:auto}
.rf-week-written.skipped{background:var(--surface-3)}

/* ── Month scope ── */
.rf-month-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:26px;flex-wrap:wrap;padding-bottom:20px;border-bottom:1px solid var(--border)}
.rf-month-title{font-size:32px;font-weight:800;letter-spacing:-0.03em;line-height:1.1;color:var(--text)}
.rf-month-meta{font-size:13px;color:var(--text-3);margin-top:8px;font-weight:500}
.rf-month-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px}
.rf-month-dow-lbl{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-4);text-align:center;padding:4px 0}
.rf-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:32px}
.rf-month-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;min-height:78px;cursor:pointer;transition:all .18s var(--ease);display:flex;flex-direction:column;justify-content:space-between;gap:4px}
.rf-month-cell:hover{border-color:var(--accent);background:var(--surface-2)}
.rf-month-cell.outside{opacity:.2;pointer-events:none}
.rf-month-cell.today{border-color:var(--accent);background:var(--accent-dim)}
.rf-month-cell.future{opacity:.4;pointer-events:none}
.rf-month-cell-dom{font-size:12px;font-weight:600;color:var(--text-3);font-variant-numeric:tabular-nums;font-family:var(--sans)}
.rf-month-cell.today .rf-month-cell-dom{color:var(--accent);font-weight:800}
.rf-month-become{font-size:18px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:-0.02em;text-align:right;line-height:1}
.rf-month-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);align-self:flex-end;margin-top:auto}

/* ── Year scope ── */
.rf-year-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:26px;flex-wrap:wrap;padding-bottom:20px;border-bottom:1px solid var(--border)}
.rf-year-title{font-size:52px;font-weight:800;letter-spacing:-0.035em;line-height:1;color:var(--text);font-variant-numeric:tabular-nums}
.rf-year-meta{font-size:13px;color:var(--text-3);margin-top:10px;font-weight:500}
.rf-year-strip{display:grid;grid-template-columns:repeat(12,1fr);gap:6px;margin-bottom:24px}
.rf-year-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 8px;cursor:pointer;transition:all .22s var(--ease);display:flex;flex-direction:column;align-items:center;gap:6px;min-height:110px}
.rf-year-cell:hover{border-color:var(--accent);background:var(--surface-2)}
.rf-year-cell.current{border-color:var(--accent)}
.rf-year-cell.empty{opacity:.4}
.rf-year-cell.future{opacity:.2;pointer-events:none}
.rf-year-mo{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-4);font-family:var(--sans)}
.rf-year-become{font-size:22px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:-0.02em;margin-top:auto;line-height:1}
.rf-year-become.empty{color:var(--text-4);font-size:14px;font-weight:500}
.rf-year-count{font-size:9px;color:var(--text-4);font-variant-numeric:tabular-nums;letter-spacing:0.04em;font-weight:700;font-family:var(--sans)}

/* ── Scope snapshot card (shared for week/month/year synthesized snapshots) ── */
.rf-scope-snap{background:linear-gradient(180deg,rgba(232,184,109,0.06),rgba(232,184,109,0.015));border:1px solid rgba(232,184,109,0.22);border-radius:var(--r-xl);padding:32px 36px;margin-bottom:24px}
.rf-scope-snap-kicker{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-bottom:18px;font-family:var(--sans)}
.rf-scope-snap-eq{display:flex;align-items:flex-end;gap:14px;margin-bottom:22px;font-variant-numeric:tabular-nums;flex-wrap:wrap}
.rf-scope-snap-eq .eq-part{display:flex;flex-direction:column;gap:6px}
.rf-scope-snap-eq .eq-label{font-size:9px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-4);font-family:var(--sans)}
.rf-scope-snap-eq .eq-value{font-size:44px;font-weight:800;letter-spacing:-0.03em;line-height:1;color:var(--text)}
.rf-scope-snap-eq .eq-become .eq-value{color:var(--accent)}
.rf-scope-snap-eq .eq-op{font-size:28px;color:var(--text-4);font-weight:300;padding-bottom:4px}
.rf-scope-snap-insight{font-family:var(--serif);font-size:17px;line-height:1.8;color:var(--text);padding:18px 22px;background:rgba(255,255,255,0.03);border-left:2px solid var(--accent);border-radius:8px;white-space:pre-wrap;letter-spacing:-0.003em;font-feature-settings:'liga' 1,'calt' 1;font-weight:400}
[data-theme="light"] .rf-scope-snap-insight{background:rgba(160,108,26,0.04)}

/* Scope snapshot empty state — awaiting synthesis */
.rf-scope-snap.awaiting{background:var(--surface);border:1px dashed var(--border-2);padding:36px}
.rf-scope-snap-await-title{font-family:var(--serif);font-size:22px;color:var(--text);font-style:italic;margin-bottom:10px;letter-spacing:-0.01em;font-weight:400}
.rf-scope-snap-await-sub{font-size:13px;color:var(--text-3);line-height:1.7}
.rf-scope-snap-await-sub strong{color:var(--accent);font-weight:700}

/* ── Arc (Become horizon line) ── */
.rf-arc{margin-bottom:40px;padding:22px 26px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg)}
.rf-arc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.rf-arc-label{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);font-family:var(--sans)}
.rf-arc-range{font-size:11px;color:var(--text-4);font-variant-numeric:tabular-nums;font-weight:600;font-family:var(--sans)}
.rf-arc-svg{width:100%;height:80px;display:block;overflow:visible}
.rf-arc-svg .arc-area{fill:url(#rf-arc-grad)}
.rf-arc-svg .arc-line{stroke:var(--accent);stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.rf-arc-svg .arc-dot{fill:var(--accent)}
.rf-arc-svg .arc-dot.current{stroke:var(--bg);stroke-width:2}
.rf-arc-empty{padding:18px 0;text-align:center;color:var(--text-4);font-size:12px;font-style:italic}

/* ── Echoes (past-self on this day) ── */
.rf-echoes{margin-bottom:40px}
.rf-section-title{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:16px;display:flex;align-items:center;gap:12px;font-family:var(--sans)}
.rf-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.rf-echo{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin-bottom:10px;cursor:pointer;transition:border-color .18s var(--ease)}
.rf-echo:hover{border-color:var(--border-2)}
.rf-echo-head{display:flex;justify-content:space-between;align-items:baseline;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.rf-echo-when{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);font-family:var(--sans)}
.rf-echo-date{font-size:11px;color:var(--text-4);font-weight:500;font-family:var(--sans);letter-spacing:0.04em}
.rf-echo-body{font-family:var(--serif);font-size:15px;line-height:1.75;color:var(--text-2);letter-spacing:-0.003em;font-feature-settings:'liga' 1,'calt' 1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;font-weight:400}
.rf-echo.expanded .rf-echo-body{display:block;white-space:pre-wrap;-webkit-line-clamp:unset}

/* ── Threads (recurring themes) ── */
.rf-threads{margin-bottom:40px}
.rf-thread-pills{display:flex;flex-wrap:wrap;gap:8px}
.rf-thread{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:100px;background:var(--surface);border:1px solid var(--border);font-size:12px;color:var(--text-2);font-weight:600;cursor:pointer;transition:all .18s var(--ease);font-family:var(--sans)}
.rf-thread:hover{border-color:var(--accent);color:var(--accent)}
.rf-thread-count{font-size:10px;color:var(--text-4);font-variant-numeric:tabular-nums;font-weight:700}
.rf-threads-empty{padding:16px 20px;font-size:12px;color:var(--text-4);font-style:italic;background:var(--surface);border:1px dashed var(--border);border-radius:var(--r)}

/* Inline editor for entry editing */
.rf-edit-shell{width:100%}
.rf-edit-shell textarea{width:100%;min-height:180px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;font-size:16px;color:var(--text);resize:vertical;font-family:var(--serif);line-height:1.75;outline:none;transition:border-color .18s;box-sizing:border-box;letter-spacing:-0.003em}
.rf-edit-shell textarea:focus{border-color:var(--accent)}
.rf-edit-footer{display:flex;gap:10px;margin-top:14px;justify-content:flex-end}

@media(max-width:1100px){
  .rf-layout{grid-template-columns:1fr;gap:32px}
  .rf-main{max-width:100%}
  .rf-side{position:static}
  .rf-side .prf-life-year{width:36px;font-size:9px;padding-right:8px}
  .rf-side .prf-life-weeks{gap:2px}
  .rf-side .prf-life-decade{gap:2px;margin-bottom:8px}
}
@media(max-width:768px){
  .rf-nav-top{flex-direction:column;align-items:stretch}
  .rf-scope-chips{align-self:flex-start}
  .rf-date-nav{align-self:flex-end}
  .rf-day-date{font-size:26px}
  .rf-day-date .muted{font-size:22px}
  .rf-compose-hero{padding:22px}
  .rf-compose-hero textarea{font-size:17px;min-height:220px}
  .rf-entry-card{padding:22px}
  .rf-entry-body{font-size:16px}
  .rf-week-strip{gap:4px}
  .rf-week-cell{padding:12px 4px;min-height:94px}
  .rf-week-become{font-size:16px}
  .rf-week-dom{font-size:16px}
  .rf-month-cell{min-height:58px;padding:6px 4px;gap:2px}
  .rf-month-cell-dom{font-size:10px}
  .rf-month-become{font-size:11px}
  .rf-year-strip{grid-template-columns:repeat(4,1fr)}
  .rf-year-title{font-size:36px}
  .rf-scope-snap{padding:22px}
  .rf-scope-snap-eq .eq-value{font-size:32px}
  .rf-empty-day{padding:50px 22px}
}

/* ═══ MORNING DEBRIEF (dawn, quiet orientation before the day) ═══ */
.bdb-wrap{margin-bottom:28px}
.bdb-card{background:linear-gradient(180deg,rgba(182,196,220,0.05),rgba(182,196,220,0.012));border:1px solid rgba(182,196,220,0.22);border-radius:var(--r-xl);padding:32px 40px;position:relative}
.bdb-date{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#9fb3d4;margin-bottom:8px;font-family:var(--sans)}
.bdb-meta{font-size:10px;font-weight:500;letter-spacing:0.02em;color:var(--text-4);margin-bottom:22px;font-family:var(--sans)}
.bdb-prose{font-family:var(--serif);font-size:17px;color:var(--text);line-height:1.85;letter-spacing:-0.003em;white-space:pre-wrap;font-feature-settings:'liga' 1,'calt' 1;font-weight:400}
.bdb-prose p{margin:0 0 1.1em 0}
.bdb-prose p:last-child{margin-bottom:0}
.bdb-empty{padding:28px 24px;text-align:center;border-radius:var(--r-lg);background:rgba(182,196,220,0.025);border:1px dashed rgba(182,196,220,0.18)}
.bdb-empty-title{font-family:var(--serif);font-size:17px;color:var(--text);margin-bottom:6px;font-weight:500;letter-spacing:-0.003em}
.bdb-empty-sub{font-size:13px;color:var(--text-3);line-height:1.6;margin-bottom:16px;font-family:var(--sans)}
.bdb-generate-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;font-size:12px;font-weight:600;letter-spacing:0.02em;color:#1a2232;background:#b6c4dc;border:none;border-radius:var(--r-md);cursor:pointer;font-family:var(--sans);transition:opacity .15s ease,transform .15s ease}
.bdb-generate-btn:hover{opacity:.85;transform:translateY(-1px)}
.bdb-generate-btn:active{transform:translateY(0)}
.bdb-toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:11px 18px;border-radius:var(--r-md);font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:-0.003em;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:9999;opacity:0;transition:opacity .2s ease}
.bdb-toast.show{opacity:1}

/* ═══ BECOME SNAPSHOT (v3 — quiet luxury, monochrome + amber) ═══ */
.bec-wrap{margin-bottom:32px}

/* Hero — single composed card, breathable, amber-tinted like .rf-scope-snap */
.bec-hero{background:linear-gradient(180deg,rgba(232,184,109,0.06),rgba(232,184,109,0.015));border:1px solid rgba(232,184,109,0.22);border-radius:var(--r-xl);padding:36px 40px;margin-bottom:22px}
.bec-hero-date{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-bottom:22px;font-family:var(--sans)}
.bec-hero-quote-meta{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-4);margin-bottom:10px;font-family:var(--sans)}

/* Reflection text — serif, flowing, no border box */
.bec-hero-quote-full{font-family:var(--serif);font-size:17px;color:var(--text);line-height:1.8;letter-spacing:-0.003em;white-space:pre-wrap;max-height:280px;overflow-y:auto;margin-bottom:24px;font-feature-settings:'liga' 1,'calt' 1;font-weight:400;padding-right:6px}
.bec-hero-quote-full::-webkit-scrollbar{width:4px}
.bec-hero-quote-full::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:2px}
.bec-hero-quote{font-family:var(--serif);font-size:17px;color:var(--text);line-height:1.8;letter-spacing:-0.003em;white-space:pre-wrap;margin-bottom:24px;font-weight:400}

/* Characterization — an observational note, quiet italic */
.bec-characterization{margin:0 0 28px;font-family:var(--serif);font-size:14px;color:var(--text-2);line-height:1.7;letter-spacing:-0.003em;font-style:italic;font-weight:400;padding:0;background:none;border:none;border-radius:0}
.bec-characterization::before{content:"— ";color:var(--text-4);font-style:normal}

/* The Equation — typographic hero */
.bec-equation{display:flex;align-items:flex-end;gap:18px;font-variant-numeric:tabular-nums;flex-wrap:wrap;padding:8px 0 4px}
.bec-eq-part{display:flex;flex-direction:column;gap:8px;align-items:flex-start}
.bec-eq-label{font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-4);font-family:var(--sans)}
.bec-eq-value{font-size:52px;font-weight:800;letter-spacing:-0.035em;line-height:1;color:var(--text)}
.bec-eq-be .bec-eq-value{color:var(--text)}
.bec-eq-do .bec-eq-value{color:var(--text-2)}
.bec-eq-become .bec-eq-value{color:var(--accent)}
.bec-eq-op{font-size:32px;color:var(--text-4);font-weight:300;padding-bottom:4px}

/* Diagnosis — one honest sentence */
.bec-diagnosis{margin-top:22px;padding:0;background:none;border:none;border-radius:0;font-size:14px;color:var(--text-2);letter-spacing:-0.005em;line-height:1.6}
.bec-diagnosis strong{color:var(--text);font-weight:700}
.bec-diagnosis.zero strong{color:var(--accent)}
.bec-diagnosis.pos strong{color:var(--accent)}

/* Insight — the serif focus, bordered left with accent */
.bec-insight{margin-top:22px;padding:18px 24px;background:rgba(232,184,109,0.04);border-left:2px solid var(--accent);border-radius:8px;font-family:var(--serif);font-size:16px;color:var(--text);line-height:1.8;letter-spacing:-0.003em;white-space:pre-wrap;font-weight:400;font-feature-settings:'liga' 1,'calt' 1}
[data-theme="light"] .bec-insight{background:rgba(160,108,26,0.04)}

/* Resonance — a subtle line of truth */
.bec-resonance{margin-top:18px;font-size:11px;color:var(--text-3);letter-spacing:0.04em;font-family:var(--sans);text-transform:none;padding-top:14px;border-top:1px solid var(--border)}
.bec-resonance strong{color:var(--text);font-weight:700;font-size:12px}

/* Domains — 2-column poster grid, each card a composition */
.bec-grid{display:grid;grid-template-columns:repeat(2, minmax(0, 1fr));gap:12px;margin-bottom:32px}
.bec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px 32px 26px;display:grid;grid-template-columns:1fr auto;gap:14px 28px;align-items:start;position:relative;overflow:hidden;transition:all .28s var(--ease);min-height:208px}
.bec-card:hover{border-color:var(--border-2);transform:translateY(-1px)}

/* Subtle intensity glow in the bottom-right — the higher the Become, the warmer */
.bec-card::after{content:'';position:absolute;bottom:-50%;right:-40%;width:85%;height:95%;border-radius:50%;background:radial-gradient(circle, var(--accent) 0%, transparent 60%);opacity:0;transition:opacity .4s var(--ease);pointer-events:none;z-index:0}
.bec-card.tier-high::after{opacity:.12}
.bec-card.tier-mid::after{opacity:.06}
.bec-card.tier-low::after{opacity:.025}
.bec-card.tier-zero::after{background:radial-gradient(circle, var(--text-3), transparent 60%);opacity:.03}

.bec-card-left{position:relative;z-index:1;display:flex;flex-direction:column;gap:14px;min-width:0}
.bec-card-right{position:relative;z-index:1;display:flex;flex-direction:column;align-items:flex-end;gap:2px;min-width:84px}

.bec-card-name{font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-3);font-family:var(--sans)}

/* Be × Do equation inline, typographic */
.bec-card-equation{display:inline-flex;align-items:baseline;gap:10px;font-variant-numeric:tabular-nums;margin-top:-4px}
.bec-card-op{font-size:16px;color:var(--text-4);font-weight:300;margin:0 2px}
.bec-v-be{color:var(--text);font-weight:700;font-size:22px;letter-spacing:-0.025em;font-family:var(--sans);line-height:1}
.bec-v-do{color:var(--text-2);font-weight:700;font-size:22px;letter-spacing:-0.025em;font-family:var(--sans);line-height:1}

.bec-card-detail{font-size:13px;color:var(--text-2);line-height:1.6;font-family:var(--sans);letter-spacing:-0.005em;margin-top:auto}
.bec-card-diag{font-family:var(--serif);font-size:13px;color:var(--text-3);line-height:1.55;font-style:italic;letter-spacing:-0.003em;font-weight:400}
.bec-card-diag.pos{color:var(--accent)}
.bec-card-diag.eq{color:var(--accent)}
.bec-card-diag.neg{color:var(--text-2)}
.bec-card-diag.zero{color:var(--text-3)}

.bec-card-become-value{font-size:64px;font-weight:800;color:var(--accent);letter-spacing:-0.045em;font-variant-numeric:tabular-nums;line-height:.9}
.bec-card.tier-zero .bec-card-become-value{color:var(--text-3)}
.bec-card-become-value.wide{font-size:52px}
.bec-card-become-label{font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-4);font-family:var(--sans);margin-top:2px}

/* Back-compat neutrals (any stale class references become no-ops) */
.bec-data-flag{display:none}
.bec-card-header,.bec-card-row,.bec-card-become,.bec-card-dot,.bec-card-val,.bec-card-val-k,.bec-card-values{display:contents}

/* Delta panel — day-over-day change */
.bec-delta-panel{margin-top:22px;padding:16px 20px;background:transparent;border:1px solid var(--border);border-radius:var(--r);font-size:12px;color:var(--text-3);line-height:1.6;font-variant-numeric:tabular-nums}
.bec-delta-header{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-4);margin-bottom:12px;font-family:var(--sans)}
.bec-delta-row{display:flex;flex-wrap:wrap;align-items:baseline;gap:20px;margin-bottom:8px}
.bec-delta-pill{display:inline-flex;align-items:baseline;gap:8px;color:var(--text-2)}
.bec-delta-pill-label{font-size:10px;color:var(--text-4);text-transform:uppercase;letter-spacing:0.12em;font-weight:700;font-family:var(--sans)}
.bec-delta-pill-value{font-size:16px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.bec-delta-pill-value.up{color:var(--accent)}
.bec-delta-pill-value.down{color:var(--text-3)}
.bec-delta-decomp{margin-top:6px;font-size:11px;color:var(--text-4);letter-spacing:-0.005em;font-family:var(--sans)}
.bec-delta-decomp strong{color:var(--text-3);font-weight:600}

/* Scaling callout — subtle amber, when aligned + high */
.bec-scaling-callout{margin-top:18px;padding:14px 20px;background:rgba(232,184,109,0.05);border:1px solid rgba(232,184,109,0.2);border-radius:var(--r);font-size:13px;color:var(--text-2);line-height:1.6;font-family:var(--sans)}
.bec-scaling-callout strong{color:var(--accent);font-weight:700}

/* Empty states */
.bec-empty{background:var(--surface);border:1px dashed var(--border-2);border-radius:var(--r-xl);padding:56px 36px;text-align:center;margin-bottom:24px}
.bec-empty-title{font-family:var(--serif);font-size:22px;font-weight:400;font-style:italic;color:var(--text);margin-bottom:12px;letter-spacing:-0.015em}
.bec-empty-sub{font-size:13px;color:var(--text-3);margin:0 auto 22px;line-height:1.7;max-width:440px;font-family:var(--sans)}
.bec-empty-formula{font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-4);margin-top:18px;font-family:var(--sans)}
.bec-empty-formula span.be,.bec-empty-formula span.do,.bec-empty-formula span.bec{color:var(--accent)}

@media(max-width:768px){
  .bec-hero{padding:24px}
  .bec-eq-value{font-size:36px}
  .bec-eq-op{font-size:24px}
  .bec-hero-quote-full{max-height:240px;font-size:16px}
  .bec-insight{padding:14px 18px;font-size:15px}
  .bec-grid{grid-template-columns:1fr;gap:10px}
  .bec-card{padding:22px 24px;min-height:auto;gap:12px 20px}
  .bec-card-become-value{font-size:48px}
  .bec-card-become-value.wide{font-size:40px}
  .bec-v-be,.bec-v-do{font-size:19px}
  .bec-card-right{min-width:72px}
}

/* ═══ SOUL PAGE — habits & daily routines ═══ */
.soul-page{max-width:1080px;margin:0 auto}
.soul-hero{margin-bottom:40px;padding-top:8px}
.soul-hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px}
.soul-hero-title{font-size:36px;font-weight:800;letter-spacing:-0.03em;line-height:1.1;color:var(--text);margin-bottom:8px}
.soul-hero-sub{font-size:13px;color:var(--text-3);font-weight:500;max-width:560px;line-height:1.6}

.soul-section-label{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3)}
.soul-section-label .count{color:var(--text-4);font-weight:600}

/* ── Routine card (one per routine-type habit) ── */
.soul-routine{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:30px 34px;margin-bottom:18px;transition:border-color .22s var(--ease)}
.soul-routine:last-of-type{margin-bottom:40px}
.soul-routine:hover{border-color:var(--border-2)}
.soul-routine-head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:22px;flex-wrap:wrap}
.soul-routine-title{display:flex;flex-direction:column;gap:6px;min-width:0}
.soul-routine-name{font-size:21px;font-weight:800;letter-spacing:-0.025em;color:var(--text);line-height:1.2}
.soul-routine-progress{font-size:11px;color:var(--text-4);font-weight:700;letter-spacing:0.04em;font-variant-numeric:tabular-nums;text-transform:uppercase}
.soul-routine-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.soul-routine-streak{display:inline-flex;align-items:baseline;gap:6px;padding:6px 12px;border-radius:100px;background:var(--accent-dim);color:var(--accent);font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
.soul-routine-streak .num{font-size:13px;letter-spacing:-0.01em}
.soul-routine-open{font-size:11px;color:var(--text-3);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;background:none;border:none;cursor:pointer;padding:6px 4px;font-family:var(--sans);transition:color .18s}
.soul-routine-open:hover{color:var(--accent)}
.soul-routine-list{display:flex;flex-direction:column}
.soul-routine-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-top:1px solid var(--border);cursor:pointer;transition:padding .15s}
.soul-routine-item:first-child{border-top:none;padding-top:6px}
.soul-routine-item:hover{padding-left:6px}
.soul-routine-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border-2);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s var(--ease)}
.soul-routine-item:hover .soul-routine-check{border-color:var(--accent)}
.soul-routine-item.done .soul-routine-check{background:var(--accent);border-color:var(--accent)}
.soul-routine-item.done .soul-routine-check::after{content:'';width:8px;height:5px;border-left:2px solid var(--bg);border-bottom:2px solid var(--bg);transform:rotate(-45deg) translate(1px,-1px)}
.soul-routine-label{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.005em;flex:1;line-height:1.4}
.soul-routine-item.done .soul-routine-label{color:var(--text-3);text-decoration:line-through;text-decoration-color:var(--text-4);text-decoration-thickness:1px}

/* ── Habits grid (project-card aligned) ── */
.soul-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.soul-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px 30px;cursor:pointer;transition:all .22s var(--ease);display:flex;flex-direction:column;min-height:220px;position:relative}
.soul-card:hover{border-color:var(--border-2);background:var(--surface-2)}
.soul-card.done{border-color:var(--accent)}
.soul-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px;padding-right:42px}
.soul-card-name{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.02em;line-height:1.25}
.soul-card-type{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-4);margin-bottom:18px}
.soul-card-meta{font-size:13px;color:var(--text-3);font-style:italic;line-height:1.5;letter-spacing:-0.005em;margin-bottom:18px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:39px}
.soul-card-foot{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-top:auto}
.soul-card-stat{display:flex;flex-direction:column;gap:4px;min-width:0}
.soul-card-stat-lbl{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-4)}
.soul-card-stat-val{font-size:26px;font-weight:800;letter-spacing:-0.03em;color:var(--text);line-height:1;font-variant-numeric:tabular-nums}
.soul-card-stat-val.done{color:var(--accent)}
.soul-card-stat-val .unit{font-size:12px;color:var(--text-4);font-weight:600;margin-left:4px}
.soul-card-dots-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.soul-card-dots-lbl{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-4)}
.soul-card-dots{display:flex;gap:4px}
.soul-card-dot{width:9px;height:9px;border-radius:2px;background:var(--surface-3)}
.soul-card-dot.filled{background:var(--accent);opacity:.85}
.soul-card-dot.today{box-shadow:0 0 0 1.5px var(--accent)}

.soul-card-check{position:absolute;top:18px;right:18px;width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border-2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s var(--ease);z-index:2}
.soul-card-check:hover{border-color:var(--accent);background:var(--accent-dim)}
.soul-card-check.done{background:var(--accent);border-color:var(--accent)}
.soul-card-check.done::after{content:'';width:10px;height:6px;border-left:2px solid var(--bg);border-bottom:2px solid var(--bg);transform:rotate(-45deg) translate(1px,-1px)}

.soul-add{background:transparent;border:1.5px dashed var(--border-2);border-radius:var(--r-lg);padding:36px 28px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s var(--ease);color:var(--text-3);font-size:13px;font-weight:600;min-height:220px}
.soul-add:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

.soul-empty{background:var(--surface);border:1px dashed var(--border-2);border-radius:var(--r-xl);padding:72px 40px;text-align:center}
.soul-empty-title{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--text);letter-spacing:-0.015em;margin-bottom:10px;font-style:italic}
.soul-empty-sub{font-size:13px;color:var(--text-3);margin-bottom:26px;line-height:1.6;max-width:380px;margin-left:auto;margin-right:auto}

@media(max-width:1024px){.soul-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .soul-page{max-width:100%}
  .soul-grid{grid-template-columns:1fr;gap:10px}
  .soul-card{padding:22px 24px;min-height:auto}
  .soul-add{min-height:auto;padding:26px}
  .soul-routine{padding:24px}
  .soul-routine-name{font-size:19px}
  .soul-hero-title{font-size:28px}
}

/* ═══ TAXES PAGE (Tab 7) ═══ */
.tx-page{max-width:1080px;margin:0 auto}
.tx-hero{margin-bottom:40px;padding-top:8px}
.tx-hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px}
.tx-hero-title{font-size:36px;font-weight:800;letter-spacing:-0.03em;line-height:1.1;color:var(--text)}
.tx-hero-sub{font-size:13px;color:var(--text-3);margin-top:14px;font-weight:500}
.tx-year-pills{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:40px}
.tx-year{padding:12px 24px;border-radius:100px;font-size:13px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--text-3);border:1px solid var(--border);letter-spacing:-0.01em;transition:all .18s var(--ease);font-variant-numeric:tabular-nums}
.tx-year:hover{background:var(--surface-2);color:var(--text-2);border-color:var(--border-2)}
.tx-year.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(232,184,109,0.35);box-shadow:inset 0 0 0 1px rgba(232,184,109,0.15)}

/* ═══ LEGAL PAGE (Tab 6) ═══ */
.lg-page{max-width:920px;margin:0 auto}
.lg-hero{margin-bottom:48px;padding-top:8px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:18px}
.lg-hero-main{flex:1;min-width:260px}
.lg-hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px}
.lg-hero-title{font-size:36px;font-weight:800;letter-spacing:-0.03em;line-height:1.1;color:var(--text)}
.lg-hero-sub{display:flex;align-items:center;gap:14px;margin-top:14px;font-size:13px;color:var(--text-3);font-weight:500;flex-wrap:wrap}
.lg-hero-sub .divider{color:var(--text-4)}
.lg-hero-sub .accent{color:var(--accent);font-weight:700}

.lg-person-switch{display:flex;gap:2px;background:var(--surface-2);border:1px solid var(--border);border-radius:100px;padding:3px;flex-shrink:0}
.lg-person{padding:9px 20px;font-size:12px;font-weight:600;color:var(--text-3);background:transparent;border:none;border-radius:100px;cursor:pointer;transition:all .18s var(--ease);letter-spacing:-0.005em}
.lg-person:hover{color:var(--text-2)}
.lg-person.active{color:var(--text);background:var(--surface);box-shadow:var(--shadow-sm)}

.lg-section-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;margin-top:48px;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3)}
.lg-section-label:first-of-type{margin-top:0}
.lg-section-label .count{color:var(--text-4);font-weight:600}

.lg-case{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px 32px;margin-bottom:14px;transition:border-color .22s var(--ease)}
.lg-case:hover{border-color:var(--border-2)}
.lg-case-head{display:flex;align-items:flex-start;gap:18px;flex-wrap:wrap}
.lg-case-main{flex:1;min-width:0}
.lg-case-meta-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.lg-case-cat{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-4)}
.lg-case-receipt{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:0.02em;font-variant-numeric:tabular-nums}
.lg-case-copy{font-size:9px;font-weight:700;color:var(--text-4);background:transparent;border:none;padding:0 4px;cursor:pointer;letter-spacing:0.04em;text-transform:uppercase;transition:color .18s}
.lg-case-copy:hover{color:var(--text-2)}
.lg-case-name{font-size:19px;font-weight:700;color:var(--text);letter-spacing:-0.02em;line-height:1.3}
.lg-case-attorney{font-size:12px;color:var(--text-3);margin-top:6px;font-weight:500}
.lg-case-status{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.lg-status-badge{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:0.02em;background:var(--surface-2);color:var(--text-2);border:1px solid var(--border)}
.lg-status-badge.accent{background:var(--accent-dim);color:var(--accent);border-color:rgba(232,184,109,0.25)}
.lg-status-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.lg-checked{font-size:10px;color:var(--text-4);font-weight:500}
.lg-next{display:flex;align-items:center;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);flex-wrap:wrap}
.lg-next-lbl{font-size:9px;font-weight:700;letter-spacing:0.10em;text-transform:uppercase;color:var(--text-4)}
.lg-next-text{font-size:13px;color:var(--text);font-weight:500}
.lg-next-date{font-size:11px;color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums}
.lg-detail{margin-top:14px;padding:14px 18px;background:var(--surface-2);border-radius:var(--r);font-size:12px;color:var(--text-2);line-height:1.6}
.lg-notes{margin-top:14px;font-size:12px;color:var(--text-3);font-style:italic;line-height:1.5}

.lg-timeline{margin-top:20px}
.lg-timeline-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.lg-timeline-lbl{font-size:9px;font-weight:700;letter-spacing:0.10em;text-transform:uppercase;color:var(--text-4)}
.lg-timeline-bar{height:3px;background:var(--surface-2);border-radius:100px;overflow:hidden;margin-bottom:14px}
