// Writing is sacred → serif, breathable. Past self speaks to present → Echoes.
// Arcs not metrics → horizon line. Thresholds not tabs → period banners.
let reflectionsData = [];
let reflectionsLoaded = false;
let rfSnapshotsAll = [];
let rfSnapshotsLoaded = false;
let rfThreadsData = [];
let rfScope = 'day';          // 'day' | 'week' | 'month' | 'year'
let rfAnchor = null;           // narrative-day ISO, null = today
let rfComposeOpen = false;     // user wants to write (overrides empty-state UX)
let rfEchoesExpanded = new Set();
let rfKeybindsBound = false;
let rfLifeLoaded = false;
let rfLifeDob = null;
let rfLifeRhr = 60;

async function rfLoadLifeData() {
  if (rfLifeLoaded) return;
  const h = { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` };
  try {
    const [pRes, ahRes, oRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/profile?limit=1&select=date_of_birth`, { headers: h }),
      fetch(`${SUPABASE_URL}/rest/v1/apple_health_daily?rhr_bpm=not.is.null&order=date.desc&limit=1&select=date,rhr_bpm`, { headers: h }),
      fetch(`${SUPABASE_URL}/rest/v1/oura_daily?rhr_bpm=not.is.null&order=date.desc&limit=1&select=date,rhr_bpm`, { headers: h }),
    ]);
    const profiles = await pRes.json();
    const dobStr = profiles?.[0]?.date_of_birth;
    rfLifeDob = dobStr ? new Date(dobStr + 'T12:00:00') : null;
    rfLifeRhr = pickLatestRhr(await ahRes.json(), await oRes.json());
  } catch (e) {
    console.error('rfLoadLifeData failed', e);
  }
  rfLifeLoaded = true;
}

async function rfLoadData() {
  if (reflectionsLoaded && rfSnapshotsLoaded) return;
  const h = { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` };
  try {
    const [rRes, sRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/reflections?order=created_at.desc`, { headers: h }),
      fetch(`${SUPABASE_URL}/rest/v1/snapshots?order=date.desc`, { headers: h }),
    ]);
    reflectionsData = (await rRes.json()) || [];
    rfSnapshotsAll = (await sRes.json()) || [];
  } catch (e) {
    console.error('rfLoadData failed', e);
  }
  reflectionsLoaded = true;
  rfSnapshotsLoaded = true;
}

// ─── Date math (narrative-day aware) ───
function rfDateAdd(isoDate, days) {
  const d = new Date(isoDate + 'T12:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
}
function rfWeekStart(isoDate) {
  // Monday-start week
  const d = new Date(isoDate + 'T12:00:00');
  const dow = d.getDay();
  const shift = dow === 0 ? -6 : 1 - dow;
  d.setDate(d.getDate() + shift);
  return d.toISOString().slice(0,10);
}
function rfWeekEnd(weekStartIso) { return rfDateAdd(weekStartIso, 6); }
function rfMonthStart(isoDate) { return isoDate.slice(0,8) + '01'; }
function rfYearStart(isoDate) { return isoDate.slice(0,4) + '-01-01'; }
function rfAnchorForScope(scope, anchor) {
  const a = anchor || becTodayNarrativePT();
  if (scope === 'week')  return rfWeekStart(a);
  if (scope === 'month') return rfMonthStart(a);
  if (scope === 'year')  return rfYearStart(a);
  return a;
}
function rfISOWeekNum(isoDate) {
  const d = new Date(isoDate + 'T12:00:00');
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay()||7));
  const yearStart = new Date(d.getFullYear(), 0, 1);
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

// Narrative-day key for a reflection row
function rfDayKey(r) {
  if (!r) return '';
  if (r.date && /^\d{4}-\d{2}-\d{2}$/.test(r.date)) return r.date;
  return becNarrativeDayPT(r.created_at);
}

// Snapshot lookup (scope + anchor)
function rfFindSnap(scope, dateAnchor) {
  return (rfSnapshotsAll || []).find(s => (s.scope || 'day') === scope && s.date === dateAnchor) || null;
}

// ─── Navigation ───
function rfSetScope(scope) {
  rfScope = scope;
  if (!rfAnchor) rfAnchor = becTodayNarrativePT();
  rfComposeOpen = false;
  renderReflections();
}
function rfGoToday() {
  rfAnchor = becTodayNarrativePT();
  rfScope = 'day';
  rfComposeOpen = false;
  renderReflections();
}
function rfNavStep(direction) {
  const a = rfAnchorForScope(rfScope, rfAnchor);
  let next = a;
  if (rfScope === 'day') next = rfDateAdd(a, direction);
  else if (rfScope === 'week') next = rfDateAdd(a, direction * 7);
  else if (rfScope === 'month') {
    const d = new Date(a + 'T12:00:00');
    d.setDate(1); d.setMonth(d.getMonth() + direction);
    next = d.toISOString().slice(0,10);
  } else if (rfScope === 'year') {
    const y = parseInt(a.slice(0,4)) + direction;
    next = `${y}-01-01`;
  }
  rfAnchor = next;
  rfComposeOpen = false;
  renderReflections();
}
function rfZoomToDay(isoDate)   { rfScope = 'day';   rfAnchor = isoDate;                 rfComposeOpen = false; renderReflections(); }
function rfZoomToWeek(isoDate)  { rfScope = 'week';  rfAnchor = rfWeekStart(isoDate);    rfComposeOpen = false; renderReflections(); }
function rfZoomToMonth(isoDate) { rfScope = 'month'; rfAnchor = rfMonthStart(isoDate);   rfComposeOpen = false; renderReflections(); }
function rfZoomToYear(isoDate)  { rfScope = 'year';  rfAnchor = rfYearStart(isoDate);    rfComposeOpen = false; renderReflections(); }
function rfOpenCompose() { rfComposeOpen = true; renderReflections(); setTimeout(()=>document.getElementById('rf-compose-ta')?.focus(), 40); }
function rfCloseCompose() { rfComposeOpen = false; renderReflections(); }

// ─── Main render ───
async function renderReflections() {
  const root = document.getElementById('reflections-root');
  if (!root) return;

  if (!reflectionsLoaded || !rfSnapshotsLoaded) {
    root.innerHTML = `<div style="padding:80px;text-align:center;color:var(--text-3)">Loading…</div>`;
    await rfLoadData();
  }
  await rfLoadLifeData();
  rfBindKeybinds();

  const todayStr = becTodayNarrativePT();
  const scope = rfScope;
  const anchor = rfAnchorForScope(scope, rfAnchor);

  const nav = rfNavHTML(scope, anchor, todayStr);
  const thresholds = scope === 'day' ? rfThresholdBannersHTML(todayStr) : '';
  const hero = await rfHeroHTML(scope, anchor, todayStr);
  const arc = rfArcHTML(scope, anchor);
  const echoes = scope === 'day' ? rfEchoesHTML(anchor) : '';
  const threads = rfThreadsHTML();
  const lifeCalendar = rfLifeDob ? prf_renderLifeCalendar(rfLifeDob, rfLifeRhr) : '';

  root.innerHTML = `
    <div class="rf-layout">
      <div class="rf-main">
        ${nav}
        ${thresholds}
        <div class="rf-hero-panel">${hero}</div>
        ${arc}
        ${echoes}
        ${threads}
      </div>
      <aside class="rf-side">${lifeCalendar}</aside>
    </div>
  `;
}

// ─── Top nav: scope chips + breadcrumb + date arrows ───
function rfNavHTML(scope, anchor, today) {
  const chip = (key, label) => `<button class="rf-chip ${scope===key?'active':''}" onclick="rfSetScope('${key}')">${label}</button>`;
  const atToday = (scope === 'day' && anchor === today)
    || (scope === 'week' && anchor === rfWeekStart(today))
    || (scope === 'month' && anchor === rfMonthStart(today))
    || (scope === 'year' && anchor === rfYearStart(today));
  // Next button disabled if stepping forward lands past today
  let nextA;
  if (scope === 'day') nextA = rfDateAdd(anchor, 1);
  else if (scope === 'week') nextA = rfDateAdd(anchor, 7);
  else if (scope === 'month') { const d=new Date(anchor+'T12:00:00'); d.setDate(1); d.setMonth(d.getMonth()+1); nextA = d.toISOString().slice(0,10); }
  else { nextA = `${parseInt(anchor.slice(0,4))+1}-01-01`; }
  const nextDisabled = nextA > today;

  return `<div class="rf-nav">
    <div class="rf-nav-top">
      <div class="rf-scope-chips">
        ${chip('day','Day')}${chip('week','Week')}${chip('month','Month')}${chip('year','Year')}
      </div>
      <div class="rf-date-nav">
        <button class="rf-nav-btn" onclick="rfNavStep(-1)" aria-label="Previous">‹</button>
        ${atToday ? '' : `<button class="rf-today-btn" onclick="rfGoToday()">Today</button>`}
        <button class="rf-nav-btn" onclick="rfNavStep(1)" aria-label="Next"${nextDisabled?' disabled':''}>›</button>
      </div>
    </div>
    ${rfBreadcrumbHTML(scope, anchor)}
  </div>`;
}

function rfBreadcrumbHTML(scope, anchor) {
  const year = anchor.slice(0,4);
  const d = new Date(anchor + 'T12:00:00');
  const monthName = d.toLocaleDateString('en-US', { month:'long' });
  const monthStart = rfMonthStart(anchor);
  const weekStart = rfWeekStart(anchor);
  const wd1 = new Date(weekStart+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const wd2 = new Date(rfWeekEnd(weekStart)+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const weekLbl = `Week ${rfISOWeekNum(weekStart)}`;
  const dayLbl = d.toLocaleDateString('en-US', { weekday:'long', day:'numeric' });

  const crumb = (label, onClick, active=false) =>
    active
      ? `<span class="rf-crumb active">${label}</span>`
      : `<button class="rf-crumb" onclick="${onClick}">${label}</button>`;
  const sep = `<span class="rf-crumb-sep">›</span>`;

  const parts = [];
  parts.push(crumb(year, `rfZoomToYear('${year}-01-01')`, scope==='year'));
  if (scope !== 'year') parts.push(sep, crumb(monthName, `rfZoomToMonth('${monthStart}')`, scope==='month'));
  if (scope === 'week') parts.push(sep, crumb(`${weekLbl} · ${wd1}–${wd2}`, 'void(0)', true));
  if (scope === 'day') {
    parts.push(sep, crumb(`${weekLbl}`, `rfZoomToWeek('${weekStart}')`, false));
    parts.push(sep, crumb(dayLbl, 'void(0)', true));
  }
  return `<div class="rf-breadcrumb">${parts.join('')}</div>`;
}

// ─── Scope hero dispatch ───
async function rfHeroHTML(scope, anchor, today) {
  if (scope === 'day')   return await rfDayHeroHTML(anchor, today);
  if (scope === 'week')  return rfWeekHeroHTML(anchor, today);
  if (scope === 'month') return rfMonthHeroHTML(anchor, today);
  if (scope === 'year')  return rfYearHeroHTML(anchor, today);
  return '';
}

// ─── Day scope hero ───
async function rfDayHeroHTML(anchor, today) {
  const entries = reflectionsData
    .filter(r => rfDayKey(r) === anchor)
    .sort((a,b) => (a.created_at||'').localeCompare(b.created_at||''));

  const d = new Date(anchor + 'T12:00:00');
  const weekday = d.toLocaleDateString('en-US', { weekday:'long' });
  const monthDayYear = d.toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
  const relLabel = anchor === today ? 'Today' : anchor === rfDateAdd(today, -1) ? 'Yesterday' : '';
  const isFuture = anchor > today;
  const isToday = anchor === today;
  const totalWords = entries.reduce((n, e) => n + (e.content.trim().split(/\s+/).filter(Boolean).length), 0);
  const metaBits = [];
  if (entries.length) metaBits.push(`${entries.length} entr${entries.length===1?'y':'ies'}`);
  if (totalWords) metaBits.push(`${totalWords} word${totalWords===1?'':'s'}`);
  const meta = metaBits.join('<span class="sep">·</span>');

  const head = `<div class="rf-day-head">
    <div>
      <div class="rf-day-date">${relLabel ? `${relLabel}<br/><span class="muted">${weekday}, ${monthDayYear}</span>` : `${weekday}<br/><span class="muted">${monthDayYear}</span>`}</div>
    </div>
    ${meta ? `<div class="rf-day-meta">${meta}</div>` : ''}
  </div>`;

  if (isFuture) {
    return head + `<div class="rf-empty-day">
      <div class="rf-empty-day-title">Not yet.</div>
      <div class="rf-empty-day-sub">This day hasn't arrived. Come back when you've lived it.</div>
    </div>`;
  }

  // Morning brief — rendered at the TOP of every non-future day.
  // Reading order: morning brief → reflection compose/entries → evening snapshot.
  let debriefHTML = '';
  try { debriefHTML = await bdbBuildDebriefHTML(anchor); } catch (e) { console.error(e); }

  let body = debriefHTML;
  if (entries.length) {
    let snapshotHTML = '';
    try { snapshotHTML = await becBuildSnapshotHTML(entries, anchor); } catch (e) { console.error(e); }
    body += `<div class="rf-entries">${entries.map(rfEntryCardHTML).join('')}</div>`;
    body += rfComposeOpen
      ? rfComposeHeroHTML(anchor)
      : `<button class="rf-add-more" onclick="rfOpenCompose()">+ Add another entry</button>`;
    body += snapshotHTML;
  } else if (isToday || rfComposeOpen) {
    body += rfComposeHeroHTML(anchor);
  } else {
    body += `<div class="rf-empty-day">
      <div class="rf-empty-day-title">Unnarrated.</div>
      <div class="rf-empty-day-sub">This day passed without reflection. You can narrate it now — memory is enough.</div>
      <button class="rf-narrate-btn" onclick="rfOpenCompose()">Narrate ${weekday}</button>
    </div>`;
  }
  return head + body;
}

function rfComposeHeroHTML(anchor) {
  const isToday = anchor === becTodayNarrativePT();
  const placeholder = isToday
    ? 'Narrate today. What happened, what you felt, what you chose…'
    : 'Narrate this day. Memory is enough.';
  return `<div class="rf-compose-hero" data-anchor="${anchor}">
    <textarea id="rf-compose-ta" placeholder="${placeholder}" oninput="rfUpdateCount()"></textarea>
    <div class="rf-compose-hero-footer">
      <div class="rf-compose-meta" id="rf-compose-count">0 words</div>
      <div style="display:flex;gap:10px;align-items:center">
        ${rfComposeOpen || !isToday ? `<button class="rf-ghost-btn" onclick="rfCloseCompose()">Cancel</button>` : ''}
        <button class="rf-save-btn" id="rf-save-btn" onclick="rfSaveEntry()">Save reflection</button>
      </div>
    </div>
  </div>`;
}

function rfEntryCardHTML(entry) {
  const d = new Date(entry.created_at);
  const timeStr = d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
  const words = entry.content.trim().split(/\s+/).filter(Boolean).length;
  const safe = escapeHtml(entry.content);
  return `<div class="rf-entry-card" data-id="${entry.id}">
    <div class="rf-entry-head">
      <span class="rf-entry-time">${timeStr}</span>
      <span class="rf-entry-count">${words} word${words===1?'':'s'}</span>
    </div>
    <div class="rf-entry-body">${safe}</div>
    <div class="rf-entry-actions">
      <button class="rf-entry-action" onclick="rfEditEntry('${entry.id}')">Edit</button>
      <button class="rf-entry-action delete" onclick="rfDeleteEntry('${entry.id}')">Delete</button>
    </div>
  </div>`;
}

// ─── Week scope hero ───
function rfWeekHeroHTML(anchor, today) {
  const weekStart = anchor;
  const weekEnd = rfWeekEnd(weekStart);
  const d1 = new Date(weekStart + 'T12:00:00');
  const d2 = new Date(weekEnd + 'T12:00:00');
  const sameYear = d1.getFullYear() === d2.getFullYear();
  const range = `${d1.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${d2.toLocaleDateString('en-US',{month:'short',day:'numeric'})}, ${d2.getFullYear()}`;
  const weekNum = rfISOWeekNum(weekStart);

  const snap = rfFindSnap('week', weekStart);
  const snapCard = snap ? rfScopeSnapHTML(snap, `Week ${weekNum}`) : rfScopeSnapAwaitingHTML('week', `Week ${weekNum} · ${range}`);

  const days = [];
  for (let i = 0; i < 7; i++) {
    const dateIso = rfDateAdd(weekStart, i);
    const dayEntries = reflectionsData.filter(r => rfDayKey(r) === dateIso);
    const daySnap = rfFindSnap('day', dateIso);
    const dd = new Date(dateIso + 'T12:00:00');
    const dow = dd.toLocaleDateString('en-US', { weekday:'short' });
    const dom = dd.getDate();
    const isToday = dateIso === today;
    const isFuture = dateIso > today;
    const hasEntry = dayEntries.length > 0;
    const isSkipped = !isFuture && !hasEntry;
    const become = daySnap?.agg_become != null ? Math.round(daySnap.agg_become) : null;
    let valueHTML;
    if (become != null) valueHTML = `<div class="rf-week-become">${become}</div>`;
    else if (hasEntry)  valueHTML = `<div class="rf-week-written"></div>`;
    else if (isFuture)  valueHTML = `<div class="rf-week-become skipped">·</div>`;
    else                valueHTML = `<div class="rf-week-become skipped">—</div>`;
    days.push(`<div class="rf-week-cell ${isToday?'today':''} ${isFuture?'future':''} ${isSkipped?'skipped':''}"${isFuture?'':` onclick="rfZoomToDay('${dateIso}')"`}>
      <div class="rf-week-dow">${dow}</div>
      <div class="rf-week-dom">${dom}</div>
      ${valueHTML}
    </div>`);
  }

  return `<div class="rf-week-head">
    <div>
      <div class="rf-week-title">Week ${weekNum}</div>
      <div class="rf-week-range">${range}</div>
    </div>
  </div>
  ${snapCard}
  <div class="rf-week-strip">${days.join('')}</div>`;
}

// ─── Month scope hero ───
function rfMonthHeroHTML(anchor, today) {
  const monthStart = anchor;
  const d = new Date(monthStart + 'T12:00:00');
  const year = d.getFullYear();
  const month = d.getMonth();
  const monthName = d.toLocaleDateString('en-US', { month:'long' });
  const daysInMonth = new Date(year, month+1, 0).getDate();

  const monthPrefix = monthStart.slice(0,7);
  const entriesInMonth = reflectionsData.filter(r => rfDayKey(r).slice(0,7) === monthPrefix);
  const dayCount = new Set(entriesInMonth.map(rfDayKey)).size;

  const snap = rfFindSnap('month', monthStart);
  const snapCard = snap ? rfScopeSnapHTML(snap, `${monthName} ${year}`) : rfScopeSnapAwaitingHTML('month', `${monthName} ${year}`);

  // Monday-first calendar
  const firstDOW = (new Date(year, month, 1).getDay() + 6) % 7;
  const cells = [];
  for (let i = 0; i < firstDOW; i++) {
    cells.push({ dateIso: rfDateAdd(monthStart, -(firstDOW - i)), outside: true });
  }
  for (let i = 1; i <= daysInMonth; i++) {
    const mm = String(month+1).padStart(2,'0');
    const dd = String(i).padStart(2,'0');
    cells.push({ dateIso: `${year}-${mm}-${dd}`, outside: false });
  }
  while (cells.length % 7 !== 0) {
    cells.push({ dateIso: rfDateAdd(cells[cells.length-1].dateIso, 1), outside: true });
  }

  const dows = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const gridHTML = cells.map(c => {
    const isToday = c.dateIso === today;
    const isFuture = c.dateIso > today;
    const hasEntry = reflectionsData.some(r => rfDayKey(r) === c.dateIso);
    const daySnap = rfFindSnap('day', c.dateIso);
    const become = daySnap?.agg_become != null ? Math.round(daySnap.agg_become) : null;
    const dom = parseInt(c.dateIso.slice(-2));
    const clickable = !c.outside && !isFuture;
    return `<div class="rf-month-cell ${c.outside?'outside':''} ${isToday?'today':''} ${isFuture?'future':''} ${!hasEntry&&!c.outside&&!isFuture?'skipped':''}"${clickable?` onclick="rfZoomToDay('${c.dateIso}')"`:''}>
      <div class="rf-month-cell-dom">${dom}</div>
      ${become != null ? `<div class="rf-month-become">${become}</div>` : hasEntry ? `<div class="rf-month-dot"></div>` : ''}
    </div>`;
  }).join('');

  return `<div class="rf-month-head">
    <div>
      <div class="rf-month-title">${monthName} ${year}</div>
      <div class="rf-month-meta">${dayCount} day${dayCount===1?'':'s'} narrated · ${entriesInMonth.length} entr${entriesInMonth.length===1?'y':'ies'}</div>
    </div>
  </div>
  ${snapCard}
  <div class="rf-month-dow-row">${dows.map(x => `<div class="rf-month-dow-lbl">${x}</div>`).join('')}</div>
  <div class="rf-month-grid">${gridHTML}</div>`;
}

// ─── Year scope hero ───
function rfYearHeroHTML(anchor, today) {
  const year = anchor.slice(0,4);
  const yearEntries = reflectionsData.filter(r => rfDayKey(r).slice(0,4) === year);
  const dayCount = new Set(yearEntries.map(rfDayKey)).size;

  const snap = rfFindSnap('year', anchor);
  const snapCard = snap ? rfScopeSnapHTML(snap, year) : rfScopeSnapAwaitingHTML('year', year);

  const months = [];
  for (let m = 0; m < 12; m++) {
    const mo = String(m+1).padStart(2,'0');
    const moStart = `${year}-${mo}-01`;
    const moPrefix = moStart.slice(0,7);
    const moName = new Date(moStart+'T12:00:00').toLocaleDateString('en-US', { month:'short' });
    const moEntries = reflectionsData.filter(r => rfDayKey(r).slice(0,7) === moPrefix);
    const moDayCount = new Set(moEntries.map(rfDayKey)).size;
    const moSnap = rfFindSnap('month', moStart);
    const become = moSnap?.agg_become != null ? Math.round(moSnap.agg_become) : null;
    const isFuture = moStart > today;
    const isCurrent = moStart.slice(0,7) === today.slice(0,7);
    const isEmpty = !isFuture && moDayCount === 0;
    let valueHTML;
    if (become != null) valueHTML = `<div class="rf-year-become">${become}</div>`;
    else if (moDayCount) valueHTML = `<div class="rf-year-become" style="color:var(--text-2);font-size:14px">${moDayCount}d</div>`;
    else if (isFuture)   valueHTML = `<div class="rf-year-become empty">·</div>`;
    else                 valueHTML = `<div class="rf-year-become empty">—</div>`;
    months.push(`<div class="rf-year-cell ${isCurrent?'current':''} ${isFuture?'future':''} ${isEmpty?'empty':''}"${isFuture?'':` onclick="rfZoomToMonth('${moStart}')"`}>
      <div class="rf-year-mo">${moName}</div>
      ${valueHTML}
      <div class="rf-year-count">${moEntries.length} entr${moEntries.length===1?'y':'ies'}</div>
    </div>`);
  }

  return `<div class="rf-year-head">
    <div>
      <div class="rf-year-title">${year}</div>
      <div class="rf-year-meta">${dayCount} day${dayCount===1?'':'s'} narrated · ${yearEntries.length} entr${yearEntries.length===1?'y':'ies'}</div>
    </div>
  </div>
  ${snapCard}
  <div class="rf-year-strip">${months.join('')}</div>`;
}

// ─── Scope snapshot (shared week/month/year card) ───
function rfScopeSnapHTML(snap, kicker) {
  const be = Number(snap.agg_be || 0).toFixed(1);
  const doS = Number(snap.agg_do || 0).toFixed(1);
  const become = Math.round(Number(snap.agg_become || 0));
  const insight = snap.insight ? escapeHtml(snap.insight) : '';
  return `<div class="rf-scope-snap">

// ─── Arc (Become horizon line across scope window) ───
function rfArcHTML(scope, anchor) {
  const points = rfArcPoints(scope, anchor);
  const rangeLabel = {
    day:   'Last 30 days',
    week:  'Last 12 weeks',
    month: 'Last 12 months',
    year:  `${points.length} year${points.length===1?'':'s'}`
  }[scope] || '';

  const nonNull = points.filter(p => p.y != null);
  if (nonNull.length < 2) {
    return `<div class="rf-arc">
      <div class="rf-arc-header">
        <div class="rf-arc-label">Arc · Become over time</div>
        <div class="rf-arc-range">${rangeLabel}</div>
      </div>
      <div class="rf-arc-empty">The arc appears once you have a few synthesized snapshots.</div>
    </div>`;
  }

  const W = 1000, H = 80, PAD = 6;
  const n = points.length;
  const maxY = Math.max(100, ...nonNull.map(p => p.y));
  const minY = 0;
  const xAt = i => PAD + (i * (W - 2*PAD)) / Math.max(1, n-1);
  const yAt = y => y == null ? null : H - PAD - ((y - minY) / (maxY - minY)) * (H - 2*PAD);

  // Line — break across nulls
  let linePath = '';
  let started = false;
  points.forEach((p, i) => {
    const y = yAt(p.y);
    if (y == null) { started = false; return; }
    linePath += `${started ? 'L' : 'M'} ${xAt(i).toFixed(1)} ${y.toFixed(1)} `;
    started = true;
  });

  // Area — connect through nulls at baseline
  let areaPath = '';
  let areaStarted = false;
  points.forEach((p, i) => {
    const y = yAt(p.y);
    if (y != null) {
      if (!areaStarted) { areaPath += `M ${xAt(i).toFixed(1)} ${(H-PAD).toFixed(1)} `; areaStarted = true; }
      areaPath += `L ${xAt(i).toFixed(1)} ${y.toFixed(1)} `;
    } else if (areaStarted) {
      areaPath += `L ${xAt(i).toFixed(1)} ${(H-PAD).toFixed(1)} `;
    }
  });
  if (areaStarted) areaPath += `L ${xAt(n-1).toFixed(1)} ${(H-PAD).toFixed(1)} Z`;

  const lastIdx = points.length - 1;
  const lastY = yAt(points[lastIdx].y);
  const lastDot = lastY != null ? `<circle class="arc-dot current" cx="${xAt(lastIdx).toFixed(1)}" cy="${lastY.toFixed(1)}" r="3.5"/>` : '';

  return `<div class="rf-arc">
    <div class="rf-arc-header">
      <div class="rf-arc-label">Arc · Become over time</div>
      <div class="rf-arc-range">${rangeLabel}</div>
    </div>
    <svg class="rf-arc-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="rf-arc-grad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.32"/>
          <stop offset="100%" stop-color="var(--accent)" stop-opacity="0.02"/>
        </linearGradient>
      </defs>
      <path class="arc-area" d="${areaPath}"/>
      <path class="arc-line" d="${linePath}"/>
      ${lastDot}
    </svg>
  </div>`;
}

function rfArcPoints(scope, anchor) {
  const pts = [];
  if (scope === 'day') {
    for (let i = 29; i >= 0; i--) {
      const date = rfDateAdd(anchor, -i);
      const s = rfFindSnap('day', date);
      pts.push({ x: date, y: s?.agg_become != null ? Number(s.agg_become) : null });
    }
  } else if (scope === 'week') {
    for (let i = 11; i >= 0; i--) {
      const ws = rfDateAdd(anchor, -7*i);
      const w = rfFindSnap('week', ws);
      if (w?.agg_become != null) { pts.push({ x: ws, y: Number(w.agg_become) }); continue; }
      const daily = [];
      for (let j = 0; j < 7; j++) {
        const s = rfFindSnap('day', rfDateAdd(ws, j));
        if (s?.agg_become != null) daily.push(Number(s.agg_become));
      }
      pts.push({ x: ws, y: daily.length ? daily.reduce((a,b)=>a+b,0)/daily.length : null });
    }
  } else if (scope === 'month') {
    for (let i = 11; i >= 0; i--) {
      const d = new Date(anchor + 'T12:00:00');
      d.setDate(1); d.setMonth(d.getMonth() - i);
      const ms = d.toISOString().slice(0,10);
      const m = rfFindSnap('month', ms);
      if (m?.agg_become != null) { pts.push({ x: ms, y: Number(m.agg_become) }); continue; }
      const prefix = ms.slice(0,7);
      const daily = (rfSnapshotsAll||[]).filter(s => (s.scope||'day')==='day' && s.date?.slice(0,7)===prefix && s.agg_become!=null).map(s=>Number(s.agg_become));
      pts.push({ x: ms, y: daily.length ? daily.reduce((a,b)=>a+b,0)/daily.length : null });
    }
  } else if (scope === 'year') {
    const years = [...new Set((rfSnapshotsAll||[]).map(s => s.date?.slice(0,4)).filter(Boolean))].sort();
    years.forEach(y => {
      const ys = `${y}-01-01`;
      const yr = rfFindSnap('year', ys);
      if (yr?.agg_become != null) { pts.push({ x: ys, y: Number(yr.agg_become) }); return; }
      const daily = (rfSnapshotsAll||[]).filter(s => (s.scope||'day')==='day' && s.date?.slice(0,4)===y && s.agg_become!=null).map(s=>Number(s.agg_become));
      pts.push({ x: ys, y: daily.length ? daily.reduce((a,b)=>a+b,0)/daily.length : null });
    });
  }
  return pts;
}

// ─── Echoes ───
function rfEchoesHTML(anchor) {
  const d = new Date(anchor + 'T12:00:00');
  const md = `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  // Pick at most one entry per matching past day (most impactful / earliest)
  const matches = reflectionsData.filter(r => {
    const k = rfDayKey(r);
    return k && k !== anchor && k < anchor && k.slice(5) === md;
  });
  if (!matches.length) return '';

  const byDay = {};
  matches.forEach(r => { const k = rfDayKey(r); if (!byDay[k]) byDay[k] = r; });
  const days = Object.keys(byDay).sort().reverse().slice(0, 6);

  const cards = days.map(k => {
    const entry = byDay[k];
    const dd = new Date(k + 'T12:00:00');
    const yearsAgo = d.getFullYear() - dd.getFullYear();
    const monthsAgo = (d.getFullYear()*12 + d.getMonth()) - (dd.getFullYear()*12 + dd.getMonth());
    let when;
    if (yearsAgo >= 1) when = yearsAgo === 1 ? '1 year ago' : `${yearsAgo} years ago`;
    else if (monthsAgo >= 1) when = monthsAgo === 1 ? '1 month ago' : `${monthsAgo} months ago`;
    else { const daysAgo = Math.round((d-dd)/86400000); when = `${daysAgo} day${daysAgo===1?'':'s'} ago`; }
    const dateLbl = dd.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
    const expanded = rfEchoesExpanded.has(k);
    return `<div class="rf-echo ${expanded?'expanded':''}" onclick="rfToggleEcho('${k}')">
      <div class="rf-echo-head">
        <div class="rf-echo-when">${when}</div>
        <div class="rf-echo-date">${dateLbl}</div>
      </div>
      <div class="rf-echo-body">${escapeHtml(entry.content)}</div>
    </div>`;
  }).join('');

  return `<div class="rf-echoes">
    <div class="rf-section-title">Echoes · past self on this day</div>
    ${cards}
  </div>`;
}

function rfToggleEcho(dayKey) {
  if (rfEchoesExpanded.has(dayKey)) rfEchoesExpanded.delete(dayKey);
  else rfEchoesExpanded.add(dayKey);
  renderReflections();
}

// ─── Threshold banners ───
// Show when a completed period (prior week/month/year) has reflections but no synthesis.
// Persists until you synthesize — so missing the boundary day doesn't hide the invitation.
function rfThresholdBannersHTML(today) {
  const banners = [];
  const hasEntriesInRange = (startIso, endIso) =>
    reflectionsData.some(r => { const k = rfDayKey(r); return k >= startIso && k <= endIso; });

  // Previous week
  const prevWeekStart = rfDateAdd(rfWeekStart(today), -7);
  const prevWeekEnd = rfWeekEnd(prevWeekStart);
  if (!rfFindSnap('week', prevWeekStart) && hasEntriesInRange(prevWeekStart, prevWeekEnd)) {
    const r1 = new Date(prevWeekStart+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const r2 = new Date(prevWeekEnd+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
    banners.push(`<div class="rf-threshold">
      <div class="rf-threshold-text"><strong>Last week awaits synthesis.</strong> ${r1} – ${r2}. Open Claude and say <em>"synthesize last week"</em>.</div>
      <button class="rf-threshold-go" onclick="rfZoomToWeek('${prevWeekStart}')">Open week →</button>
    </div>`);
  }

  // Previous month
  const currMonthStart = rfMonthStart(today);
  const prevMonthEnd = rfDateAdd(currMonthStart, -1);
  const prevMonthStart = rfMonthStart(prevMonthEnd);
  if (!rfFindSnap('month', prevMonthStart) && hasEntriesInRange(prevMonthStart, prevMonthEnd)) {
    const monthName = new Date(prevMonthStart+'T12:00:00').toLocaleDateString('en-US',{month:'long',year:'numeric'});
    banners.push(`<div class="rf-threshold">
      <div class="rf-threshold-text"><strong>${monthName} awaits synthesis.</strong> Open Claude and say <em>"synthesize last month"</em>.</div>
      <button class="rf-threshold-go" onclick="rfZoomToMonth('${prevMonthStart}')">Open month →</button>
    </div>`);
  }

  // Previous year
  const currYear = parseInt(today.slice(0,4));
  const prevYear = currYear - 1;
  const prevYearStart = `${prevYear}-01-01`;
  const prevYearEnd = `${prevYear}-12-31`;
  if (!rfFindSnap('year', prevYearStart) && hasEntriesInRange(prevYearStart, prevYearEnd)) {
    banners.push(`<div class="rf-threshold">
      <div class="rf-threshold-text"><strong>${prevYear} awaits synthesis.</strong> Open Claude and say <em>"synthesize last year"</em>.</div>
      <button class="rf-threshold-go" onclick="rfZoomToYear('${prevYearStart}')">Open year →</button>
    </div>`);
  }
  return banners.join('');
}

// ─── Keyboard shortcuts ───
function rfBindKeybinds() {
  if (rfKeybindsBound) return;
  rfKeybindsBound = true;
  document.addEventListener('keydown', (e) => {
    const page = document.getElementById('pg-reflections');
    if (!page || !page.classList.contains('active')) return;
    const tag = (e.target?.tagName || '').toLowerCase();
    if (tag === 'textarea' || tag === 'input' || e.target?.isContentEditable) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    switch (e.key) {
      case 'ArrowLeft':  e.preventDefault(); rfNavStep(-1); break;
      case 'ArrowRight': e.preventDefault(); rfNavStep(1); break;
      case 't': case 'T': e.preventDefault(); rfGoToday(); break;
      case 'd': case 'D': e.preventDefault(); rfSetScope('day'); break;
      case 'w': case 'W': e.preventDefault(); rfSetScope('week'); break;
      case 'm': case 'M': e.preventDefault(); rfSetScope('month'); break;
      case 'y': case 'Y': e.preventDefault(); rfSetScope('year'); break;
    }
  });
}

// ───────────────────── BECOME SNAPSHOT ENGINE (v2) ─────────────────────
// Display-only. Scoring happens in the personalos-snapshot Claude skill and
// writes denormalized columns + JSONB to the `snapshots` table. Frontend here
// reads those columns and renders four layers: reflection text → characterization
// → six domain cards (incl. Reflection) → insight + resonance + delta panel.
//
// Scale convention (BECOME document): Be 0\u201310, Do 0\u201310, Become 0\u2013100.
// Aggregate is weighted geometric mean so Be \u00d7 Do = Become holds at every level.
// Reflection is weighted 2/7 because it's where Be \u2261 Do holds most literally.

// Rounds to one decimal, preserves zero as zero.
const becR = (x) => Math.round((Number(x)||0)*10)/10;
const becR0 = (x) => Math.round(Number(x)||0);

// Pacific-time day boundary with a 4am narrative cutoff.
// A reflection written at 11pm PT Monday is Monday's (trivially).
// A reflection written at 2:30am PT Tuesday narrating "today" is *also* Monday's.
// The day flips at 04:00 PT, not 00:00 \u2014 humans don't change days at midnight.
function becTodayPT() {
  // Raw PT date today (no shift) \u2014 used where calendar date is what we want.
  return new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
}
function becNarrativeDayPT(isoOrDate) {
  // The narrative day: subtract 4 hours, then take PT date. This is the day a
  // sub-day timestamp is "about". Use for reflection and task-completion timestamps.
  if (!isoOrDate) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(isoOrDate)) return isoOrDate; // pure date passes through
  try {
    const d = new Date(isoOrDate);
    if (isNaN(d)) return String(isoOrDate).slice(0,10);
    const shifted = new Date(d.getTime() - 4 * 60 * 60 * 1000);
    return shifted.toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
  } catch { return String(isoOrDate).slice(0,10); }
}
function becTodayNarrativePT() {
  return becNarrativeDayPT(new Date().toISOString());
}
// Legacy alias \u2014 becDatePT still used in a few places where we want the raw PT date
// (e.g., monthly rollups). Kept as a pure PT-date conversion with no shift.
function becDatePT(isoOrDate) {
  if (!isoOrDate) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(isoOrDate)) return isoOrDate;
  try {
    return new Date(isoOrDate).toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
  } catch { return String(isoOrDate).slice(0,10); }
}

// Weighted arithmetic mean \u2014 the aggregate-across-domains aggregator.
//
// Design choice (revised 2026-04-18): Be \u00d7 Do = Become is a *domain-level* identity
// and is preserved strictly with zero-collapse (Body.Do = 0 \u2192 Body.Become = 0 \u2014
// there was no becoming in that domain). But whole-self Become is the weighted
// sum of domain becomings, not their product. A life is a mosaic; a sleep-shaped
// gap does not erase a taxes-submitted win. Zero-collapse is honest per-domain,
// but at aggregate it deletes real signal. Arithmetic mean lets zeros pull the
// aggregate down without wiping the day.
//
// Consequence: at aggregate, agg_be \u00d7 agg_do != agg_become. The identity holds
// where you actually live (per domain). At whole-self, you're the sum.
function becWeightedMean(values, weights) {
  if (!values.length) return 0;
  let sum = 0, wSum = 0;
  for (let i = 0; i < values.length; i++) {
    const w = Number(weights[i]) || 0;
    const v = Number(values[i]) || 0;
    sum  += w * v;
    wSum += w;
  }
  return wSum > 0 ? sum / wSum : 0;
}
// Legacy alias for code paths that still reference geomean \u2014 now computes the
// weighted arithmetic mean. Kept to avoid breaking older callers.
const becGeoMean = becWeightedMean;

// Per-domain diagnostic text shown under each card.
function becDiagnoseCard(be, doS) {
  if (be === 0 && doS === 0) return { class:'zero', text:'collapse' };
  if (doS === 0) return { class:'zero', text:'Do = 0' };
  if (be === 0)  return { class:'zero', text:'Be = 0' };
  const diff = be - doS;
  if (Math.abs(diff) < 0.6) return { class:'eq',  text:'Be \u2248 Do \u00b7 aligned' };
  if (diff > 0)              return { class:'neg', text:'Be > Do \u00b7 act more' };
  return { class:'pos', text:'Do > Be \u00b7 deepen Be' };
}

// Diagnosis text for the five labels the skill produces: aligned/identity/grind/collapsed/split.
// Falls back to derived narration if the skill didn't store one (older rows).
function becDiagnosisText(label, beAgg, doAgg) {
  const beF = beAgg.toFixed(1), doF = doAgg.toFixed(1);
  switch ((label||'').toLowerCase()) {
    case 'aligned':
      return { class:'pos',
        text:`<strong>Aligned \u00b7 Be ${beF} \u00d7 Do ${doF}.</strong> All six domains are showing up. Identity and execution in the same room.` };
    case 'identity':
      return { class:'',
        text:`<strong>Identity \u00b7 Be ${beF} > Do ${doF}.</strong> Vision exceeds output. Who you are reaches further than what you did. Fix: increase Do.` };
    case 'grind':
      return { class:'pos',
        text:`<strong>Grind \u00b7 Do ${doF} > Be ${beF}.</strong> Execution without presence. You acted larger than you currently are. Fix: deepen Be to hold the motion.` };
    case 'collapsed':
      return { class:'zero',
        text:`<strong>Collapsed \u00b7 Be ${beF} \u00d7 Do ${doF}.</strong> Both halves under 5. No pep talk \u2014 the day produced little becoming. Name it honestly; tomorrow is a different number.` };
    case 'split':
      return { class:'',
        text:`<strong>Split \u00b7 Be ${beF} \u00d7 Do ${doF}.</strong> Some domains aligned, others collapsed. Read the cards \u2014 the split is the signal.` };
    default:
      // No diagnosis stored (older snapshot). Derive from aggregate.
      if (beAgg === 0 && doAgg === 0) return { class:'zero',
        text:'Total collapse today. Be and Do both zero \u2014 the day produced no becoming.' };
      if (doAgg === 0) return { class:'zero',
        text:'<strong>Do = 0.</strong> Identity without action. Any zero in Do collapses Become regardless of Be.' };
      if (beAgg === 0) return { class:'zero',
        text:'<strong>Be = 0.</strong> Action without identity. Hollow performance \u2014 infinite doing times zero being still equals zero.' };
      const diff = beAgg - doAgg;
      if (Math.abs(diff) < 0.5) return { class:'pos',
        text:`<strong>Be \u2248 Do at ${beF}.</strong> Authenticity \u2014 identity and output integrated. Be\u00b2 = ${(beAgg*beAgg).toFixed(1)}.` };
      if (diff > 0) return { class:'',
        text:`<strong>Be > Do by ${diff.toFixed(1)}.</strong> Vision exceeds output. Fix: increase Do.` };
      return { class:'pos',
        text:`<strong>Do > Be by ${(-diff).toFixed(1)}.</strong> Output exceeds identity. Fix: deepen Be.` };
  }
}

// Fetch a stored snapshot row for a date. Returns null if none.
async function becLoadStoredSnapshot(dateStr) {
  const h = { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON };
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/snapshots?date=eq.${dateStr}&limit=1`, { headers: h });
    const rows = await res.json();
    return Array.isArray(rows) && rows.length ? rows[0] : null;
  } catch (e) {
    console.warn('stored snapshot fetch failed', e);
    return null;
  }
}

// ─── Morning debrief ────────────────────────────────────────────────

async function bdbLoadStoredDebrief(dateStr) {

// Render full_text by splitting on blank lines → <p> blocks. Preserves
// paragraph breaks without letting the white-space:pre-wrap collapse
// the rhythm of the prose.
function bdbProseToHTML(fullText) {
  if (!fullText) return '';
  const paras = String(fullText).split(/\n\s*\n/).map(s => s.trim()).filter(Boolean);
  return paras.map(p => `<p>${escapeHtml(p)}</p>`).join('');
}

// Lightweight non-blocking toast. Used by the generate button to confirm
// the trigger phrase was copied to clipboard.
function bdbToast(msg) {
  const existing = document.querySelector('.bdb-toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'bdb-toast';
  el.textContent = msg;
  document.body.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 300);
  }, 2600);
}

// The "Generate brief" button. Skills can't run from a pure SPA click —
// they run in Claude Code when the user asks Claude. So the button copies
// the trigger phrase to his clipboard and shows a toast so he knows to
// paste it into Claude. The scheduled task fires automatically each
// morning; this is the manual override.
async function bdbGenerateDebrief(dateStr) {
  const phrase = dateStr === becTodayNarrativePT()
    ? 'Give me my morning brief'
    : `Give me the morning brief for ${dateStr}`;
  try {
    await navigator.clipboard.writeText(phrase);
    bdbToast(`"${phrase}" copied — paste it to Claude`);
  } catch {
    bdbToast('Ask Claude: "Give me my morning brief"');
  }
}
window.bdbGenerateDebrief = bdbGenerateDebrief;

// Main morning-brief render. Returns HTML. Called at the top of each day
// in renderReflectionDay so the reading order for a day becomes:
//   morning brief → reflection compose/entries → evening snapshot.
async function bdbBuildDebriefHTML(dateStr) {
  const stored = await bdbLoadStoredDebrief(dateStr);
  const today  = becTodayNarrativePT();
  const isFuture = dateStr > today;
  // Don't render a morning-brief card on future days — the day hasn't
  // arrived. And don't render on past days that never had one, either;
  // a missing brief for a past day is a silent absence, not a prompt.
  if (isFuture) return '';

  const d = new Date(dateStr + 'T12:00:00');
  const dateLabel = d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

  if (!stored) {
    // Only offer the generator on today and yesterday. For older days,
    // a missing brief is just part of the record; don't invite retroactive
    // fabrication.
    const yest = (() => {
      const t = new Date(today + 'T12:00:00');
      t.setDate(t.getDate() - 1);
      return t.toISOString().slice(0, 10);
    })();
    const canGenerate = dateStr === today || dateStr === yest;
    if (!canGenerate) return '';
    return `<div class="bdb-wrap">
      <div class="bdb-card">
        <div class="bdb-date">${dateLabel} \u00b7 Morning brief</div>
        <div class="bdb-empty">
          <div class="bdb-empty-title">Not written yet.</div>
          <div class="bdb-empty-sub">A short paragraph that names the mindset today is asking for and the moves that follow. It writes itself each morning, or you can generate one now.</div>
          <button class="bdb-generate-btn" onclick="bdbGenerateDebrief('${dateStr}')">Generate brief</button>
        </div>
      </div>
    </div>`;
  }

  const genDate = stored.generated_at ? new Date(stored.generated_at) : null;
  const genLabel = genDate
    ? genDate.toLocaleString('en-US', { hour:'numeric', minute:'2-digit' })
    : '';
  const triggerLabel = stored.triggered_by === 'scheduled' ? 'scheduled' : 'generated';
  const meta = genLabel ? `${triggerLabel} ${genLabel}` : triggerLabel;

  return `<div class="bdb-wrap">
    <div class="bdb-card">
      <div class="bdb-date">${dateLabel} \u00b7 Morning brief</div>
      <div class="bdb-meta">${escapeHtml(meta)}</div>
      <div class="bdb-prose">${bdbProseToHTML(stored.full_text)}</div>
    </div>
  </div>`;
}

// Build a domain record for rendering \u2014 prefers denormalized typed columns,
// falls back to the `domains` JSONB (older rows or richer detail/observation).
function becDomainFromRow(row, key, label) {
  const dom = (row.domains && row.domains[key]) || {};
  const be  = Number(row[`${key}_be`]  ?? dom.be  ?? 0);
  const doS = Number(row[`${key}_do`]  ?? dom.do  ?? dom.doS ?? 0);
  const becomeRaw = row[`${key}_become`];
  const become = becomeRaw != null ? Number(becomeRaw) : becR(be * doS);
  const detail = String(dom.detail || '');
  const observation = String(dom.observation || '');
  const flag = row.data_flags && row.data_flags[key];
  return { key, label, be, doS, become, detail, observation, flag };
}

// Card renderer \u2014 Become on 0\u2013100 scale, integer display. No division by 10.
function becCardHTML(s) {
  const isZero = s.be === 0 || s.doS === 0;
  const diag = becDiagnoseCard(s.be, s.doS);
  const becomeStr = becR0(s.become != null ? s.become : s.be * s.doS);
  const becomeCls = String(becomeStr).length >= 3 ? ' wide' : '';
  const warn = (s.be < 3 && s.doS > 5) ? 'acting beyond Be' : '';
  const label = s.label + (s.key==='reflection' ? ' \u00b7 2\u00d7' : '');
  const flag = s.flag === 'no_data' ? 'data gap' : '';
  const diagTail = [diag.text, flag, warn].filter(Boolean).join(' \u2014 ');
  // Intensity tier drives subtle glow: zero / low / mid / high
  const tier = isZero ? 'zero' : becomeStr >= 60 ? 'high' : becomeStr >= 30 ? 'mid' : 'low';
  return `<div class="bec-card tier-${tier}">
    <div class="bec-card-left">
      <div class="bec-card-name">${label}</div>
      <div class="bec-card-equation">
        <span class="bec-v-be">${s.be.toFixed(1)}</span><span class="bec-card-op">\u00d7</span><span class="bec-v-do">${s.doS.toFixed(1)}</span>
      </div>
      ${s.detail ? `<div class="bec-card-detail">${escapeHtml(s.detail)}</div>` : ''}
      ${diagTail ? `<div class="bec-card-diag ${diag.class}">${diagTail}</div>` : ''}
    </div>
    <div class="bec-card-right">
      <div class="bec-card-become-value${becomeCls}">${becomeStr}</div>
      <div class="bec-card-become-label">Become</div>
    </div>
  </div>`;
}

// Render the delta panel: \u0394Be / \u0394Do / \u0394Become + identity-vs-execution decomposition.
function becDeltaPanelHTML(row) {
  if (row.delta_become == null && row.delta_be == null && row.delta_do == null) return '';
  const fmt = (v, digits=1) => (v == null ? '\u2014' : (v > 0 ? '+' : '') + Number(v).toFixed(digits));
  const cls = (v) => (v == null ? '' : v > 0 ? 'up' : v < 0 ? 'down' : '');
  const pill = (label, v, digits=1) => `<div class="bec-delta-pill"><span class="bec-delta-pill-label">${label}</span><span class="bec-delta-pill-value ${cls(v)}">${fmt(v,digits)}</span></div>`;
  const idC = row.delta_identity_component;
  const exC = row.delta_execution_component;
  const cmp = row.delta_compared_to ? `vs ${escapeHtml(row.delta_compared_to)}` : '';
  let decomp = '';
  if (idC != null && exC != null) {
    decomp = `<div class="bec-delta-decomp">\u0394Become \u2261 <strong>identity</strong> ${fmt(idC,1)} + <strong>execution</strong> ${fmt(exC,1)}  \u2014  d(Become) = Do\u00b7dBe + Be\u00b7dDo</div>`;
  }
  return `<div class="bec-delta-panel">
    <div class="bec-delta-header">Day over day ${cmp}</div>
    <div class="bec-delta-row">
      ${pill('\u0394Be', row.delta_be)}
      ${pill('\u0394Do', row.delta_do)}
      ${pill('\u0394Become', row.delta_become)}
    </div>
    ${decomp}
  </div>`;
}

// Scaling callout \u2014 surfaces quadratic leverage when the day is high + aligned.
function becScalingCalloutHTML(beAgg, doAgg) {
  if (beAgg < 6 || doAgg < 6) return '';
  if (Math.abs(beAgg - doAgg) > 1.2) return '';
  const next = Math.min(10, Math.max(beAgg, doAgg) + 2);
  const nextBecome = Math.round(next * next);
  return `<div class="bec-scaling-callout">
    <strong>Quadratic leverage.</strong> Be \u2248 Do today. Doubling both quadruples Become. Push both to ${next.toFixed(0)} \u2192 Become \u2248 ${nextBecome}.
  </div>`;
}

// Data-flag summary line below the card grid (e.g. "Oura didn't sync \u00b7 Body is neutral").
function becFlagsLineHTML(dataFlags) {
  if (!dataFlags || typeof dataFlags !== 'object') return '';
  const entries = Object.entries(dataFlags).filter(([,v]) => v === 'no_data');
  if (!entries.length) return '';
  const labels = { sleep:'Oura', food:'Nutrition', body:'Body', money:'Transactions', tasks:'Tasks' };
  const names = entries.map(([k]) => labels[k] || k).join(' \u00b7 ');
  return `<div class="bec-resonance" style="margin-top:12px;">Data gaps: <strong>${escapeHtml(names)}</strong> \u2014 neutral 5/5 where sync failed. Not the same as genuine zero.</div>`;
}

// Main render. Accepts array of today's reflections (chronologically sorted).
async function becBuildSnapshotHTML(reflections, dateStr) {
  const stored = await becLoadStoredSnapshot(dateStr);

  const d = new Date(dateStr + 'T12:00:00');
  const dateLabel = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  // The reflection text itself is rendered by the entry cards below this snapshot
  // (see rfEntryCardHTML in the day hero). The snapshot's job is synthesis — the
  // characterization, the scores, the insight — so we intentionally do NOT reprint
  // the reflection body here. That kept producing a visible duplicate of the journal
  // entry inside the snapshot card.
  const refArr = Array.isArray(reflections) ? reflections : (reflections ? [reflections] : []);

  // Path A \u2014 reflection saved, snapshot not synthesized yet.
  if (!stored) {
    return `<div class="bec-wrap">
      <div class="bec-hero">
        <div class="bec-hero-date">${dateLabel} \u00b7 Snapshot</div>
        <div class="bec-empty" style="margin-top:24px;padding:32px 24px;">
          <div class="bec-empty-title">Reflection saved \u2014 snapshot not synthesized yet</div>
          <div class="bec-empty-sub">Open Claude and say <strong>"yo let's go"</strong> (or <em>"run today's snapshot"</em>). Claude will characterize your reflection, score Be and Do across six domains, aggregate as a weighted arithmetic mean of domain becomings, and write the synthesis back here.</div>
          <div class="bec-empty-formula"><span class="be">Be</span> \u00d7 <span class="do">Do</span> = <span class="bec">Become</span></div>
        </div>
      </div>
    </div>`;
  }

  // Path B \u2014 stored v2 snapshot. Read denormalized columns first, JSONB second.
  const domains = [
    becDomainFromRow(stored, 'sleep',      'Sleep'),
    becDomainFromRow(stored, 'body',       'Body'),
    becDomainFromRow(stored, 'food',       'Food'),
    becDomainFromRow(stored, 'money',      'Money'),
    becDomainFromRow(stored, 'tasks',      'Tasks'),
    becDomainFromRow(stored, 'reflection', 'Reflection'),
  ];

  // Prefer stored aggregate columns; fall back to weighted arithmetic mean across cards.
  let beAgg  = stored.agg_be  != null ? Number(stored.agg_be)  : null;
  let doAgg  = stored.agg_do  != null ? Number(stored.agg_do)  : null;
  let becAgg = stored.agg_become != null ? Number(stored.agg_become) : null;
  if (beAgg == null || doAgg == null || becAgg == null) {
    // Reflection weight 2/7, others 1/7. Order must match `domains` above.
    const weights = [1/7, 1/7, 1/7, 1/7, 1/7, 2/7];
    beAgg  = becR(becWeightedMean(domains.map(x => x.be),     weights));
    doAgg  = becR(becWeightedMean(domains.map(x => x.doS),    weights));
    becAgg = becR(becWeightedMean(domains.map(x => x.become), weights));
  }

  const diag = becDiagnosisText(stored.diagnosis, beAgg, doAgg);
  const characterization = stored.reflection_characterization
    ? escapeHtml(stored.reflection_characterization) : '';
  const insight = stored.insight ? escapeHtml(stored.insight) : '';
  const resonance = stored.resonance != null ? Number(stored.resonance) : null;
  const synthDate = stored.synthesized_at ? new Date(stored.synthesized_at)
                   : stored.updated_at ? new Date(stored.updated_at) : null;
  const synthLabel = synthDate
    ? synthDate.toLocaleString('en-US',{hour:'numeric',minute:'2-digit'})
    : '';
  const schemaLabel = stored.schema_version ? ` \u00b7 v${stored.schema_version}` : '';

  return `<div class="bec-wrap">
    <div class="bec-hero">
      <div class="bec-hero-date">${dateLabel} \u00b7 Snapshot${synthLabel ? ` \u00b7 synthesized ${synthLabel}` : ''}${schemaLabel}</div>
      ${characterization ? `<div class="bec-characterization">${characterization}</div>` : ''}
      <div class="bec-equation">
        <div class="bec-eq-part bec-eq-be">
          <div class="bec-eq-label">Be</div>
          <div class="bec-eq-value">${beAgg.toFixed(1)}</div>
        </div>
        <div class="bec-eq-op">\u00d7</div>
        <div class="bec-eq-part bec-eq-do">
          <div class="bec-eq-label">Do</div>
          <div class="bec-eq-value">${doAgg.toFixed(1)}</div>
        </div>
        <div class="bec-eq-op">=</div>
        <div class="bec-eq-part bec-eq-become">
          <div class="bec-eq-label">Become</div>
          <div class="bec-eq-value">${becR0(becAgg)}</div>
        </div>
      </div>
      <div class="bec-diagnosis ${diag.class}">${diag.text}</div>
      ${insight ? `<div class="bec-insight">${insight}</div>` : ''}
      ${resonance != null ? `<div class="bec-resonance">Resonance <strong>${resonance.toFixed(1)}/10</strong> \u2014 how closely your words matched the numbers.</div>` : ''}
      ${becScalingCalloutHTML(beAgg, doAgg)}
      ${becDeltaPanelHTML(stored)}
      ${becFlagsLineHTML(stored.data_flags)}
    </div>
    <div class="bec-grid">
      ${domains.map(becCardHTML).join('')}
    </div>
  </div>`;
}

// ─── Word counter for the sacred compose ───
function rfUpdateCount() {
  const ta = document.getElementById('rf-compose-ta');
  const el = document.getElementById('rf-compose-count');
  if (!ta || !el) return;
  const words = ta.value.trim() ? ta.value.trim().split(/\s+/).filter(Boolean).length : 0;

// ─── Save a new reflection (today or retroactive) ───
async function rfSaveEntry() {
  const ta = document.getElementById('rf-compose-ta');
  if (!ta) return;
  const content = ta.value.trim();
  if (!content) return;
  const btn = document.getElementById('rf-save-btn');
  if (btn) { btn.textContent = 'Saving…'; btn.disabled = true; }

  const body = { content };
  const anchor = ta.closest('.rf-compose-hero')?.dataset?.anchor;
  // If retroactive (anchor ≠ today), tag the reflection with that date
  if (anchor && anchor !== becTodayNarrativePT()) body.date = anchor;

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/reflections`, {
      method: 'POST',
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`,
        'Content-Type':'application/json', Prefer:'return=representation' },
      body: JSON.stringify(body)
    });
    const entries = await res.json();
    if (entries?.[0]) reflectionsData.unshift(entries[0]);
    rfComposeOpen = false;
    renderReflections();
  } catch(e) {
    if (btn) { btn.textContent = 'Save reflection'; btn.disabled = false; }
    alert('Failed to save: ' + e.message);
  }
}

// ─── Inline edit within an entry card ───
function rfEditEntry(id) {
  const entry = reflectionsData.find(e => e.id === id);
  if (!entry) return;
  const card = document.querySelector(`.rf-entry-card[data-id="${id}"]`);
  if (!card) return;
  const bodyEl = card.querySelector('.rf-entry-body');
  const actionsEl = card.querySelector('.rf-entry-actions');
  const shell = document.createElement('div');
  shell.className = 'rf-edit-shell';
  shell.innerHTML = `
    <textarea id="rf-edit-${id}">${escapeHtml(entry.content)}</textarea>
    <div class="rf-edit-footer">
      <button class="rf-ghost-btn" onclick="renderReflections()">Cancel</button>
      <button class="rf-save-btn" onclick="rfSaveEdit('${id}')">Save</button>
    </div>`;
  bodyEl.replaceWith(shell);
  if (actionsEl) actionsEl.remove();
  document.getElementById('rf-edit-' + id)?.focus();
}

async function rfSaveEdit(id) {
  const ta = document.getElementById('rf-edit-' + id);
  if (!ta) return;
  const content = ta.value.trim();
  if (!content) return;
  await fetch(`${SUPABASE_URL}/rest/v1/reflections?id=eq.${id}`, {
    method: 'PATCH',
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`,
      'Content-Type':'application/json' },
    body: JSON.stringify({ content })
  });
  const entry = reflectionsData.find(e => e.id === id);
  if (entry) entry.content = content;
  renderReflections();
}

async function rfDeleteEntry(id) {
  if (!confirm('Delete this reflection?')) return;
  await fetch(`${SUPABASE_URL}/rest/v1/reflections?id=eq.${id}`, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
  });
  reflectionsData = reflectionsData.filter(e => e.id !== id);
  renderReflections();
}

let legalRefreshing = false;
let legalActivePerson = 'self'; // 'self' | 'dependent'

async function renderLegal() {
  const root = document.getElementById('legal-root');
  if (!root) return;
  if (!legalLoaded) {
    root.innerHTML = `<div style="text-align:center;padding:60px;color:var(--text-3)">Loading cases…</div>`;
    await loadLegalCases();
  }
  root.innerHTML = buildLegalDashboard();
}

async function loadLegalCases() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/legal_cases?order=priority.desc,created_at.asc`, {
    headers: { Authorization: `Bearer ${SUPABASE_ANON}`, apikey: SUPABASE_ANON }
  });
  legalCases = await res.json();
  legalLoaded = true;
}

function switchLegalPerson(person) {
  legalActivePerson = person;
  const root = document.getElementById('legal-root');
  if (root) root.innerHTML = buildLegalDashboard();
}

async function refreshUscisStatuses() {
  if (legalRefreshing) return;
  legalRefreshing = true;
  const btn = document.getElementById('legal-refresh-btn');
  if (btn) { btn.textContent = '⟳ Checking…'; btn.disabled = true; }

  const uscisReceipts = legalCases
    .filter(c => (c.person || 'self') === legalActivePerson && c.category === 'uscis' && c.receipt_number)
    .map(c => c.receipt_number);

  if (!uscisReceipts.length) { legalRefreshing = false; return; }

  try {
    const res = await fetch(FN('uscis-case-status'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${SUPABASE_ANON}` },
      body: JSON.stringify({ receipt_numbers: uscisReceipts })
    });
    const { results, checked_at } = await res.json();
    if (!results) throw new Error('No results from USCIS API');

    // Update each case in DB with fresh status
    await Promise.all(results.map(async r => {
      if (r.error) return;
      const lc = legalCases.find(c => c.receipt_number === r.receipt_number);
      if (!lc) return;
      await fetch(`${SUPABASE_URL}/rest/v1/legal_cases?id=eq.${lc.id}`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${SUPABASE_ANON}`, apikey: SUPABASE_ANON, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
        body: JSON.stringify({ status: r.status, status_detail: r.description, status_last_checked: checked_at })
      });
      lc.status = r.status;
      lc.status_detail = r.description;
      lc.status_last_checked = checked_at;
    }));
  } catch(e) {
    console.error('USCIS refresh error:', e);
  }

  legalRefreshing = false;
  const root = document.getElementById('legal-root');
  if (root) root.innerHTML = buildLegalDashboard();
}

function legalCategoryLabel(cat) {
  return { uscis: 'USCIS', court: 'Court', permit: 'Permit', document: 'Document', other: 'Other' }[cat] || cat;
}

function legalStatusBadge(status) {
  const s = (status || '').toLowerCase();
  const accent = s.includes('approved') || s.includes('granted') || s.includes('prima facie')
              || s.includes('interview') || s.includes('in progress');
  return { accent };
}

function buildMilestoneBar(milestones) {
  if (!milestones || !milestones.length) return '';
  const done = milestones.filter(m => m.done).length;
  const pct = Math.round((done / milestones.length) * 100);
  const dots = [];
  milestones.forEach((m, i) => {
    const cls = m.done ? 'lg-ms done' : (i === done ? 'lg-ms current' : 'lg-ms');
    dots.push(`<div class="${cls}" title="${m.event}${m.date ? ' (' + m.date + ')' : ''}">
      <div class="lg-ms-dot"></div>
      <div class="lg-ms-lbl">${m.event}</div>
    </div>`);
    if (i < milestones.length - 1) {
      const lineCls = i < done - 1 ? 'lg-ms-line done' : 'lg-ms-line';
      dots.push(`<div class="${lineCls}"></div>`);
    }
  });
  return `
    <div class="lg-timeline">
      <div class="lg-timeline-hdr">
        <span class="lg-timeline-lbl">Timeline</span>
        <span class="lg-timeline-lbl" style="color:var(--text-3)">${done} / ${milestones.length} · ${pct}%</span>
      </div>
      <div class="lg-timeline-bar"><div class="lg-timeline-fill" style="width:${pct}%"></div></div>
      <div class="lg-timeline-dots">${dots.join('')}</div>
    </div>`;
}

function legalCopyReceipt(btn, receiptNumber) {
  navigator.clipboard.writeText(receiptNumber).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    btn.style.color = 'var(--green)';
    btn.style.borderColor = 'var(--green)';
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.color = 'var(--text-3)';
      btn.style.borderColor = 'var(--border-2)';
    }, 1800);
  });
}

      </div>

      ${lc.estimated_completion ? `<span class="lg-checked">Est. ${lc.estimated_completion}</span>` : ''}
    </div>` : ''}

function buildLegalDashboard() {
  if (!legalCases.length) return `<div class="lg-page"><div style="text-align:center;padding:60px;color:var(--text-3)">No legal cases found.</div></div>`;

  const isSelf = legalActivePerson === 'self';
  const personCases = legalCases.filter(c => (c.person || 'self') === legalActivePerson);
  const activeCases = personCases.filter(c => c.active);
  const closedCases = personCases.filter(c => !c.active);

  const uscis   = activeCases.filter(c => c.category === 'uscis');
  const courts  = activeCases.filter(c => c.category === 'court');
  const permits = activeCases.filter(c => c.category === 'permit');
  const docs    = activeCases.filter(c => c.category === 'document');
  const other   = activeCases.filter(c => c.category === 'other');

  const totalCases = personCases.length;
  const activeCount = activeCases.length;
  const uscisLastChecked = personCases.filter(c=>c.status_last_checked).sort((a,b)=>new Date(b.status_last_checked)-new Date(a.status_last_checked))[0];
  const lastCheckedStr = uscisLastChecked
    ? `USCIS checked ${new Date(uscisLastChecked.status_last_checked).toLocaleDateString('en-US',{month:'short',day:'numeric'})}`
    : 'USCIS not yet refreshed';

  const section = (title, cases) => cases.length === 0 ? '' : `
    <div class="lg-section-label"><span>${title}</span><span class="count">${cases.length}</span></div>
    ${cases.map(buildLegalCaseCard).join('')}`;

  const personTitle = isSelf ? 'Self' : 'Dependent';

// ── Signature hero: greeting + one headline metric ──
function pjRenderHero(projects) {
  const el = document.getElementById('pj-hero');
  if (!el) return;

  // Compute average Become now
  const becomes = projects.map(p => {
    const tasks = p.tasks ?? [];
    const be = pjBeScore(tasks);
    const doS = pjDoScore(tasks);
    return pjBecomeScore(be, doS);
  });
  const avgBecome = becomes.length ? becomes.reduce((a,b)=>a+b,0) / becomes.length : 0;
  const onTrack = becomes.filter(b => b >= 25).length;
  const total = projects.length;

  // Week-over-week trend — avg Become from snapshots 7 days ago vs now
  const weekAgo = Date.now() - 7 * 864e5;
  const priorBecomes = projects.map(p => {
    const snaps = (p.project_snapshots || []).filter(s => new Date(s.created_at).getTime() <= weekAgo);
    if (!snaps.length) return null;
    snaps.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
    return snaps[0].become_score ?? null;
  }).filter(x => x !== null);
  const priorAvg = priorBecomes.length ? priorBecomes.reduce((a,b)=>a+b,0) / priorBecomes.length : null;
  const delta = priorAvg !== null ? (avgBecome - priorAvg) : null;

  const now = new Date();
  const hour = now.getHours();
  const greet = hour < 5 ? 'Still up'
              : hour < 12 ? 'Good morning'
              : hour < 17 ? 'Good afternoon'
              : hour < 21 ? 'Good evening'
              : 'Late night';
  const dateStr = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  // Headline phrasing
  const headline = onTrack === total
    ? `<span class="accent">All ${total} projects</span> on track.`
    : onTrack === 0
    ? `<span class="muted">Zero</span> of ${total} projects on track yet.`
    : `On track in <span class="accent">${onTrack}</span> <span class="muted">of ${total}</span>.`;

  const trendHtml = delta === null
    ? `<span class="trend-flat">Tracking your first week</span>`
    : delta >  0.5 ? `<span class="trend-up">↑ +${delta.toFixed(1)} this week</span>`
    : delta < -0.5 ? `<span class="trend-flat">↓ ${delta.toFixed(1)} this week</span>`
    : `<span class="trend-flat">→ Steady this week</span>`;

  el.innerHTML = `
    <div class="pj-hero-greeting"><strong>${greet}.</strong></div>
    <div class="pj-hero-date">${dateStr}</div>
    <div class="pj-hero-line">${headline}</div>
    <div class="pj-hero-sub">
      <span>Avg Become <strong style="color:var(--text);font-variant-numeric:tabular-nums;">${avgBecome.toFixed(1)}</strong></span>
      <span class="divider">·</span>
      ${trendHtml}
    </div>
  `;
}

// ── Shared deadline label: returns { label, cls } for any task row ──
// cls is one of: '', 'overdue', 'today', 'empty'
// IMPORTANT: due_date strings like "2026-05-06" must be parsed as LOCAL midnight,
// not UTC. `new Date("2026-05-06")` parses as UTC, which silently rolls back a day
// in any negative-UTC-offset timezone (e.g. PDT) any time it's after 5pm local.
function parseLocalDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function taskDueLabel(dueDate) {
  if (!dueDate) return { label: '—', cls: 'empty' };
  const today = new Date(); today.setHours(0,0,0,0);
  const d = parseLocalDate(dueDate);
  const days = Math.round((d - today) / 864e5);
  if (days < 0)  return { label: `${-days}d late`, cls: 'overdue' };
  if (days === 0) return { label: 'today', cls: 'today' };
  if (days === 1) return { label: 'tomorrow', cls: '' };
  if (days <= 7)  return { label: `${days}d`, cls: '' };
  return { label: d.toLocaleDateString('en-US',{month:'short',day:'numeric'}), cls: '' };
}

// ── Today's Focus: top 3 tasks across all projects by impact × urgency ──
function pjRenderToday(projects) {
  const el = document.getElementById('pj-today');
  if (!el) return;

  const today = new Date();
  today.setHours(0,0,0,0);
  const allTasks = [];
  projects.forEach(p => {
    (p.tasks || []).forEach(t => {
      if (t.status === 'done' || t.status === 'cancelled') return;
      // Score = impact(1-5) + urgency bonus for overdue/soon + in_progress bonus
      let score = t.impact || 3;
      if (t.due_date) {
        const d = parseLocalDate(t.due_date);
        const days = Math.floor((d - today) / 864e5);
        if (days < 0) score += 4;            // overdue
        else if (days === 0) score += 3;     // due today
        else if (days <= 3) score += 2;      // due soon
        else if (days <= 7) score += 1;      // this week
      }
      if (t.status === 'in_progress') score += 1;
      allTasks.push({ task: t, project: p, score });
    });
  });
  allTasks.sort((a,b) => b.score - a.score);
  const top = allTasks.slice(0, 3);

  if (!top.length) {
    el.innerHTML = `
      <div class="pj-section-label"><span>Today's Focus</span></div>
      <div class="pj-today-list"><div class="pj-today-empty">Nothing queued. Add a task to any project.</div></div>
    `;
    return;
  }

  const rowsHtml = top.map(({ task, project }) => {
    const due = taskDueLabel(task.due_date);
    return `
    <div class="pj-today-task" onclick="navigateToProject('${project.id}',null)">
      <div class="pj-today-check"></div>
      <div class="pj-today-name">${escapeHtml(task.name)}</div>
      <div class="pj-today-proj">${escapeHtml(project.name)}</div>
      <div class="pj-today-due ${due.cls}">${due.label}</div>
      <div class="pj-today-impact">${task.impact || 3}/5</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="pj-section-label"><span>Today's Focus</span><span class="count">${allTasks.length} open</span></div>
    <div class="pj-today-list">${rowsHtml}</div>
  `;
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function pjBeScore(tasks) {
  if (!tasks?.length) return 0;
  const active = tasks.filter(t => t.status !== 'cancelled');
  if (!active.length) return 0;
  return Math.round((active.reduce((sum, t) => sum + (t.impact || 3), 0) / active.length / 5 * 10) * 10) / 10;
}

function pjDoScore(tasks) {
  if (!tasks?.length) return 0;
  const active = tasks.filter(t => t.status !== 'cancelled');
  if (!active.length) return 0;
  const totalWeight  = active.reduce((sum, t) => sum + (t.impact || 3), 0);
  const earnedWeight = active.reduce((sum, t) => {
    const w = t.impact || 3;
    if (t.status === 'done')        return sum + w * 1.0;
    if (t.status === 'in_progress') return sum + w * 0.5;
    return sum;
  }, 0);
  return Math.round((earnedWeight / totalWeight) * 100) / 10;
}

function pjBecomeScore(be, doS) {
  return Math.round(be * doS * 10) / 10;
}

// Analyse snapshot history → trend signals
// Returns { beTrend, doTrend, becTrend, accel, beFixed, doFixed }
function pjTrend(snapshots) {
  if (!snapshots || snapshots.length < 2) return null;
  const s  = [...snapshots].sort((a,b) => new Date(a.created_at)-new Date(b.created_at));
  const n  = s.length;
  // deltas between consecutive snapshots
  const beD  = s.slice(1).map((x,i) => x.be_score  - s[i].be_score);
  const doD  = s.slice(1).map((x,i) => x.do_score  - s[i].do_score);
  const becD = s.slice(1).map((x,i) => x.become_score - s[i].become_score);

  const avg  = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
  const beTrend  = avg(beD);
  const doTrend  = avg(doD);
  const becTrend = avg(becD);

  // Acceleration: is Become speeding up? (variation 35 — second derivative)
  const accel = becD.length >= 2
    ? becD[becD.length-1] - becD[becD.length-2]
    : null;

  // Variation 14: Be fixed while Do grows (linear grind ceiling)
  const beFixed = Math.abs(beTrend) < 0.3 && doTrend > 0.5;
  // Variation 15: Do fixed while Be grows (action plateau ceiling)
  const doFixed = Math.abs(doTrend) < 0.3 && beTrend > 0.5;

  return { beTrend, doTrend, becTrend, accel, beFixed, doFixed };
}

// Arrow indicator for a trend value
function pjArrow(trend) {
  if (trend === null || trend === undefined) return '';
  if (trend >  1.5) return '<span style="color:#6ee7b7;font-size:11px">↑↑</span>';
  if (trend >  0.3) return '<span style="color:#6ee7b7;font-size:11px">↑</span>';
  if (trend < -1.5) return '<span style="color:#fca5a5;font-size:11px">↓↓</span>';
  if (trend < -0.3) return '<span style="color:#fdba74;font-size:11px">↓</span>';
  return '<span style="color:#71717a;font-size:11px">→</span>';
}

function pjStatus(be, doS, trend) {
  const become = be * doS;
  const gap    = be - doS;

  // ── Zero cases (variations 4 & 5) ──────────────────────────────────────
  if (be === 0)  return { label: 'Identity Void',         icon: '⛔', color: '#fca5a5' };
  if (doS === 0) return { label: 'Not Started',           icon: '💤', color: '#71717a' };

  // ── Variation 7: Become approaching 0 (near-zero stall) ────────────────
  if (become < 4 && be < 2 && doS < 2)
                 return { label: 'Fading Out',            icon: '🌑', color: '#fca5a5' };

  // ── Trend-based: acceleration / ceiling warnings ────────────────────────
  if (trend) {
    // Variation 35: positive second derivative — transformation accelerating
    if (trend.accel !== null && trend.accel > 1 && become >= 20)
                 return { label: 'Accelerating',          icon: '🚀', color: '#6ee7b7' };
    // Variation 35: negative second derivative — decelerating even if positive
    if (trend.accel !== null && trend.accel < -1 && become >= 10)
                 return { label: 'Decelerating',          icon: '📉', color: '#fdba74' };
    // Variation 14: Be locked, Do growing — linear grind ceiling
    if (trend.beFixed)
                 return { label: 'Be Ceiling — Grow Identity', icon: '🔒', color: '#fde68a' };
    // Variation 15: Do locked, Be growing — action plateau
    if (trend.doFixed)
                 return { label: 'Do Plateau — Take Action',   icon: '📊', color: '#fde68a' };
    // Variations 16-18: both growing — compounding momentum
    if (trend.beTrend > 0.3 && trend.doTrend > 0.3 && become >= 15)
                 return { label: 'Compounding',           icon: '⚡', color: '#6ee7b7' };
  }

  // ── Variation 11: Be = Do = Become (perfect integration — mastery) ──────
  if (Math.abs(be - doS) < 0.5 && Math.abs(be - become/10) < 1 && be >= 7)
                 return { label: 'Mastery State',         icon: '🌟', color: '#6ee7b7' };

  // ── Variation 24: High Be, High Do → Maximum Become ────────────────────
  if (be >= 7 && doS >= 7)
                 return { label: 'Crushing It',           icon: '🔥', color: '#6ee7b7' };

  // ── Variation 8: Be = Do → Be² = Become (authentic alignment) ──────────
  if (Math.abs(gap) <= 1.5 && be >= 5)
                 return { label: 'Aligned',               icon: '⚡', color: '#6ee7b7' };

  // ── Variation 9: Be ≈ Become → Do ≈ 1 (arrived, in maintenance) ────────
  if (doS >= 9 && be >= 8)
                 return { label: 'Arrived — Sustain',     icon: '🏁', color: '#93c5fd' };

  // ── Variation 22: High Be, Low Do — visionary not shipping ─────────────
  if (gap > 2.5) return { label: 'Visionary — Ship More', icon: '👁️', color: '#fde68a' };

  // ── Variation 23: Low Be, High Do — grinder with no direction ──────────
  if (gap < -2.5)return { label: 'Grinding — Go Deeper',  icon: '⚠️', color: '#fdba74' };

  // ── Variation 36: Be below baseline → doing widens wrong gap ───────────
  if (be < 3)    return { label: 'Losing Identity',        icon: '🚨', color: '#fca5a5' };

  // ── Healthy forward progress ────────────────────────────────────────────
  if (be >= 5 && doS >= 4)
                 return { label: 'On Track',              icon: '✅', color: '#93c5fd' };

  // ── Execution stall ─────────────────────────────────────────────────────
  if (doS < 3)   return { label: 'Stalling',              icon: '⏸️', color: '#fdba74' };

                 return { label: 'Building',              icon: '🔨', color: '#e8b86d' };
}

function pjCardHtml(p) {
  const tasks  = p.tasks ?? [];
  const active = tasks.filter(t => t.status !== 'cancelled');
  const done   = active.filter(t => t.status === 'done').length;
  const total  = active.length;
  const pct    = total ? Math.round((done / total) * 100) : 0;

  const be    = pjBeScore(tasks);
  const doS   = pjDoScore(tasks);
  const become = pjBecomeScore(be, doS);

  // Trend from snapshots
  const trend = pjTrend(p.project_snapshots);
  let trendHtml = '<span class="pj-card-trend flat">→</span>';
  if (trend) {
    if (trend.becTrend > 0.5) trendHtml = '<span class="pj-card-trend">↑</span>';
    else if (trend.becTrend < -0.5) trendHtml = '<span class="pj-card-trend flat">↓</span>';
  }

  const becomingLine = p.becoming_statement
    ? `<div class="pj-card-becoming">${escapeHtml(p.becoming_statement)}</div>`
    : `<div class="pj-card-becoming" style="color:var(--text-4)">No becoming statement yet</div>`;

  const remaining = total - done;
  const hint = remaining === 0
    ? `Complete`
    : `${done}/${total} tasks · ${remaining} remaining`;

  return `<div class="pj-card" onclick="navigateToProject('${p.id}',null)">
    <div class="pj-card-name">${escapeHtml(p.name)}</div>
    ${becomingLine}
    <div class="pj-card-foot">

        <span class="pj-card-become-lbl">Become</span>

    <div class="pj-card-bar"><div class="pj-card-bar-fill" style="width:${pct}%"></div></div>
    <div class="pj-card-tasks-hint">${hint}</div>
  </div>`;
}

function pjSortByImportance(projects) {
  const pins = ['socialloop','finances','taxes'];
  const pinned = new Array(pins.length).fill(null);
  const rest = [];
  for (const p of projects) {
    const key = (p.name||'').toLowerCase();
    const idx = pins.findIndex(pin => key.includes(pin));
    if (idx !== -1 && !pinned[idx]) pinned[idx] = p;
    else rest.push(p);
  }
  rest.sort((a,b) => (b.be_score??0)-(a.be_score??0));
  return [...pinned.filter(Boolean), ...rest];
}

function pjRenderGrid(projects) {
  const grid = document.getElementById('pj-grid');
  if (!projects.length) {
    grid.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-3);grid-column:1/-1">No projects found.</div>';
    return;
  }
  grid.innerHTML = pjSortByImportance(projects).map(p => pjCardHtml(p)).join('');
}
