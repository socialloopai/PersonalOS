function pdTaskFilter(status, projectId, btn) {
  document.querySelectorAll('.pd-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const project = pjAllProjects.find(p => p.id === projectId);
  if (!project) return;
  renderProjectDetail(project);
  // Re-activate the right tab after re-render
  const tabs = document.querySelectorAll('.pd-tab');
  const statusMap = {'all':0,'todo':1,'in_progress':2,'done':3};
  if (tabs[statusMap[status]]) {
    document.querySelectorAll('.pd-tab').forEach(t => t.classList.remove('active'));
    tabs[statusMap[status]].classList.add('active');
    document.getElementById('pd-task-list').innerHTML = pdBuildTaskList(project.tasks ?? [], status, projectId);
  }
}

function pdBuildTaskList(tasks, filterStatus, projectId) {
  const impactLabels = ['','Maintenance','Support','Progress','Leverage','Foundation'];
  const impactClass  = (imp) => imp === 5 ? 'pd-impact peak' : imp === 4 ? 'pd-impact high' : 'pd-impact';
  const filtered = (filterStatus === 'all' ? tasks : tasks.filter(t => t.status === filterStatus)).slice().sort((a, b) => {
    const aDone = a.status === 'done', bDone = b.status === 'done';
    if (aDone !== bDone) return aDone ? 1 : -1;
    const aDue = a.due_date ? parseLocalDate(a.due_date).getTime() : Infinity;
    const bDue = b.due_date ? parseLocalDate(b.due_date).getTime() : Infinity;
    return aDue - bDue;
  });
  if (!filtered.length) return `<div class="pd-empty">No tasks here yet.</div>`;
  return filtered.map(t => {
    const isDone = t.status === 'done', isIP = t.status === 'in_progress';
    const imp = t.impact || 3;
    let checkbox;
    if (isDone) checkbox = `<div onclick="pdToggleTask('${t.id}','${projectId}')" style="width:24px;height:24px;border-radius:50%;background:var(--accent);border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s">
      <svg width="12" height="9" viewBox="0 0 13 10"><polyline points="1.5,5 5,8.5 11.5,1.5" fill="none" stroke="var(--bg)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>`;
    else if (isIP) checkbox = `<div onclick="pdToggleTask('${t.id}','${projectId}')" style="width:24px;height:24px;border-radius:50%;background:transparent;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s">
      <div style="width:9px;height:9px;border-radius:50%;background:var(--accent)"></div>
    </div>`;
    else checkbox = `<div onclick="pdToggleTask('${t.id}','${projectId}')" style="width:24px;height:24px;border-radius:50%;background:transparent;border:1.5px solid var(--border-3);cursor:pointer;flex-shrink:0;transition:all .15s"></div>`;
    const due = taskDueLabel(t.due_date);
    return `<div class="pd-task-row" id="pd-task-${t.id}">
      ${checkbox}
      <span class="pd-task-name${isDone?' done':''}" style="${isIP?'color:var(--accent)':''}">${escapeHtml(t.name)}</span>
      <div class="pd-task-meta">
        <span class="pd-due ${due.cls}">${due.label}</span>
        <span class="${impactClass(imp)}">${impactLabels[imp]}</span>
      </div>
    </div>`;
  }).join('');
}

async function pdToggleTask(taskId, projectId) {
  const project = pjAllProjects.find(p => p.id === projectId);
  if (!project) return;
  const task = (project.tasks ?? []).find(t => t.id === taskId);
  if (!task) return;
  const prev = task.status;
  const next = prev === 'done' ? 'todo' : prev === 'in_progress' ? 'done' : 'in_progress';

  // Capture scores BEFORE change
  const beBefore  = pjBeScore(project.tasks);
  const doBefore  = pjDoScore(project.tasks);
  const becBefore = pjBecomeScore(beBefore, doBefore);

  // Optimistic UI — render immediately, don't wait for DB round-trip
  task.status = next;
  renderProjectDetail(project);

  // Write to Supabase (return=representation → returns updated rows on success, [] if blocked)
  const result = await sb('tasks', `id=eq.${taskId}`, 'PATCH', { status: next });

  // If write silently failed (null = HTTP error, [] = no rows updated), roll back
  if (!result || (Array.isArray(result) && result.length === 0)) {
    task.status = prev;
    renderProjectDetail(project);
    const errDiv = document.createElement('div');
    errDiv.style.cssText = 'position:fixed;bottom:28px;right:28px;z-index:9999;background:var(--red-dim);border:1px solid var(--red);border-radius:10px;padding:14px 18px;font-size:13px;color:var(--red);font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.4);font-family:var(--sans)';
    errDiv.textContent = '⚠️ Could not save — check connection and try again';
    document.body.appendChild(errDiv);
    setTimeout(() => errDiv.remove(), 4000);
    return;
  }

  // Capture scores AFTER confirmed write
  const beAfter  = pjBeScore(project.tasks);
  const doAfter  = pjDoScore(project.tasks);
  const becAfter = pjBecomeScore(beAfter, doAfter);

  if (next === 'done') {
    // Save snapshot so trends work
    sb('project_snapshots', '', 'POST', {
      project_id: projectId,
      be_score: beAfter,
      do_score: doAfter,
      become_score: becAfter,
      reason: `Task completed: ${task.name}`
    }).catch(() => {});
    showScoreDelta(task, doAfter - doBefore, becAfter - becBefore, beAfter, doAfter, becAfter, project.tasks);
  } else if (next === 'todo') {
    const t = document.getElementById('score-toast');
    if (t) t.remove();
  }
}

function showScoreDelta(task, doDelta, becDelta, beNow, doNow, becNow, allTasks) {
  const existing = document.getElementById('score-toast');
  if (existing) existing.remove();

  const impactLabels = ['','Maintenance','Support','Progress','Leverage','Foundation'];
  const impactColors = ['','#71717a','#4da8ff','#9a7aff','#f5c842','#22d4a6'];
  const imp = task.impact || 3;

  // Find next highest-impact incomplete task
  const nextBest = [...allTasks]
    .filter(t => t.status !== 'done' && t.status !== 'cancelled' && t.id !== task.id)
    .sort((a,b) => (b.impact||3) - (a.impact||3))[0];
  const nextHint = nextBest
    ? `<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);font-size:11px;color:var(--text-3);line-height:1.5">
        Next highest impact: <span style="color:var(--text-2);font-weight:600">${nextBest.name}</span>
        <span style="margin-left:6px;background:${impactColors[nextBest.impact||3]}18;color:${impactColors[nextBest.impact||3]};padding:1px 7px;border-radius:100px;font-size:10px;font-weight:600">${impactLabels[nextBest.impact||3]}</span>
       </div>` : '';

  const sign = d => d >= 0 ? '+' : '';

function subsGetMeta(merchantKey) {
  const k = merchantKey.toLowerCase();
  for (const [pat, meta] of Object.entries(SUBS_META)) {
    if (k.includes(pat)) return meta;
  }
  return { emoji: '🔁', color: '#71717a', label: merchantKey };
}

function subsIsRecurring(txs, merchant) {
  // Exclude known non-subscription merchants (restaurants, coffee, gas, groceries, etc.)
  const k = merchant.toLowerCase();
  const NEVER_SUB = ['trader joe','whole foods','safeway','costco','foodsco','chipotle','panda express','taqueria','mcdonald',
    'uber trip','lyft','arco','chevron','shell','walgreens','target','walmart','best buy','starbucks',
    'tacolicious','raven bar','salt and straw','super duper','boudin','joe & the juice','joe the juice',
    'peet','verve coffee','haraz','noe cafe','dolores park','teawood','b. patisserie','andytown',
    'dandelion chocolate','diamond coffee','manny','truly mediterranean','la oaxaquena','gyro',
    'hinodeya','casanova','abv','harper','gino','palmetto','yummy pizza','daeho','persona','one65',
    'cinderella','dreway','u - dessert','cavalli','cafe reveille','garage cafe','mamahuhu','french tulip',
    'peoples barber','people\'s barber','haircut','o\'reilly','courthouse','j r automotive',
    'sf rec','mta meter','ace parking','laz parking',
    'interest charge','late fee','return payment','monthly fee','monthly maintenance','venmo',
    'apple services','apple cash','cash advance'];
  if (NEVER_SUB.some(n => k.includes(n))) return false;

  // Always include rent
  if (k.includes('rent') || k.includes('foundry')) return true;

  // Needs 2+ distinct calendar months AND consistent amount (cv < 0.3)
  const months = new Set(txs.map(t => t.date.slice(0,7)));
  if (months.size < 2) return false;
  const amounts = txs.map(t => parseFloat(t.amount));
  const avg = amounts.reduce((a,b)=>a+b,0)/amounts.length;
  const stddev = Math.sqrt(amounts.map(a=>(a-avg)**2).reduce((a,b)=>a+b,0)/amounts.length);
  const cv = avg > 0 ? stddev/avg : 1;
  return cv < 0.30;
}

const CANCELLED_SUBS = ['google','youtube','rocket money','rocket','shopify'];

function subsIsActive(txs, merchant) {
  const k = (merchant || '').toLowerCase();
  if (CANCELLED_SUBS.some(c => k.includes(c))) return false;
  const last = new Date(Math.max(...txs.map(t=>new Date(t.date))));
  const now = new Date();
  return (now - last) / (1000*60*60*24) <= 60;
}

function subsRenderAll() {
  const root = document.getElementById('subs-root');

  // Group by merchant (normalize rent variants into one)
  const groups = {};
  for (const tx of subsAllTx) {
    let key = (tx.merchant_name || tx.name || '').trim();
    if (!key) continue;
    const kl = key.toLowerCase();
    if (kl.includes('zelle') && kl.includes('fo') || kl.includes('foundry') || kl === 'rent') key = 'Rent (Zelle)';
    if (!groups[key]) groups[key] = [];
    groups[key].push(tx);
  }

  // Detect recurring
  const recurring = [];
  for (const [merchant, txs] of Object.entries(groups)) {
    if (!subsIsRecurring(txs, merchant)) continue;
    const avg = txs.reduce((s,t)=>s+parseFloat(t.amount),0)/txs.length;
    const active = subsIsActive(txs, merchant);
    const months = [...new Set(txs.map(t=>t.date.slice(0,7)))].sort();
    const last = txs.slice().sort((a,b)=>b.date.localeCompare(a.date))[0];
    recurring.push({ merchant, txs, avg, active, months, last, category: txs[0].ai_category });
  }

  // Manual recurring entries
  recurring.push({ merchant: 'Groceries', txs: [], avg: 400, active: true, months: [], last: null, category: 'Groceries', manual: true });

  // Sort: active first, then by avg amount desc
  recurring.sort((a,b) => {
    if (a.active !== b.active) return a.active ? -1 : 1;
    return b.avg - a.avg;
  });

  const activeList = recurring.filter(r=>r.active);
  const inactiveList = recurring.filter(r=>!r.active);

  const monthlyActive = activeList.reduce((s,r)=>s+r.avg,0);
  const annualActive = monthlyActive * 12;
  const totalAll = recurring.reduce((s,r)=>s+r.avg,0);

  function fmt(n){ return '$'+n.toFixed(2); }
  function fmtK(n){ return n>=1000?'$'+(n/1000).toFixed(1)+'k':'$'+Math.round(n); }

  function cardHtml(r, i) {
    const meta = subsGetMeta(r.merchant);
    const isOpen = subsOpenId === (r.merchant + i);
    const monthLabels = r.months.map(m=>{
      const [yr,mo]=m.split('-');
      return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1];
    }).join(' · ');

    const txRows = r.txs.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(tx=>`
      <div class="subs-tx-row">
        <span class="subs-tx-date">${tx.date}</span>

        <span class="subs-tx-amt">${fmt(parseFloat(tx.amount))}</span>
      </div>`).join('');

    const diffPct = r.txs.length > 1 ? (() => {
      const sorted = r.txs.slice().sort((a,b)=>a.date.localeCompare(b.date));
      const first = parseFloat(sorted[0].amount);
      const last2 = parseFloat(sorted[sorted.length-1].amount);
      const d = ((last2-first)/first*100);
      if(Math.abs(d)<1) return '';
      return `<span style="font-size:10px;color:${d>0?'var(--red)':'var(--green)'}">${d>0?'↑':'↓'}${Math.abs(d).toFixed(0)}% vs first</span>`;
    })() : '';

    return `<div>
      <div class="subs-card${r.active?'':' subs-inactive'}" onclick="subsToggle('${r.merchant + i}')">
        <div class="subs-card-icon" style="background:${meta.color}22">${meta.emoji}</div>
        <div class="subs-card-body">
          <div class="subs-card-name">${meta.label || r.merchant}</div>
          <div class="subs-card-meta">${monthLabels} · ${r.txs.length} charges</div>
        </div>
        <div class="subs-card-right">
          <div class="subs-card-amt">${fmt(r.avg)}</div>
          <div class="subs-card-freq">/mo avg</div>
          ${diffPct}
          <span class="subs-badge ${r.active?'subs-badge-active':'subs-badge-inactive'}">${r.active?'Active':'Inactive'}</span>
        </div>
      </div>
      <div class="subs-expand${isOpen?' open':''}" id="subs-exp-${CSS.escape(r.merchant+i)}">
        <div style="background:var(--surface-2);border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px;padding:12px 16px">
          <div style="font-size:11px;color:var(--text-3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">Transaction History</div>
          ${txRows}
          <div style="display:flex;justify-content:space-between;padding-top:10px;font-size:12px;font-weight:700;color:var(--text-3)">
            <span>Total charged</span>
            <span style="color:var(--text)">${fmt(r.txs.reduce((s,t)=>s+parseFloat(t.amount),0))}</span>
          </div>
        </div>
      </div>
    </div>`;
  }

  root.innerHTML = `
    <!-- Hero -->
    <div class="subs-hero">
      <div class="subs-hero-main">
        <div class="subs-hero-lbl">Monthly Recurring (Active)</div>
        <div class="subs-hero-val">${fmtK(monthlyActive)}</div>
        <div style="font-size:12px;color:var(--text-3);margin-top:4px">${fmtK(annualActive)}/yr estimated</div>
      </div>
      <div class="subs-hero-stat">
        <div class="subs-hero-stat-val" style="color:var(--green)">${activeList.length}</div>
        <div class="subs-hero-stat-lbl">Active</div>
      </div>
      <div class="subs-hero-stat">
        <div class="subs-hero-stat-val" style="color:var(--text-3)">${inactiveList.length}</div>
        <div class="subs-hero-stat-lbl">Inactive</div>

      <div class="subs-hero-stat">

    ${activeList.length ? `

    ${inactiveList.length ? `

    <div class="subs-grid" id="subs-inactive-grid">${inactiveList.map((r,i)=>cardHtml(r,activeList.length+i)).join('')}</div>` : ''}

      🔍 Recurring = same merchant, 2+ months, amount variance &lt;30% · Active = charged within last 60 days
    </div>
  `;
}

async function renderTaskBoard() {
  const container = document.getElementById('pj-board-inner');
  if (!container) return;

  if (!pjLoaded || pjAllProjects.length === 0) {
    container.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:80px;color:var(--text-3);font-size:13px">
      <div style="width:18px;height:18px;border:2px solid var(--border-2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite"></div>
      Loading tasks…
    </div>`;
    await renderProjects();
    if (!pjAllProjects.length) {
      container.innerHTML = `<div class="tk-page" style="padding-top:60px"><div class="tk-hero-line">No projects yet.</div><div class="tk-hero-sub">Add one to start tracking tasks.</div></div>`;
      return;
    }
  }

  const activeProjects = pjAllProjects.filter(p => p.status !== 'archived' && p.status !== 'cancelled');
  const today = new Date(); today.setHours(0,0,0,0);
  const weekEnd = new Date(today.getTime() + 7 * 864e5);
  const twoWeeksAgo = new Date(today.getTime() - 14 * 864e5);

  // Collect all tasks with project reference
  const all = [];
  for (const p of activeProjects) {
    for (const t of (p.tasks || [])) {
      if (t.status === 'cancelled') continue;
      all.push({ ...t, _proj: p });
    }
  }

  // Bucket tasks
  const overdue = [];
  const todayTasks = [];
  const thisWeek = [];
  const later = [];
  const doneRecent = [];

  for (const t of all) {
    if (t.status === 'done') {
      const updated = t.updated_at ? new Date(t.updated_at) : null;
      if (updated && updated >= twoWeeksAgo) doneRecent.push(t);
      continue;
    }
    if (!t.due_date) { later.push(t); continue; }
    const due = parseLocalDate(t.due_date);
    if (due < today) overdue.push(t);
    else if (due.getTime() === today.getTime()) todayTasks.push(t);
    else if (due <= weekEnd) thisWeek.push(t);
    else later.push(t);
  }

  // Sort each bucket: in_progress first, then impact desc, then due date
  const sortBucket = (arr) => arr.sort((a,b) => {
    if (a.status === 'in_progress' && b.status !== 'in_progress') return -1;
    if (b.status === 'in_progress' && a.status !== 'in_progress') return 1;
    const ai = a.impact || 3, bi = b.impact || 3;
    if (ai !== bi) return bi - ai;
    const ad = a.due_date ? parseLocalDate(a.due_date).getTime() : Infinity;
    const bd = b.due_date ? parseLocalDate(b.due_date).getTime() : Infinity;
    return ad - bd;
  });
  sortBucket(overdue); sortBucket(todayTasks); sortBucket(thisWeek); sortBucket(later);
  doneRecent.sort((a,b) => new Date(b.updated_at||0) - new Date(a.updated_at||0));

  // Week completion count — tasks with updated_at this calendar week
  const weekStart = new Date(today.getTime() - today.getDay() * 864e5); weekStart.setHours(0,0,0,0);
  const doneThisWeek = all.filter(t => t.status === 'done' && t.updated_at && new Date(t.updated_at) >= weekStart).length;
  const totalOpen = overdue.length + todayTasks.length + thisWeek.length + later.length;
  const inProgressCount = all.filter(t => t.status === 'in_progress').length;

  // ── Row HTML ──
  const rowHtml = (t) => {
    const isIP = t.status === 'in_progress';
    const isDone = t.status === 'done';
    const impact = t.impact || 3;
    const impClass = impact >= 4 ? 'high' : '';
    const due = taskDueLabel(t.due_date);
    const dueLabel = due.cls === 'empty' ? '' : due.label;
    const dueClass = due.cls === 'empty' ? '' : due.cls;
    const cls = ['tk-row'];
    if (isIP) cls.push('in-progress');
    if (isDone) cls.push('done');
    return `<div class="${cls.join(' ')}" onclick="tbGoToTask('${t._proj.id}')">
      <div class="tk-check"></div>
      <div class="tk-name">${escapeHtml(t.name)}</div>
      <div class="tk-proj">${escapeHtml(t._proj.name)}</div>
      <div class="tk-meta">
        <div class="tk-impact ${impClass}">${impact}/5</div>
        <div class="tk-due ${dueClass}">${dueLabel}</div>
      </div>
    </div>`;
  };

  const sectionHtml = (label, tasks, opts = {}) => {
    const { overdue, collapsible, id, defaultCollapsed } = opts;
    if (!tasks.length && !collapsible) return '';
    const cls = ['tk-section'];
    if (collapsible) cls.push('collapsible');
    const click = collapsible ? `onclick="tbToggleSection('${id}')"` : '';
    const labelCls = overdue ? 'tk-section-label overdue' : 'tk-section-label';
    const bodyCls = `tk-section-body${defaultCollapsed ? ' collapsed' : ''}`;
    const arrow = collapsible ? `<span style="margin-left:8px;font-size:9px;opacity:0.6">${defaultCollapsed ? '▸' : '▾'}</span>` : '';
    return `<div class="${cls.join(' ')}">
      <div class="${labelCls}" ${click}><span>${label}${arrow}</span><span class="count">${tasks.length}</span></div>
      <div class="${bodyCls}" id="tk-body-${id || label.toLowerCase().replace(/\s/g,'-')}">
        ${tasks.length ? `<div class="tk-list">${tasks.map(rowHtml).join('')}</div>` : `<div class="tk-list"><div class="tk-empty">Nothing here. Nice.</div></div>`}
      </div>
    </div>`;
  };

  // ── Hero headline ──
  const headline = totalOpen === 0
    ? `<span class="accent">All caught up.</span>`
    : overdue.length > 0
    ? `<span class="accent">${overdue.length}</span> overdue. <span class="muted">${todayTasks.length} due today.</span>`
    : todayTasks.length > 0
    ? `<span class="accent">${todayTasks.length}</span> due today. <span class="muted">${thisWeek.length} this week.</span>`
    : `<span class="muted">No deadlines today.</span>`;

  container.innerHTML = `
    <div class="tk-page">
      <div class="tk-hero">
        <div class="tk-hero-eyebrow">Tasks</div>
        <div class="tk-hero-line">${headline}</div>
        <div class="tk-hero-sub">
          <span>${totalOpen} open</span>
          <span class="divider">·</span>
          <span>${inProgressCount} in progress</span>
          <span class="divider">·</span>
          <span class="trend-up">${doneThisWeek} done this week</span>
        </div>
      </div>
      ${sectionHtml('Overdue', overdue, { overdue: true, id: 'overdue' })}
      ${sectionHtml('Today', todayTasks, { id: 'today' })}
      ${sectionHtml('This week', thisWeek, { id: 'week' })}
      ${sectionHtml('Later', later, { id: 'later' })}
      ${doneRecent.length ? sectionHtml('Done recently', doneRecent, { collapsible: true, id: 'done', defaultCollapsed: true }) : ''}
    </div>`;
}

async function tbRefresh() {
  const btn = document.getElementById('tb-refresh-btn');
  if (btn) { btn.textContent = '↻ Refreshing…'; btn.disabled = true; }
  pjLoaded = false;
  await renderProjects();
  renderTaskBoard();
}

function tbGoToTask(projectId) {
  const proj = pjAllProjects.find(p => p.id === projectId);
  if (proj) navigateToProject(projectId, null);
}

// ═══ SOUL — habits & daily routines ═══
let soulHabits = [];
let soulLogs = [];
let soulRoutineItems = [];
let soulRoutineItemLogs = [];
let soulLoaded = false;

const SB_HEAD = { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` };

async function soulLoad() {
  if (soulLoaded) return;
  try {
    const [hRes, lRes, rRes, rlRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/soul_items?archived_at=is.null&status=eq.active&order=sort_order.asc,created_at.asc`, { headers: SB_HEAD }),
      fetch(`${SUPABASE_URL}/rest/v1/soul_logs?order=completed_at.desc&limit=2000`, { headers: SB_HEAD }),
      fetch(`${SUPABASE_URL}/rest/v1/soul_item_steps?archived_at=is.null&order=sort_order.asc`, { headers: SB_HEAD }),
      fetch(`${SUPABASE_URL}/rest/v1/soul_step_logs?order=date.desc&limit=2000`, { headers: SB_HEAD }),
    ]);
    soulHabits = (await hRes.json()) || [];
    soulLogs = (await lRes.json()) || [];
    soulRoutineItems = (await rRes.json()) || [];
    soulRoutineItemLogs = (await rlRes.json()) || [];
  } catch (e) {
    console.error('soulLoad failed', e);
  }
  soulLoaded = true;
}

function soulDateAdd(iso, days) {
  const d = new Date(iso + 'T12:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function soulHabitMet(habit, log) {
  if (!log) return false;
  if (habit.habit_type === 'check') return true;
  if (habit.habit_type === 'time' || habit.habit_type === 'count') {
    if (!habit.target_value) return true;
    return (log.value || 0) >= habit.target_value;
  }
  return true;
}

function soulRoutineDoneOnDate(habit, dateStr) {
  const items = soulRoutineItems.filter(r => r.soul_item_id === habit.id);
  if (!items.length) return false;
  const done = items.every(it =>
    soulRoutineItemLogs.some(l => l.soul_item_step_id === it.id && l.date === dateStr)
  );
  return done;
}

function soulHabitDoneOnDate(habit, dateStr) {
  if (habit.habit_type === 'routine') return soulRoutineDoneOnDate(habit, dateStr);
  const log = soulLogs.find(l => l.soul_item_id === habit.id && l.completed_at === dateStr);
  return soulHabitMet(habit, log);
}

function soulComputeStreak(habit) {
  let streak = 0;
  let cur = today();
  while (true) {
    if (soulHabitDoneOnDate(habit, cur)) {
      streak++;
      cur = soulDateAdd(cur, -1);
    } else {
      break;
    }
  }
  return streak;
}

function soulLastNDays(n) {
  const days = [];
  let cur = today();
  for (let i = 0; i < n; i++) {
    days.unshift(cur);
    cur = soulDateAdd(cur, -1);
  }
  return days;
}

async function renderSoul() {
  const root = document.getElementById('soul-root');
  if (!root) return;
  if (!soulLoaded) {
    root.innerHTML = '<div style="padding:80px;text-align:center;color:var(--text-3)">Loading…</div>';
    await soulLoad();
  }

  const routines = soulHabits.filter(h => h.habit_type === 'routine');
  const others = soulHabits.filter(h => h.habit_type !== 'routine');

  const heroHTML = `<div class="soul-hero">
    <div class="soul-hero-eyebrow">Soul</div>
    <div class="soul-hero-title">Daily practice</div>
    <div class="soul-hero-sub">The small repeated acts that compound into who you become.</div>
  </div>`;

  const routinesHTML = routines.length
    ? routines.map(soulRoutineCardHTML).join('')
    : '';

  const cardsHTML = others.length
    ? `<div class="soul-section-label"><span>Habits</span><span class="count">${others.length}</span></div>
       <div class="soul-grid">${others.map(soulHabitCardHTML).join('')}</div>`
    : '';

  const emptyState = (!routines.length && !others.length)
    ? `<div class="soul-empty">
        <div class="soul-empty-title">A blank altar.</div>
        <div class="soul-empty-sub">Habits and routines are added through the Claude Code skill. Once they exist, they'll appear here as cards with streaks and history.</div>
       </div>`
    : '';

  root.innerHTML = heroHTML + routinesHTML + cardsHTML + emptyState;
}

function soulRoutineCardHTML(habit) {
  const items = soulRoutineItems.filter(r => r.soul_item_id === habit.id);
  const todayStr = today();
  const doneIds = new Set(soulRoutineItemLogs.filter(l => l.date === todayStr).map(l => l.soul_item_step_id));
  const doneCount = items.filter(it => doneIds.has(it.id)).length;
  const streak = soulComputeStreak(habit);

  const itemsHTML = items.length
    ? items.map(it => `
        <div class="soul-routine-item ${doneIds.has(it.id) ? 'done' : ''}" onclick="soulToggleRoutineItem(${it.id})">
          <div class="soul-routine-check"></div>
          <div class="soul-routine-label">${escapeHtml(it.label)}</div>
        </div>
      `).join('')
    : `<div style="padding:14px 4px;color:var(--text-4);font-size:13px;font-style:italic">No items yet — add some in the routine settings.</div>`;

  return `<div class="soul-routine">
    <div class="soul-routine-head">
      <div class="soul-routine-title">
        <div class="soul-routine-name">${escapeHtml(habit.name)}</div>
        <div class="soul-routine-progress">${doneCount} of ${items.length} done today</div>
      </div>
      <div class="soul-routine-meta">
        ${streak > 0 ? `<span class="soul-routine-streak"><span class="num">${streak}</span> day streak</span>` : ''}
        <button class="soul-routine-open" onclick="soulOpenHabitDetail('${habit.id}')">Open ›</button>
      </div>
    </div>
    <div class="soul-routine-list">${itemsHTML}</div>
  </div>`;
}

function soulHabitCardHTML(habit) {
  const todayStr = today();
  const todayLog = soulLogs.find(l => l.soul_item_id === habit.id && l.completed_at === todayStr);
  const doneToday = soulHabitMet(habit, todayLog);
  const streak = soulComputeStreak(habit);
  const days = soulLastNDays(7);
  const dotsHTML = days.map(d => {
    const filled = soulHabitDoneOnDate(habit, d);
    const isToday = d === todayStr;
    return `<div class="soul-card-dot ${filled ? 'filled' : ''} ${isToday ? 'today' : ''}" title="${d}"></div>`;
  }).join('');

  let typeLabel = '';
  let metaLine = '';
  let statLbl = 'Streak';
  let statVal = streak;
  if (habit.habit_type === 'check') {
    typeLabel = 'Daily';
    metaLine = '';
  } else if (habit.habit_type === 'time') {
    typeLabel = `${habit.target_value || ''} ${habit.unit || 'min'}/day`.trim();
    const todayVal = todayLog?.value || 0;
    metaLine = '';
    if (habit.target_value) metaLine += `${metaLine ? ' · ' : ''}${todayVal}/${habit.target_value} ${habit.unit || 'min'} today`;
  } else if (habit.habit_type === 'count') {
    typeLabel = `${habit.target_value || ''} ${habit.unit || ''}/day`.trim();
    const todayVal = todayLog?.value || 0;
    metaLine = '';
    if (habit.target_value) metaLine += `${metaLine ? ' · ' : ''}${todayVal}/${habit.target_value} ${habit.unit || ''} today`;
  }

  return `<div class="soul-card ${doneToday ? 'done' : ''}" onclick="soulOpenHabitDetail('${habit.id}')">
    <div class="soul-card-check ${doneToday ? 'done' : ''}" onclick="event.stopPropagation();soulToggleHabitToday('${habit.id}')" title="Mark today"></div>
    <div class="soul-card-head">
      <div class="soul-card-name">${escapeHtml(habit.name)}</div>
    </div>
    <div class="soul-card-type">${escapeHtml(typeLabel)}</div>
    <div class="soul-card-meta">${escapeHtml(metaLine || '\u00a0')}</div>
    <div class="soul-card-foot">
      <div class="soul-card-stat">
        <div class="soul-card-stat-lbl">Streak</div>
        <div class="soul-card-stat-val ${doneToday ? 'done' : ''}">${streak}<span class="unit">d</span></div>
      </div>
      <div class="soul-card-dots-wrap">
        <div class="soul-card-dots-lbl">Last 7</div>
        <div class="soul-card-dots">${dotsHTML}</div>
      </div>
    </div>
  </div>`;
}

async function soulToggleHabitToday(habitId) {
  const habit = soulHabits.find(h => h.id === habitId);
  if (!habit) return;
  const todayStr = today();
  const existing = soulLogs.find(l => l.soul_item_id === habitId && l.completed_at === todayStr);

  if (existing) {
    await fetch(`${SUPABASE_URL}/rest/v1/soul_logs?id=eq.${existing.id}`, {
      method: 'DELETE', headers: SB_HEAD
    });
    soulLogs = soulLogs.filter(l => l.id !== existing.id);
  } else {
    const body = { soul_item_id: habitId, completed_at: todayStr };
    if (habit.habit_type === 'time' || habit.habit_type === 'count') {
      body.value = habit.target_value || 1;
    }
    const res = await fetch(`${SUPABASE_URL}/rest/v1/soul_logs`, {
      method: 'POST',
      headers: { ...SB_HEAD, 'Content-Type': 'application/json', Prefer: 'return=representation' },
      body: JSON.stringify(body),
    });
    const inserted = (await res.json())?.[0];
    if (inserted) soulLogs.unshift(inserted);
  }
  renderSoul();
}

async function soulToggleRoutineItem(itemId) {
  const todayStr = today();
  const existing = soulRoutineItemLogs.find(l => l.soul_item_step_id === itemId && l.date === todayStr);

  if (existing) {
    await fetch(`${SUPABASE_URL}/rest/v1/soul_step_logs?id=eq.${existing.id}`, {
      method: 'DELETE', headers: SB_HEAD
    });
    soulRoutineItemLogs = soulRoutineItemLogs.filter(l => l.id !== existing.id);
  } else {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/soul_step_logs`, {
      method: 'POST',
      headers: { ...SB_HEAD, 'Content-Type': 'application/json', Prefer: 'return=representation' },
      body: JSON.stringify({ soul_item_step_id: itemId, date: todayStr }),
    });
    const inserted = (await res.json())?.[0];
    if (inserted) soulRoutineItemLogs.unshift(inserted);
  }
  renderSoul();
}

// ─── Habit detail page (V1: simple history calendar + settings) ───
function soulOpenHabitDetail(habitId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('pg-habit-detail').classList.add('active');
  renderHabitDetail(habitId);
}

function soulBackToList() {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('pg-soul').classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.page === 'soul');
  });
  renderSoul();
}

function renderHabitDetail(habitId) {
  const root = document.getElementById('habit-detail-root');
  const habit = soulHabits.find(h => h.id === habitId);
  if (!habit) { root.innerHTML = '<div class="soul-empty">Habit not found.</div>'; return; }

  const streak = soulComputeStreak(habit);
  const allLogs = habit.habit_type === 'routine'
    ? [] // routines tracked via items
    : soulLogs.filter(l => l.soul_item_id === habit.id);
  const totalDays = habit.habit_type === 'routine'
    ? new Set(soulRoutineItemLogs
        .filter(l => soulRoutineItems.some(it => it.soul_item_id === habit.id && it.id === l.soul_item_step_id))
        .map(l => l.date)).size
    : allLogs.length;

  // 12-week heatmap
  const weeks = 12;
  const days = soulLastNDays(weeks * 7);
  const cells = days.map(d => {
    const done = soulHabitDoneOnDate(habit, d);
    return `<div title="${d}" style="aspect-ratio:1;border-radius:3px;background:${done ? 'var(--accent)' : 'var(--surface-2)'};opacity:${done ? '.9' : '1'}"></div>`;
  }).join('');

  let typeLine = '';
  if (habit.habit_type === 'time') typeLine = `Time-based · ${habit.target_value || '—'} ${habit.unit || 'min'}/day`;
  else if (habit.habit_type === 'count') typeLine = `Count-based · ${habit.target_value || '—'} ${habit.unit || ''}/day`.trim();
  else if (habit.habit_type === 'routine') typeLine = `Routine · ${soulRoutineItems.filter(r => r.soul_item_id === habit.id).length} items`;
  else typeLine = 'Daily check';

  root.innerHTML = `
    <div style="margin-bottom:20px">
      <button class="rf-ghost-btn" onclick="soulBackToList()">← Back to Soul</button>
    </div>
    <div class="soul-hero">
      <div class="soul-hero-eyebrow">${escapeHtml(typeLine)}</div>
      <div class="soul-hero-title">${escapeHtml(habit.name)}</div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:44px">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 28px">
        <div style="font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-4);margin-bottom:10px">Current streak</div>
        <div style="font-size:36px;font-weight:800;letter-spacing:-0.03em;color:var(--accent)">${streak}<span style="font-size:14px;color:var(--text-3);font-weight:600;margin-left:6px">days</span></div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 28px">
        <div style="font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-4);margin-bottom:10px">Total days</div>
        <div style="font-size:36px;font-weight:800;letter-spacing:-0.03em;color:var(--text)">${totalDays}</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 28px">
        <div style="font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-4);margin-bottom:10px">Started</div>
        <div style="font-size:18px;font-weight:700;letter-spacing:-0.015em;color:var(--text);margin-top:8px">${new Date(habit.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
      </div>
    </div>

    <div class="soul-section-label"><span>Last 12 weeks</span></div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 28px;margin-bottom:44px">
      <div style="display:grid;grid-template-columns:repeat(${weeks*7},1fr);gap:3px">${cells}</div>
    </div>

    <div class="soul-section-label"><span>Settings</span></div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 28px">
      <button class="rf-ghost-btn" style="color:var(--text-3)" onclick="soulDeleteHabit('${habit.id}')">Delete habit</button>
    </div>
  `;
}

async function soulDeleteHabit(habitId) {
  if (!confirm('Delete this habit and all its history? This cannot be undone.')) return;
  await fetch(`${SUPABASE_URL}/rest/v1/soul_items?id=eq.${habitId}`, {
    method: 'DELETE', headers: SB_HEAD
  });
  soulHabits = soulHabits.filter(h => h.id !== habitId);
  soulLogs = soulLogs.filter(l => l.soul_item_id !== habitId);
  soulRoutineItems = soulRoutineItems.filter(r => r.soul_item_id !== habitId);
  soulBackToList();
}
